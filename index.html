<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#CC0000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SOS OS"/>
  <title>SOS Energia — OS Digital</title>
  <style>
    :root{
      --red:#CC0000;--red-dark:#990000;--red-light:#ff3333;
      --black:#0a0a0a;--dark:#141414;--card:#1c1c1c;--card2:#242424;
      --border:#2e2e2e;--text:#f0f0f0;--dim:#888;
      --green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6;--purple:#a855f7;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--black);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
    /* ── LOGIN ── */
    #login-screen{position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .login-logo{margin-bottom:32px;text-align:center}
    .login-logo svg{width:120px;height:60px}
    .login-logo p{color:var(--dim);font-size:13px;margin-top:8px}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:380px}
    .login-box h2{font-size:18px;margin-bottom:20px;color:var(--text)}
    /* ── NAV ── */
    .nav{background:var(--dark);border-bottom:2px solid var(--red);display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:54px;position:sticky;top:0;z-index:100}
    .nav-left{display:flex;align-items:center;gap:10px}
    .nav-logo-sm{width:52px;height:26px}
    .nav-user{font-size:11px;color:var(--dim);background:var(--card2);padding:3px 8px;border-radius:20px}
    .nav-tabs{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .nav-tabs::-webkit-scrollbar{display:none}
    .nav-tab{background:none;border:none;color:var(--dim);font-size:11px;padding:7px 9px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:.2s}
    .nav-tab.active{background:var(--red);color:#fff;font-weight:700}
    /* ── LAYOUT ── */
    .page{display:none;padding:14px;max-width:720px;margin:0 auto}
    .page.active{display:block}
    /* ── CARDS ── */
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
    .card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--red);margin-bottom:14px;display:flex;align-items:center;gap:7px}
    /* ── FORM ── */
    .field{margin-bottom:13px}
    .field label{display:block;font-size:11px;color:var(--dim);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .field input,.field select,.field textarea{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;padding:10px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red)}
    .field textarea{resize:vertical;min-height:78px}
    .field select option{background:var(--dark)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
    /* ── BTNS ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;width:100%}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:var(--red-dark)}
    .btn-green{background:var(--green);color:#fff}
    .btn-wpp{background:#25D366;color:#fff}
    .btn-secondary{background:var(--border);color:var(--text)}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--dim)}
    .btn-sm{padding:7px 13px;font-size:12px}
    .btn-icon{width:auto;padding:8px}
    /* ── BADGE ── */
    .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
    .badge-red{background:rgba(204,0,0,.18);color:var(--red-light)}
    .badge-green{background:rgba(34,197,94,.14);color:var(--green)}
    .badge-yellow{background:rgba(245,158,11,.14);color:var(--yellow)}
    .badge-blue{background:rgba(59,130,246,.14);color:var(--blue)}
    .badge-purple{background:rgba(168,85,247,.14);color:var(--purple)}
    /* ── OS ITEM ── */
    .os-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:9px;cursor:pointer;transition:border-color .2s}
    .os-item:hover{border-color:var(--red)}
    .os-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
    /* ── SIG ── */
    #sigCanvas{border:1px solid var(--border);border-radius:8px;background:#fff;touch-action:none;width:100%;display:block}
    /* ── ALERT ── */
    .alert{border-radius:9px;padding:11px 13px;margin-bottom:13px;font-size:13px;display:flex;gap:9px;align-items:flex-start}
    .alert-red{background:rgba(204,0,0,.13);border:1px solid rgba(204,0,0,.28);color:#ff9090}
    .alert-yellow{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.28);color:var(--yellow)}
    .alert-green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.28);color:var(--green)}
    /* ── TABLE ── */
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th{background:var(--dark);color:var(--dim);font-weight:600;padding:7px 9px;text-align:left}
    .tbl td{padding:7px 9px;border-bottom:1px solid var(--border)}
    .tbl tr:last-child td{border-bottom:none}
    /* ── METRICS ── */
    .metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:14px}
    .metric-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px}
    .metric-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
    .metric-value{font-size:22px;font-weight:700}
    .metric-sub{font-size:11px;color:var(--dim);margin-top:2px}
    /* ── STEPS ── */
    .steps{display:flex;gap:7px;margin-bottom:18px}
    .step{flex:1;height:3px;border-radius:3px;background:var(--border);transition:background .3s}
    .step.done{background:var(--green)}.step.active{background:var(--red)}
    /* ── SWITCH ── */
    .switch{position:relative;width:42px;height:23px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;inset:0;background:var(--border);border-radius:23px;transition:.3s;cursor:pointer}
    .slider:before{content:'';position:absolute;width:17px;height:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
    input:checked+.slider{background:var(--red)}
    input:checked+.slider:before{transform:translateX(19px)}
    /* ── AI CHAT ── */
    .chat-msgs{height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 0;margin-bottom:12px;scroll-behavior:smooth}
    .chat-msg{max-width:85%;padding:10px 13px;border-radius:12px;font-size:14px;line-height:1.5}
    .chat-msg.user{align-self:flex-end;background:var(--red);color:#fff;border-bottom-right-radius:4px}
    .chat-msg.ai{align-self:flex-start;background:var(--card2);border:1px solid var(--border);border-bottom-left-radius:4px}
    .chat-msg.ai.typing{color:var(--dim)}
    .chat-input-row{display:flex;gap:8px}
    .chat-input-row input{flex:1;background:var(--dark);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px 13px;outline:none}
    .chat-input-row input:focus{border-color:var(--red)}
    /* ── EQUIPAMENTOS ── */
    .equip-item{background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;position:relative}
    .equip-item .equip-tipo{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}
    .equip-item .equip-tipo.gerador{background:rgba(204,0,0,.15);color:var(--red-light)}
    .equip-item .equip-tipo.acessorio{background:rgba(139,92,246,.15);color:var(--purple)}
    .equip-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;line-height:1;padding:2px 6px}
    .equip-remove:hover{color:var(--red)}
    .equip-add-btns{display:flex;gap:8px;margin-top:4px}
    .btn-add-gerador{background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.3);color:var(--red-light);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;flex:1}
    .btn-add-acessorio{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);color:var(--purple);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;flex:1}
    .btn-add-gerador:hover{background:rgba(204,0,0,.2)}
    .btn-add-acessorio:hover{background:rgba(139,92,246,.2)}
    /* conferência de acessórios no operador */
    .acessorio-check{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--dark);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px}
    .acessorio-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--red);cursor:pointer;flex-shrink:0}
    .btn-mic{background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--dim);padding:0 12px;cursor:pointer;flex-shrink:0;font-size:18px;display:flex;align-items:center;transition:all .2s}
    .btn-mic.gravando{background:rgba(204,0,0,.15);border-color:var(--red);color:var(--red);animation:pulse-mic .8s ease-in-out infinite}
    @keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(204,0,0,.4)}50%{box-shadow:0 0 0 6px rgba(204,0,0,0)}}
    /* ── HE WARN ── */
    .he-warn{background:rgba(245,158,11,.1);border:1px solid var(--yellow);border-radius:9px;padding:11px;margin-top:8px;display:none}
    .he-warn.show{display:block}
    /* ── USER CHIP ── */
    .user-chip{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--card2);border:1px solid var(--border);border-radius:9px;margin-bottom:8px}
    @media(max-width:480px){.grid3{grid-template-columns:1fr 1fr}.metric-grid{grid-template-columns:1fr 1fr}}
    /* ── TOAST ── */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:99999;padding:11px 20px;border-radius:10px;font-size:14px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.ok{background:var(--green);color:#fff}
    #toast.err{background:#cc0000;color:#fff}
    /* ── SAVE FEEDBACK ── */
    .save-feedback{font-size:12px;margin-top:6px;min-height:18px;display:block}
    .save-feedback.ok{color:var(--green)}
    .save-feedback.err{color:var(--red-light)}
  </style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="toast"></div>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-logo">
    <svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="80" fill="#0a0a0a"/>
      <text x="100" y="58" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="52" fill="#CC0000">SOS</text>
      <polygon points="102,6 94,36 101,36 97,68 112,30 104,30" fill="#0a0a0a"/>
      <polygon points="101,8 93,37 100,37 96,66 110,32 103,32" fill="#CC0000" opacity=".55"/>
    </svg>
    <p>Ordem de Serviço Digital</p>
  </div>
  <div class="login-box">
    <h2>Entrar</h2>
    <div class="field">
      <label>Usuário</label>

    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- ═══ NAV ═══ -->
<nav class="nav" id="main-nav" style="display:none">
  <div class="nav-left">
    <svg class="nav-logo-sm" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg" onclick="irParaOS()" style="cursor:pointer" title="Voltar para OS">
      <rect width="200" height="80" fill="#141414"/>
      <text x="100" y="58" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="52" fill="#CC0000">SOS</text>
      <polygon points="101,8 93,37 100,37 96,66 110,32 103,32" fill="#CC0000" opacity=".55"/>
    </svg>
    <span class="nav-user" id="nav-user-chip">—</span>
        <span id="conn-status" style="font-size:10px;color:var(--dim);margin-left:4px">⏳</span>
  </div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <button onclick="doLogout()" style="background:none;border:1px solid var(--border);color:var(--dim);border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;flex-shrink:0" title="Sair">Sair</button>
</nav>

<!-- ═══ PAGES ═══ -->
<div id="page-admin" class="page"></div>
<div id="page-operador" class="page"></div>
<div id="page-relatorio" class="page"></div>
<div id="page-agente" class="page"></div>
<div id="page-config" class="page"></div>

<script>
// ════════════════════════════════════════
// FEEDBACK VISUAL (toast + inline)
// ════════════════════════════════════════
let _toastTimer=null;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  if(!t) return;
  clearTimeout(_toastTimer);
  t.textContent=(type==='ok'?'✓ ':' ✕ ')+msg;
  t.className='show '+type;
  _toastTimer=setTimeout(()=>{t.className='';},3000);
}
// Seta feedback inline em um elemento (por id)
function setFeedback(elId,msg,type){
  const el=document.getElementById(elId);
  if(!el) return;
  el.textContent=msg;
  el.className='save-feedback '+(type||'ok');
  if(type==='ok') setTimeout(()=>{if(el) el.textContent='';},3000);
}
// Wrapper para salvar no Firebase com feedback
async function fbSaveWithFeedback(saveFn, btnEl, feedbackId){
  if(btnEl){btnEl.disabled=true;btnEl.textContent='Salvando...';}
  try{
    await saveFn();
    if(btnEl){btnEl.disabled=false;btnEl.textContent='Salvar';}
    if(feedbackId) setFeedback(feedbackId,'✓ Salvo','ok');
    showToast('Salvo com sucesso');
  }catch(e){
    if(btnEl){btnEl.disabled=false;btnEl.textContent='Salvar';}
    const errMsg='Erro: '+(e&&e.message?e.message:'falha ao salvar');
    if(feedbackId) setFeedback(feedbackId,errMsg,'err');
    showToast(errMsg,'err');
  }
}

// ════════════════════════════════════════
// FIREBASE
// ════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAFzcqGX4jrh-IAF6Tfl2-Wk_IEe1acQUE",
  authDomain: "sos-os-digital.firebaseapp.com",
  databaseURL: "https://sos-os-digital-default-rtdb.firebaseio.com",
  projectId: "sos-os-digital",
  storageBucket: "sos-os-digital.firebasestorage.app",
  messagingSenderId: "1098803329027",
  appId: "1:1098803329027:web:bd18ee6c8b10afeedf3636"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Indicador de conexão
const connRef = db.ref('.info/connected');
connRef.on('value', snap => {
  const online = snap.val();
  const chip = document.getElementById('conn-status');
  if (chip) {
    chip.textContent = online ? '🟢 Online' : '🔴 Offline';
    chip.style.color = online ? 'var(--green)' : 'var(--red-light)';
  }
});

// Listeners em tempo real
function initFirebaseListeners() {
  db.ref('ordens').on('value', snap => {
    ordens = snap.val() ? Object.values(snap.val()).map(o => ({
      ...o,
      diasContratados: o.diasContratados
        ? (Array.isArray(o.diasContratados) ? o.diasContratados : Object.values(o.diasContratados))
        : [],
      equipamentos: o.equipamentos
        ? (Array.isArray(o.equipamentos) ? o.equipamentos : Object.values(o.equipamentos))
        : []
    })) : [];
    DB.set('sos_ordens', ordens);
    renderOSList();
  });
  db.ref('registros').on('value', snap => {
    registros = snap.val() ? Object.values(snap.val()) : [];
    DB.set('sos_registros', registros);
  });
  db.ref('usuarios').on('value', snap => {
    if (snap.val()) {
      usuarios = Object.values(snap.val());
      DB.set('sos_usuarios', usuarios);
    }
  });
  db.ref('config').on('value', snap => {
    if (snap.val()) {
      config = { ...config, ...snap.val() };
      DB.set('sos_config', config);
    }
  });
}

// Login via Firebase — busca usuários diretamente do DB (fix: novos usuários não ficam presos no cache local)
function doLoginFirebase(userVal, passVal) {
  db.ref('usuarios').once('value').then(snap => {
    const lista = snap.val() ? Object.values(snap.val()) : usuarios;
    const found = lista.find(x => x.user.toLowerCase() === userVal && x.senha === passVal);
    if (!found) {
      document.getElementById('login-err').style.display = 'block';
      document.getElementById('login-btn').disabled = false;
      document.getElementById('login-btn').textContent = 'Entrar';
      return;
    }
    usuarios = lista;
    DB.set('sos_usuarios', usuarios);
    sessaoAtual = found;
    initFirebaseListeners();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('nav-user-chip').textContent = found.nome + ' (' + found.perfil + ')';
    buildNav();
    if (found.perfil === 'admin' || found.perfil === 'comercial') loadAdmin();
    else loadOperador();
  }).catch(() => {
    // Firebase indisponível — tenta com cache local
    const found = usuarios.find(x => x.user.toLowerCase() === userVal && x.senha === passVal);
    if (!found) { document.getElementById('login-err').style.display = 'block'; document.getElementById('login-btn').disabled = false; document.getElementById('login-btn').textContent = 'Entrar'; return; }
    sessaoAtual = found;
    initFirebaseListeners();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('nav-user-chip').textContent = found.nome + ' (' + found.perfil + ')';
    buildNav();
    if (found.perfil === 'admin' || found.perfil === 'comercial') loadAdmin();
    else loadOperador();
  });
}

// Funções de escrita Firebase
function fbSet(path, data) {
  return db.ref(path).set(data).catch(e => console.warn('Firebase write error:', e));
}
function fbSaveOrdens() {
  const obj = {};
  ordens.forEach(o => { obj[o.id] = o; });
  fbSet('ordens', obj);
}
function fbSaveRegistros() {
  const obj = {};
  registros.forEach(r => { obj[r.id] = r; });
  fbSet('registros', obj);
}
function fbSaveUsuarios() {
  const obj = {};
  usuarios.forEach(u => { obj[u.id] = u; });
  fbSet('usuarios', obj);
}
function fbSaveConfig() {
  fbSet('config', config);
}


// ════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════
const DB={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};
let ordens     = DB.get('sos_ordens',[]);
let registros  = DB.get('sos_registros',[]);
let usuarios   = DB.get('sos_usuarios',[
  {id:'adm_0',nome:'Admin',user:'admin',senha:'sos2024',perfil:'admin'},
]);
let config     = DB.get('sos_config',{
  jornadaIni:'07:00',jornadaFim:'17:00',intervalo:1,
  heValor:15,webhook:'',openaiKey:'',wppNumero:'5561999852409'
});
let sessaoAtual = null; // usuário logado

function saveAll(){
  DB.set('sos_ordens',ordens);DB.set('sos_registros',registros);
  DB.set('sos_usuarios',usuarios);DB.set('sos_config',config);
  return Promise.all([fbSaveOrdens(),fbSaveRegistros(),fbSaveUsuarios(),fbSaveConfig()]);
}

// ════════════════════════════════════════
// LOGIN / LOGOUT
// ════════════════════════════════════════
function doLogin(){
  const u=document.getElementById('login-user').value.trim().toLowerCase();
  const p=document.getElementById('login-pass').value;
  if(!u||!p){document.getElementById('login-err').style.display='block';return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='Verificando...';
  document.getElementById('login-err').style.display='none';
  doLoginFirebase(u, p);
}

function doLogout(){
  if(!confirm('Sair da conta?')) return;
  // desliga listeners Firebase
  db.ref('ordens').off();
  db.ref('registros').off();
  db.ref('usuarios').off();
  db.ref('config').off();
  sessaoAtual=null;
  document.getElementById('main-nav').style.display='none';
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').style.display='none';
  const btn=document.getElementById('login-btn');
  if(btn){btn.disabled=false;btn.textContent='Entrar';}
  document.getElementById('login-screen').style.display='flex';
}

function buildNav(){
  const tabs=document.getElementById('nav-tabs');
  const isAdmin=sessaoAtual.perfil==='admin'||sessaoAtual.perfil==='comercial';
  tabs.innerHTML='';
  const pages=[];
  if(isAdmin) pages.push({id:'admin',label:'OS'});
  pages.push({id:'operador',label:'Operador'});
  if(isAdmin) pages.push({id:'relatorio',label:'Relatório'});
  pages.push({id:'agente',label:'Assistente'});
  if(sessaoAtual.perfil==='admin') pages.push({id:'config',label:'Config'});
  pages.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='nav-tab'+(i===0?' active':'');
    b.textContent=p.label;
    b.onclick=()=>{switchPage(p.id,b)};
    tabs.appendChild(b);
  });
  // load first
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+(isAdmin?'admin':'operador')).classList.add('active');
}

function irParaOS(){
  const isAdmin=sessaoAtual&&(sessaoAtual.perfil==='admin'||sessaoAtual.perfil==='comercial');
  const targetId=isAdmin?'admin':'operador';
  const btn=Array.from(document.querySelectorAll('.nav-tab')).find(b=>b.textContent.trim()===(isAdmin?'OS':'Operador'));
  if(btn) switchPage(targetId,btn);
}

function switchPage(id,btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  if(id==='admin') loadAdmin();
  if(id==='operador') loadOperador();
  if(id==='relatorio') loadRelatorio();
  if(id==='agente') loadAgente();
  if(id==='config') loadConfig();
}

// ── EQUIPAMENTOS DA OS ──
let equipamentosOS=[];

function addEquip(tipo){
  equipamentosOS.push(tipo==='gerador'
    ? {id:'eq_'+Date.now(),tipo:'gerador',potencia:'',patrimonio:''}
    : {id:'eq_'+Date.now(),tipo:'acessorio',nome:'',quantidade:'1'});
  renderEquip();
  // foco no primeiro campo do item adicionado
  setTimeout(()=>{
    const inputs=document.querySelectorAll('#equip-lista .equip-item:last-child input');
    if(inputs[0]) inputs[0].focus();
  },50);
}

function removeEquip(id){
  equipamentosOS=equipamentosOS.filter(e=>e.id!==id);
  renderEquip();
}

function renderEquip(){
  const c=document.getElementById('equip-lista');if(!c) return;
  if(!equipamentosOS.length){
    c.innerHTML='<p style="font-size:12px;color:var(--dim);margin-bottom:10px;text-align:center;padding:10px 0">Nenhum equipamento adicionado. Clique em + Gerador ou + Acessório.</p>';
    return;
  }
  c.innerHTML=equipamentosOS.map((eq,i)=>{
    if(eq.tipo==='gerador'){
      return `<div class="equip-item">
        <span class="equip-tipo gerador">⚡ Gerador</span>
        <button class="equip-remove" onclick="removeEquip('${eq.id}')" title="Remover">×</button>
        <div class="grid2">
          <div class="field" style="margin:0 0 6px">
            <label style="font-size:10px">Potência (KVA)</label>
            <input value="${eq.potencia}" placeholder="Ex: 180 KVA" oninput="equipamentosOS[${i}].potencia=this.value"/>
          </div>
          <div class="field" style="margin:0 0 6px">
            <label style="font-size:10px">Nº Patrimônio</label>
            <input value="${eq.patrimonio}" placeholder="Ex: G-042" oninput="equipamentosOS[${i}].patrimonio=this.value"/>
          </div>
        </div>
      </div>`;
    } else {
      return `<div class="equip-item">
        <span class="equip-tipo acessorio">🔌 Acessório</span>
        <button class="equip-remove" onclick="removeEquip('${eq.id}')" title="Remover">×</button>
        <div class="grid2">
          <div class="field" style="margin:0 0 6px;grid-column:1/-1">
            <label style="font-size:10px">Nome do Acessório</label>
            <input value="${eq.nome}" placeholder="Ex: Cabo PP 150mm² — 50m, Caixa intermediária, Gradil, Passa-cabos..." oninput="equipamentosOS[${i}].nome=this.value"/>
          </div>
          <div class="field" style="margin:0">
            <label style="font-size:10px">Quantidade</label>
            <input type="number" min="1" value="${eq.quantidade}" placeholder="1" oninput="equipamentosOS[${i}].quantidade=this.value"/>
          </div>
        </div>
      </div>`;
    }
  }).join('');
}

// Renderiza lista de equipamentos como texto resumido (para tabela admin)
function renderEquipTexto(os){
  const eqs=os.equipamentos&&os.equipamentos.length?os.equipamentos:[];
  if(!eqs.length){
    // retrocompatibilidade com OS antigas (só tinham potencia/patrimonio)
    return (os.potencia||'')+(os.patrimonio?' · '+os.patrimonio:'') || '—';
  }
  return eqs.map(e=>
    e.tipo==='gerador'
      ? `⚡ ${e.potencia||'Gerador'}${e.patrimonio?' ('+e.patrimonio+')':''}`
      : `🔌 ${e.nome||'Acessório'}${e.quantidade&&e.quantidade!='1'?' ×'+e.quantidade:''}`
  ).join('<br/>');
}

// Renderiza lista de acessórios para o operador confirmar (step 1)
function renderAcessoriosOperador(os){
  const eqs=os.equipamentos&&os.equipamentos.length?os.equipamentos:[];
  const acessorios=eqs.filter(e=>e.tipo==='acessorio');
  if(!acessorios.length) return '';
  return `<div class="card" style="margin-top:12px">
    <div class="card-title" style="color:var(--purple)">🔌 Confirmação de Acessórios</div>
    <p style="font-size:12px;color:var(--dim);margin-bottom:10px">Marque os itens que você conferiu e levou para o evento:</p>
    ${acessorios.map(a=>`
      <div class="acessorio-check">
        <input type="checkbox" id="ck_${a.id}" onchange="atualizarAcessorioCheck()"/>
        <label for="ck_${a.id}" style="cursor:pointer;flex:1">
          ${a.nome||'Acessório'}
          ${a.quantidade&&a.quantidade!='1'?`<span style="color:var(--dim);font-size:11px"> × ${a.quantidade}</span>`:''}
        </label>
      </div>`).join('')}
    <div id="acessorio-aviso" style="display:none;font-size:12px;color:var(--yellow);margin-top:8px">⚠️ Confirme todos os acessórios antes de continuar.</div>
  </div>`;
}

function atualizarAcessorioCheck(){
  if(!opOS) return;
  const eqs=(opOS.equipamentos||[]).filter(e=>e.tipo==='acessorio');
  if(!eqs.length) return;
  const total=eqs.length;
  const checked=eqs.filter(a=>document.getElementById('ck_'+a.id)?.checked).length;
  const aviso=document.getElementById('acessorio-aviso');
  if(aviso) aviso.style.display=checked<total?'block':'none';
}

function refreshDias(){
  const s=document.getElementById('f-saida')?.value;
  const r=document.getElementById('f-ret')?.value;
  if(!s||!r) return;
  const d1=new Date(s+'T12:00');const d2=new Date(r+'T12:00');
  diasContratados=[];
  for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1))
    diasContratados.push({data:d.toISOString().split('T')[0],hIni:'07:00',hFim:'19:00'});
  renderDias();
}
function addDia(){diasContratados.push({data:'',hIni:'08:00',hFim:'18:00'});renderDias();}
function renderDias(){
  const c=document.getElementById('dias-container');if(!c) return;
  c.innerHTML=diasContratados.map((d,i)=>`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:9px;flex-wrap:wrap">
      <div class="field" style="margin:0;min-width:110px;flex:0 0 auto">
        <label style="font-size:10px">Data</label>
        <input type="date" value="${d.data}" onchange="diasContratados[${i}].data=this.value"/>
      </div>
      <div class="field" style="margin:0;flex:1;min-width:90px">
        <label style="font-size:10px">Início contratado</label>
        <input type="time" value="${d.hIni}" onchange="diasContratados[${i}].hIni=this.value"/>
      </div>
      <div class="field" style="margin:0;flex:1;min-width:90px">
        <label style="font-size:10px">Fim contratado</label>
        <input type="time" value="${d.hFim}" onchange="diasContratados[${i}].hFim=this.value"/>
      </div>
      <button onclick="diasContratados.splice(${i},1);renderDias()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;padding:4px;margin-top:14px">×</button>
    </div>`).join('');
}

function cancelarOS(){
  document.getElementById('form-nova-os').style.display='none';
  document.getElementById('os-list').closest('.card').style.display='block';
}

function criarOS(){
  const num=document.getElementById('f-num').value.trim();
  const cli=document.getElementById('f-cli').value.trim();
  if(!num||!cli){
    setFeedback('fb-criar-os','✕ Preencha ao menos o Nº da OS e o Cliente.','err');
    return;
  }
  const btnCriar=document.getElementById('btn-criar-os');
  if(btnCriar){btnCriar.disabled=true;btnCriar.textContent='Salvando...';}
  const opId=document.getElementById('f-op').value;
  const opUser=usuarios.find(u=>u.id===opId);
  const os={
    id:'os_'+Date.now(),num,cliente:cli,
    evento:document.getElementById('f-evt').value,
    dataSaida:document.getElementById('f-saida').value,
    dataRetorno:document.getElementById('f-ret').value,
    endereco:document.getElementById('f-end').value,
    cidade:document.getElementById('f-cid').value,
    uf:document.getElementById('f-uf').value,
    cep:document.getElementById('f-cep').value,
    contato:document.getElementById('f-contato').value,
    fone:document.getElementById('f-fone').value,
    cnpj:document.getElementById('f-cnpj').value,
    instrucoes:document.getElementById('f-inst').value,
    equipamentos:equipamentosOS.length?[...equipamentosOS]:[],
    // compatibilidade retroativa: primeiro gerador como potencia/patrimonio
    potencia:(equipamentosOS.find(e=>e.tipo==='gerador')||{}).potencia||'',
    patrimonio:(equipamentosOS.find(e=>e.tipo==='gerador')||{}).patrimonio||'',
    diasContratados:[...diasContratados],
    operadorId:opId,
    operadorNome:opUser?opUser.nome:'',
    criadoPor:sessaoAtual.nome,
    criadoEm:new Date().toISOString(),
    status:'aberta'
  };
  ordens.push(os);
  const btnCriar2=document.getElementById('btn-criar-os');
  fbSaveWithFeedback(()=>saveAll(), btnCriar2, 'fb-criar-os').then(()=>{
    cancelarOS();renderOSList();
    const link=window.location.href.split('?')[0]+'?os='+os.id;
    showLinkPopup(os,link);
  }).catch(()=>{
    if(btnCriar2){btnCriar2.disabled=false;btnCriar2.textContent='Criar OS e Gerar Link';}
  });
}

function fecharOSConf(id){if(confirm('Confirmar fechamento desta OS?')){const os=ordens.find(o=>o.id===id);if(os){os.status='fechada';saveAll();verOS(id);}}}
function excluirOS(id){
  const os=ordens.find(o=>o.id===id);if(!os) return;
  const regsCount=registros.filter(r=>r.osId===id).length;
  const aviso=regsCount>0?`\n\n⚠️ Esta OS tem ${regsCount} registro(s) de operador. Eles também serão excluídos.`:'';
  if(!confirm(`Excluir permanentemente a OS ${os.num} — ${os.cliente}?${aviso}\n\nEsta ação não pode ser desfeita.`)) return;
  ordens=ordens.filter(o=>o.id!==id);
  registros=registros.filter(r=>r.osId!==id);
  fbSaveWithFeedback(()=>saveAll(), null, null).then(()=>{
    showToast(`OS ${os.num} excluída`);
    fecharDet();
    renderOSList();
  }).catch(e=>showToast('Erro ao excluir: '+(e&&e.message?e.message:'falha'),'err'));
}

function opStep(n){
  for(let i=0;i<4;i++){
    document.getElementById('op'+i).style.display=i===n?'block':'none';
    const s=document.getElementById('st'+i);
    if(s) s.className='step '+(i<n?'done':i===n?'active':'');
  }
  if(n===3) setTimeout(initSig,80);
}

function calcHE(){
  if(!opOS) return;
  const data=document.getElementById('op-data')?.value;
  const part=document.getElementById('op-part')?.value;
  const par=document.getElementById('op-par')?.value;
  if(!part||!par) return;
  const pM=toMin(part),sM=toMin(par);
  const totH=(sM>pM?sM-pM:sM+1440-pM)/60;
  // HE máquina
  const dc=opOS.diasContratados?.find(d=>d.data===data);
  const wEl=document.getElementById('he-maq-warn');
  // HE máquina — regra: contrato sempre 12h independente do horário
  const CONTRATO_MAQUINA_H = 12;
  const heM_calc = Math.max(0, totH - CONTRATO_MAQUINA_H);
  if(wEl){
    if(heM_calc > 0){
      document.getElementById('he-maq-txt').textContent=`Gerador operou ${totH.toFixed(1)}h — excedeu ${heM_calc.toFixed(1)}h do contrato de ${CONTRATO_MAQUINA_H}h.`;
      wEl.classList.add('show');
    } else wEl.classList.remove('show');
  }
  // HE operador — usa valor individual do operador (ou global como fallback)
  const jorH=(toMin(config.jornadaFim)-toMin(config.jornadaIni))/60-config.intervalo;
  const heO=Math.max(0,totH-config.intervalo-jorH);
  const opUser=opOS?usuarios.find(u=>u.id===opOS.operadorId):null;
  const heValorOp=(opUser&&opUser.heValor>0)?opUser.heValor:config.heValor;
  const rEl=document.getElementById('he-op-res');
  if(rEl&&totH>0){
    rEl.style.display='block';
    const val=heO*heValorOp;
    const heMin=Math.round(heO*60);
    rEl.innerHTML=`Total: <strong>${totH.toFixed(1)}h</strong> · HE: <strong style="color:${heO>0?'var(--yellow)':'var(--green)'};">${heMin}min</strong>${heO>0?` · <strong>R$ ${val.toFixed(2)}</strong> <span style="font-size:11px;color:var(--dim)">(R$${heValorOp}/h)</span>`:''}`;
  }
}

const sigPads={};
function initSigPad(id){
  const canvas=document.getElementById(id);if(!canvas) return;
  const rect=canvas.getBoundingClientRect();
  canvas.width=Math.floor(rect.width*window.devicePixelRatio)||400;
  canvas.height=155*window.devicePixelRatio||155;
  canvas.style.width='100%';canvas.style.height='155px';
  const ctx=canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  ctx.strokeStyle='#111';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  sigPads[id]={ctx,hasData:false,drawing:false};
  const gp=e=>{const r=canvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top}};
  canvas.onmousedown=canvas.ontouchstart=e=>{e.preventDefault();sigPads[id].drawing=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y)};
  canvas.onmousemove=canvas.ontouchmove=e=>{e.preventDefault();if(!sigPads[id].drawing) return;const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();sigPads[id].hasData=true};
  canvas.onmouseup=canvas.ontouchend=()=>{sigPads[id].drawing=false};
}
function initSig(){initSigPad('sigCanvas');initSigPad('sigCanvasOp');}
function clearSig(id){const p=sigPads[id];if(p){const c=document.getElementById(id);p.ctx.clearRect(0,0,c.width,c.height);p.hasData=false;}}

let lastReg=null;
let regEnviado=false; // trava de reenvio
function finalizarReg(){
  if(regEnviado){alert('Esta OS já foi enviada. Para registrar outro dia, volte e selecione a OS novamente.');return;}
  const data=document.getElementById('op-data')?.value;
  const part=document.getElementById('op-part')?.value;
  const par=document.getElementById('op-par')?.value;
  if(!data||!part||!par){alert('Preencha data e horários.');return;}
  const pM=toMin(part),sM=toMin(par);
  const totH=(sM>pM?sM-pM:sM+1440-pM)/60;
  const jorH=(toMin(config.jornadaFim)-toMin(config.jornadaIni))/60-config.intervalo;
  const heO=Math.max(0,totH-config.intervalo-jorH);
  // Cálculo proporcional: usa valor HE individual do operador
  const _opUser=opOS?usuarios.find(u=>u.id===opOS.operadorId):null;
  const _heValorOp=(_opUser&&_opUser.heValor>0)?_opUser.heValor:config.heValor;
  const valHEop=heO*_heValorOp;
  // HE máquina — sempre 12h de contrato, independente do horário configurado
  const _CONTRATO_H = 12;
  const heM = Math.max(0, totH - _CONTRATO_H);
  const sigCliente=sigPads['sigCanvas']?.hasData?document.getElementById('sigCanvas').toDataURL('image/png'):null;
  const sigOperador=sigPads['sigCanvasOp']?.hasData?document.getElementById('sigCanvasOp').toDataURL('image/png'):null;
  lastReg={
    id:'reg_'+Date.now(),osId:opOS.id,osNum:opOS.num,cliente:opOS.cliente,
    operadorId:opOS.operadorId,operadorNome:opOS.operadorNome,
    data,partida:part,parada:par,
    horIni:document.getElementById('op-hi')?.value||'',
    horFim:document.getElementById('op-hf')?.value||'',
    obs:document.getElementById('op-obs')?.value||'',
    placa:document.getElementById('op-placa')?.value||'',
    motorista:document.getElementById('op-mot')?.value||'',
    itinerario:document.getElementById('op-itin')?.value||'',
    respCliente:document.getElementById('op-resp')?.value||'',
    nomeOperador:document.getElementById('op-nome-op')?.value||opOS.operadorNome||'',
    assinatura:sigCliente,assinaturaOp:sigOperador,
    heOperador:heO,valorHEOperador:valHEop,heMaquina:heM,totalHoras:totH,
    criadoEm:new Date().toISOString()
  };
  registros.push(lastReg);
  const btnFin=document.getElementById('btn-finalizar');
  if(btnFin){btnFin.disabled=true;btnFin.textContent='Enviando...';}
  saveAll().then(()=>{
    regEnviado=true;
    _finalizarRegUI();
  }).catch(e=>{
    if(btnFin){btnFin.disabled=false;btnFin.textContent='✓ Enviar Assinaturas e Finalizar OS';}
    showToast('Erro ao salvar: '+(e&&e.message?e.message:'falha'),'err');
  });
  return; // execução continua em _finalizarRegUI após Promise
}

function gerarRel(){
  const mes=document.getElementById('rel-mes').value;
  const opF=document.getElementById('rel-op').value;
  if(!mes){alert('Selecione o mês.');return;}
  const regs=registros.filter(r=>r.data.startsWith(mes)&&(!opF||r.operadorId===opF));
  const jorH=(toMin(config.jornadaFim)-toMin(config.jornadaIni))/60-config.intervalo;
  const porOp={};
  regs.forEach(r=>{
    const k=r.operadorId||r.operadorNome||'—';
    if(!porOp[k]) porOp[k]={nome:r.operadorNome||k,regs:[]};
    porOp[k].regs.push(r);
  });
  let totH=0,totHE=0,totVal=0,totHEMaq=0;
  const linhas=[];
  Object.values(porOp).forEach(op=>{
    const h=op.regs.reduce((a,r)=>a+(r.totalHoras||0),0);
    const he=op.regs.reduce((a,r)=>a+(r.heOperador||0),0);
    // Usa valorHEOperador gravado no registro (proporcional), ou recalcula
    const val=op.regs.reduce((a,r)=>a+(r.valorHEOperador!=null?r.valorHEOperador:r.heOperador*config.heValor),0);
    const heMin=Math.round(he*60);
    totH+=h;totHE+=he;totVal+=val;
    linhas.push(`<tr><td>${op.nome}</td><td>${(h-he).toFixed(1)}h</td><td style="color:var(--yellow)">${heMin}min</td><td style="color:var(--yellow)">R$ ${val.toFixed(2)}</td><td><strong>${h.toFixed(1)}h</strong></td></tr>`);
  });
  regs.forEach(r=>totHEMaq+=r.heMaquina||0);
  const maqLinhas=regs.filter(r=>r.heMaquina>0).map(r=>`<tr><td>OS ${r.osNum}</td><td>${r.cliente}</td><td>${fmtData(r.data)}</td><td style="color:var(--yellow)">${r.heMaquina.toFixed(1)}h</td></tr>`).join('');
  document.getElementById('rel-out').style.display='block';
  document.getElementById('rel-out').innerHTML=`
  <div class="metric-grid">
    <div class="metric-card"><div class="metric-label">Registros</div><div class="metric-value">${regs.length}</div></div>
    <div class="metric-card"><div class="metric-label">Total horas</div><div class="metric-value">${totH.toFixed(1)}h</div></div>
    <div class="metric-card"><div class="metric-label">HE Operadores</div><div class="metric-value" style="color:var(--yellow)">${totHE.toFixed(1)}h</div><div class="metric-sub">R$ ${totVal.toFixed(2)}</div></div>
    <div class="metric-card"><div class="metric-label">HE Máquina</div><div class="metric-value" style="color:var(--yellow)">${totHEMaq.toFixed(1)}h</div><div class="metric-sub">a faturar ao cliente</div></div>
  </div>
  <div class="card"><div class="card-title">Por Operador</div>
    <table class="tbl"><thead><tr><th>Operador</th><th>Normal</th><th>HE</th><th>Valor HE</th><th>Total</th></tr></thead>
    <tbody>${linhas.join('')||'<tr><td colspan="5" style="color:var(--dim);text-align:center">Sem registros</td></tr>'}</tbody></table>
  </div>
  <div class="card"><div class="card-title">HE Máquina (Faturáveis)</div>
    <table class="tbl"><thead><tr><th>OS</th><th>Cliente</th><th>Data</th><th>HE</th></tr></thead>
    <tbody>${maqLinhas||'<tr><td colspan="4" style="color:var(--dim);text-align:center">Nenhuma</td></tr>'}</tbody></table>
  </div>
  <button class="btn btn-secondary btn-sm" style="width:auto" onclick="expCSV()">📥 Exportar CSV</button>`;
}

function expCSV(){
  const mes=document.getElementById('rel-mes').value;
  const regs2=registros.filter(r=>r.data.startsWith(mes));
  const h=['Data','OS','Cliente','Operador','Liga','Desliga','Total h','HE Op','HE Máq','Hor Ini','Hor Fim','Obs'];
  const rows=regs2.map(r=>[r.data,r.osNum,r.cliente,r.operadorNome,r.partida,r.parada,r.totalHoras?.toFixed(1),r.heOperador?.toFixed(1),r.heMaquina?.toFixed(1),r.horIni,r.horFim,r.obs]);
  const csv=[h,...rows].map(r=>r.map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download=`sos-os-${mes}.csv`;a.click();
}

const RESPOSTAS_TECNICAS={
  paralelo:['paralelo','sincronizar','sincronismo'],'partida':['partida','ligar','dar partida','não liga','não inicia'],
  'disjuntor':['disjuntor','trip','desarmou','desarmando'],'fusível':['fusível','fusivel','queimou'],
  'horímetro':['horímetro','horimetro'],'kva':['kva','potência','potencia','carga'],
  'terra':['aterramento','terra','proteção'],'avr':['avr','tensão','regulador']
};
const RESP_MAP={
  paralelo:`Para paralelizar dois geradores:\n1. Verifique que ambos têm a **mesma tensão** (ex: 220V ou 380V)\n2. **Mesma frequência** (60Hz)\n3. **Mesma sequência de fases** (use fasímetro)\n4. Sincronize a tensão e frequência antes de fechar o disjuntor de paralelo\n5. Use o sincronoscópio ou LEDs para confirmar o sincronismo\n⚠️ Nunca feche o disjuntor sem sincronismo — pode danificar o alternador.`,
  partida:`Gerador não dá partida — checklist:\n1. ✅ Nível do óleo (abaixo do mínimo = bloqueio automático)\n2. ✅ Nível do combustível\n3. ✅ Bateria carregada (mínimo 12V)\n4. ✅ Parada de emergência pressionada?\n5. ✅ Alarme ativo no painel?\n6. ✅ Filtro de combustível entupido?\nSe tudo OK e não parte: verifique bobina do motor de arranque.`,
  disjuntor:`Disjuntor desarmando — causas mais comuns:\n1. **Sobrecarga** — carga conectada maior que a capacidade do gerador\n2. **Curto-circuito** na instalação do cliente\n3. **Aquecimento** — verifique ventilação do gerador\n4. **Falha no AVR** — tensão instável causando pico\nProcedimento: desligue a carga, reset o disjuntor, reconecte a carga gradualmente.`,
  fusível:`Fusível queimado:\n1. Identifique o circuito (painel, bateria, 24V)\n2. Verifique **amperagem correta** — nunca substitua por fusível de amperagem maior\n3. Antes de trocar, identifique a **causa** (curto, sobrecarga)\n4. Fusível do painel 24V: geralmente 5A ou 10A conforme o modelo`,
  horímetro:`O horímetro registra as horas de funcionamento do motor.\n- Horímetro **eletromecânico**: funciona enquanto o motor está rodando\n- Horímetro **digital**: pode ter função de horas parciais\n- Para manutenção: troca de óleo a cada **250-500h** conforme o fabricante\n- Anote sempre o horímetro no início e fim de cada locação`,
  kva:`Cálculo de carga:\n- **KVA**: potência aparente\n- **KW**: potência ativa (KVA × fator de potência)\n- FP típico: 0,8 (motores) a 0,95 (resistivos)\n- Regra prática: não ultrapasse **70-80% da capacidade** do gerador\n- Ex: gerador 180KVA → use no máx. 144KVA de carga`,
  terra:`Aterramento:\n1. Gerador deve estar **aterrado** antes de ligar qualquer carga\n2. Resistência máxima: **5Ω** (NBR 5410)\n3. Em eventos: use estaca de aterramento temporária (mínimo 60cm no solo)\n4. Verifique continuidade do barramento de terra do gerador ao quadro do cliente\n⚠️ Sem aterramento: risco de choque e danos ao equipamento`,
  avr:`AVR (Regulador Automático de Tensão):\n- Mantém a tensão estável sob variação de carga\n- Sintoma de AVR com problema: tensão instável (sobe/desce)\n- Ajuste de tensão: potenciômetro no AVR (geralmente etiqueta V+ / V-)\n- Se a tensão não estabiliza mesmo ajustando: AVR pode precisar de troca\n- Modelos comuns: Stamford AS480, Leroy Somer D350, Newage`
};

let chatFotoBase64=null; // foto pendente para envio

function anexarFoto(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    chatFotoBase64=ev.target.result; // data:image/...;base64,...
    const thumb=document.getElementById('chat-img-thumb');
    const preview=document.getElementById('chat-img-preview');
    if(thumb) thumb.src=chatFotoBase64;
    if(preview) preview.style.display='block';
  };
  reader.readAsDataURL(file);
  e.target.value=''; // reset input para permitir mesma foto
}

function removerFoto(){
  chatFotoBase64=null;
  const preview=document.getElementById('chat-img-preview');
  if(preview) preview.style.display='none';
}

// ── RECONHECIMENTO DE VOZ ──
let _micRecognition=null;
let _micGravando=false;

function toggleMic(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    showToast('Seu navegador não suporta reconhecimento de voz. Use Chrome ou Safari.','err');
    return;
  }
  if(_micGravando){
    _micRecognition&&_micRecognition.stop();
    return;
  }
  _micRecognition=new SpeechRecognition();
  _micRecognition.lang='pt-BR';
  _micRecognition.continuous=false;
  _micRecognition.interimResults=true;

  const btnMic=document.getElementById('btn-mic');
  const inp=document.getElementById('chat-in');

  _micRecognition.onstart=()=>{
    _micGravando=true;
    if(btnMic){btnMic.classList.add('gravando');btnMic.title='Gravando... clique para parar';}
    showToast('🎙️ Ouvindo...');
  };
  _micRecognition.onresult=(e)=>{
    let texto='';
    for(let i=e.resultIndex;i<e.results.length;i++) texto+=e.results[i][0].transcript;
    inp.value=texto;
  };
  _micRecognition.onerror=(e)=>{
    _micGravando=false;
    if(btnMic){btnMic.classList.remove('gravando');btnMic.title='Enviar mensagem por voz';}
    if(e.error==='not-allowed') showToast('Permissão de microfone negada. Permita o acesso nas configurações do navegador.','err');
    else if(e.error!=='aborted') showToast('Erro no microfone: '+e.error,'err');
  };
  _micRecognition.onend=()=>{
    _micGravando=false;
    if(btnMic){btnMic.classList.remove('gravando');btnMic.title='Enviar mensagem por voz';}
    // Se capturou algo, envia automaticamente
    const val=inp.value.trim();
    if(val) enviarChat();
  };

  _micRecognition.start();
}

async function enviarChat(){
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim();
  const temFoto=!!chatFotoBase64;
  if(!msg && !temFoto) return;
  inp.value='';

  const msgs=document.getElementById('chat-msgs');
  // Mostra msg do usuário + thumb da foto se houver
  let userBubble=`<div class="chat-msg user" style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">`;
  if(temFoto) userBubble+=`<img src="${chatFotoBase64}" style="max-height:120px;max-width:200px;border-radius:8px;border:2px solid rgba(255,255,255,.3)"/>`;
  if(msg) userBubble+=`<span>${escHtml(msg)}</span>`;
  userBubble+=`</div>`;
  msgs.innerHTML+=userBubble;
  msgs.scrollTop=msgs.scrollHeight;

  const fotoParaEnviar=chatFotoBase64;
  removerFoto(); // limpa preview

  const typing=document.createElement('div');
  typing.className='chat-msg ai typing';typing.id='typing';
  typing.textContent=temFoto?'Analisando imagem...':'Digitando...';
  msgs.appendChild(typing);msgs.scrollTop=msgs.scrollHeight;

  // Tentar OpenAI — lê a chave do Firebase em tempo real
  let openaiKey = config.openaiKey || '';
  try {
    const cfgSnap = await db.ref('config/openaiKey').once('value');
    if (cfgSnap.val()) { openaiKey = cfgSnap.val(); config.openaiKey = openaiKey; }
  } catch(e) {}

  if(openaiKey){
    // Monta conteúdo da mensagem — texto e/ou imagem
    let userContent;
    if(temFoto){
      userContent=[];
      if(msg) userContent.push({type:'text',text:msg});
      else userContent.push({type:'text',text:'O que está escrito/mostrado nessa imagem? Explique em português o que significa para um operador de gerador.'});
      // extrai só o base64 puro sem o prefixo data:...
      const b64=fotoParaEnviar.split(',')[1];
      const mime=fotoParaEnviar.split(';')[0].split(':')[1];
      userContent.push({type:'image_url',image_url:{url:`data:${mime};base64,${b64}`,detail:'high'}});
    } else {
      userContent=msg;
    }
    chatHistory.push({role:'user',content:userContent});
    try{
      const res=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+openaiKey},
        body:JSON.stringify({
          model:'gpt-4o', // gpt-4o suporta visão (imagens)
          messages:[
            {role:'system',content:'Você é um técnico especialista em geradores elétricos, grupos geradores diesel, instalações elétricas industriais e de eventos. Responda em português brasileiro de forma prática e clara. Se receber uma imagem de painel, controladora ou equipamento em inglês, traduza e explique o que significa para o operador. Foque em procedimentos seguros, normas ABNT, e boas práticas de campo. Empresa: SOS Energia, locação de geradores.'},
            ...chatHistory
          ],
          max_tokens:800
        })
      });
      const data=await res.json();
      if(data.error){throw new Error(data.error.message);}
      const reply=data.choices?.[0]?.message?.content||'Não consegui processar a resposta.';
      chatHistory.push({role:'assistant',content:reply});
      document.getElementById('typing')?.remove();
      msgs.innerHTML+=`<div class="chat-msg ai">${formatMd(reply)}</div>`;
      msgs.scrollTop=msgs.scrollHeight;
      return;
    }catch(e){
      document.getElementById('typing')?.remove();
      msgs.innerHTML+=`<div class="chat-msg ai" style="color:var(--red-light)">⚠️ Erro na IA: ${escHtml(e.message||'Falha na conexão')}. Verifique a chave OpenAI nas Configurações.</div>`;
      msgs.scrollTop=msgs.scrollHeight;
      return;
    }
  }

  // Fallback: respostas pré-programadas
  await new Promise(r=>setTimeout(r,800));
  document.getElementById('typing')?.remove();
  if(temFoto){
    msgs.innerHTML+=`<div class="chat-msg ai">📷 Recebi a foto! Para analisar imagens preciso da chave OpenAI configurada em <strong>Config → Agente IA</strong>. Sem ela consigo responder apenas perguntas de texto.</div>`;
    msgs.scrollTop=msgs.scrollHeight;
    return;
  }
  const msgLower=msg.toLowerCase();
  let resp='Não tenho uma resposta específica para isso no momento. Para dúvidas técnicas complexas, entre em contato com o suporte técnico da SOS Energia ou consulte o manual do equipamento.';
  for(const [key,kws] of Object.entries(RESPOSTAS_TECNICAS)){
    if(kws.some(k=>msgLower.includes(k))){resp=RESP_MAP[key];break;}
  }
  msgs.innerHTML+=`<div class="chat-msg ai">${formatMd(resp)}</div>`;
  msgs.scrollTop=msgs.scrollHeight;
}

function formatMd(t){return escHtml(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br/>');}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

      <button class="btn btn-ghost btn-sm" style="width:auto" onclick="expBackup()">📥 Backup</button>
      <button class="btn btn-ghost btn-sm" style="width:auto" onclick="document.getElementById('imp-file').click()">📤 Restaurar</button>
      <button class="btn btn-ghost btn-sm" style="width:auto;color:var(--red)" onclick="limparTudo()">🗑 Apagar tudo</button>
    </div>
    <input type="file" id="imp-file" accept=".json" style="display:none" onchange="impBackup(event)"/>
  </div>`;
  renderUsers();
}

function svcfg(btnId, feedbackId){
  config.jornadaIni=document.getElementById('cfg-ji')?.value||config.jornadaIni;
  config.jornadaFim=document.getElementById('cfg-jf')?.value||config.jornadaFim;
  config.intervalo=parseFloat(document.getElementById('cfg-int')?.value)||1;
  config.heValor=parseFloat(document.getElementById('cfg-hevalor')?.value)||15;
  config.webhook=document.getElementById('cfg-wh')?.value||'';
  config.openaiKey=document.getElementById('cfg-oai')?.value||'';
  config.wppNumero=document.getElementById('cfg-wpp')?.value||'';
  const btn=btnId?document.getElementById(btnId):null;
  fbSaveWithFeedback(()=>saveAll(), btn, feedbackId||null);
}

function renderUsers(){
  const el=document.getElementById('lista-users');if(!el) return;
  el.innerHTML=usuarios.map(u=>`
    <div class="user-chip">
      <div>
        <span style="font-weight:600">${u.nome}</span>
        <span style="color:var(--dim);font-size:12px"> · ${u.user} · </span>
        <span class="badge ${u.perfil==='admin'?'badge-red':u.perfil==='comercial'?'badge-blue':'badge-yellow'}" style="font-size:10px">${u.perfil}</span>
        ${u.perfil==='operador'&&u.heValor?`<span style="color:var(--yellow);font-size:11px;margin-left:6px">R$${u.heValor}/h HE</span>`:''}
      </div>
      ${u.id!=='adm_0'?`<button onclick="delUser('${u.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:20px;line-height:1">×</button>`:'<span style="font-size:11px;color:var(--dim)">master</span>'}
    </div>`).join('');
}

function addUser(){
  const nome=document.getElementById('nu-nome')?.value.trim();
  const user=document.getElementById('nu-user')?.value.trim().toLowerCase();
  const pass=document.getElementById('nu-pass')?.value;
  const perfil=document.getElementById('nu-perfil')?.value;
  const heValor=parseFloat(document.getElementById('nu-he')?.value)||0;
  const btn=document.getElementById('btn-add-user');
  if(!nome||!user||!pass){setFeedback('fb-add-user','✕ Preencha nome, usuário e senha.','err');return;}
  if(usuarios.find(u=>u.user===user)){setFeedback('fb-add-user','✕ Usuário já existe.','err');return;}
  usuarios.push({id:'u_'+Date.now(),nome,user,senha:pass,perfil,heValor});
  fbSaveWithFeedback(()=>saveAll(), btn, 'fb-add-user').then(()=>{
    renderUsers();
    document.getElementById('nu-nome').value='';
    document.getElementById('nu-user').value='';
    document.getElementById('nu-pass').value='';
    document.getElementById('nu-he').value='';
  });
}
function delUser(id){if(confirm('Remover usuário?')){usuarios=usuarios.filter(u=>u.id!==id);saveAll();renderUsers();}}
function expBackup(){const d=JSON.stringify({ordens,registros,usuarios,config},null,2);const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(d);a.download='sos-backup-'+new Date().toISOString().split('T')[0]+'.json';a.click();}
function impBackup(e){const f=e.target.files[0];if(!f) return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(confirm(`Importar ${d.ordens?.length||0} OS, ${d.registros?.length||0} registros, ${d.usuarios?.length||0} usuários?`)){ordens=d.ordens||[];registros=d.registros||[];usuarios=d.usuarios||usuarios;config={...config,...(d.config||{})};saveAll();renderUsers();alert('Importado!')}}catch{alert('Arquivo inválido.')}};r.readAsText(f);}
function limparTudo(){if(confirm('Apagar TODOS os dados?')){ordens=[];registros=[];saveAll();renderOSList();alert('Dados apagados.');}}

// ════════════════════════════════════════
// GERAÇÃO DE PDF
// ════════════════════════════════════════
function gerarPDFRegistro(){
  if(!lastReg||!opOS) return;
  const regsOS=[lastReg];
  _gerarPDF(opOS, regsOS);
}

function gerarPDFOS(osId){
  const os=ordens.find(o=>o.id===osId);
  if(!os) return;
  const regsOS=registros.filter(r=>r.osId===osId);
  _gerarPDF(os, regsOS);
}

function _gerarPDF(os, regsOS){
  try{
  regsOS=Array.isArray(regsOS)?regsOS:[];
  const totHoras=regsOS.reduce((a,r)=>a+(r.totalHoras||0),0);
  const totHEOp=regsOS.reduce((a,r)=>a+(r.heOperador||0),0);
  const totHEMaq=regsOS.reduce((a,r)=>a+(r.heMaquina||0),0);
  const totValHE=regsOS.reduce((a,r)=>a+(r.valorHEOperador||0),0);
  const heOpMin=Math.round(totHEOp*60);
  const dataEmissao=new Date().toLocaleString('pt-BR');

  const registrosHTML=regsOS.map(r=>{
    const heM=r.heMaquina||0;
    const heO=r.heOperador||0;
    const heOMin=Math.round(heO*60);
    const valHE=r.valorHEOperador||0;
    return `
    <div class="reg-box">
      <div class="reg-header">
        <span class="reg-data">${fmtData(r.data)}</span>
        ${heM>0?`<span class="badge-warn">⚠ HE MÁQUINA: +${heM.toFixed(1)}h</span>`:`<span class="badge-ok">✓ Dentro do contrato</span>`}
      </div>
      <div class="reg-grid">
        <div><span class="lbl">Liga</span><span class="val">${r.partida||'—'}</span></div>
        <div><span class="lbl">Desliga</span><span class="val">${r.parada||'—'}</span></div>
        <div><span class="lbl">Total</span><span class="val">${(r.totalHoras||0).toFixed(1)}h</span></div>
        <div><span class="lbl">Horímetro</span><span class="val">${r.horIni||'—'} → ${r.horFim||'—'}</span></div>
        <div><span class="lbl">Operador</span><span class="val">${r.nomeOperador||r.operadorNome||'—'}</span></div>
        <div><span class="lbl">Motorista</span><span class="val">${r.motorista||'—'}</span></div>
        <div><span class="lbl">Placa</span><span class="val">${r.placa||'—'}</span></div>
        <div><span class="lbl">Itinerário</span><span class="val">${r.itinerario||'—'}</span></div>
        ${heO>0?`<div class="span2"><span class="lbl">HE Operador</span><span class="val he-val">${heOMin}min → R$ ${valHE.toFixed(2)}</span></div>`:''}
        ${r.obs?`<div class="span2"><span class="lbl">Observações</span><span class="val">${r.obs}</span></div>`:''}
      </div>
      <div class="sig-row">
        <div class="sig-box">
          <div class="sig-title">ASSINATURA DO CLIENTE</div>
          ${r.assinatura?`<img src="${r.assinatura}" class="sig-img"/>`:'<div class="sig-empty">Não coletada</div>'}
          <div class="sig-name">${r.respCliente||''}</div>
        </div>
        <div class="sig-box">
          <div class="sig-title">ASSINATURA DO OPERADOR</div>
          ${r.assinaturaOp?`<img src="${r.assinaturaOp}" class="sig-img"/>`:'<div class="sig-empty">Não coletada</div>'}
          <div class="sig-name">${r.nomeOperador||r.operadorNome||''}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>OS ${os.num} — ${os.cliente||''}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;font-size:11px;color:#111;background:#fff}
  @page{margin:12mm 14mm}
  /* CABEÇALHO */
  .header{background:#0a0a0a;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-left:5px solid #CC0000}
  .logo-txt{font-size:28px;font-weight:900;color:#CC0000;line-height:1;font-family:Arial Black,sans-serif}
  .logo-sub{font-size:9px;color:#aaa;margin-top:2px}
  .header-right{text-align:right}
  .os-num{font-size:20px;font-weight:900;color:#fff}
  .os-status{font-size:9px;color:#aaa;margin-top:2px}
  /* DASHBOARD */
  .dashboard{display:flex;gap:8px;margin-bottom:12px}
  .metric{flex:1;border:1px solid #ddd;border-radius:6px;padding:8px;text-align:center}
  .metric .m-lbl{font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .metric .m-val{font-size:14px;font-weight:900;margin-top:3px}
  .m-red{border-color:#CC0000;color:#CC0000}
  .m-warn{border-color:#f59e0b;color:#f59e0b}
  .m-ok{border-color:#22c55e;color:#22c55e}
  /* SEÇÕES */
  .sec-title{background:#CC0000;color:#fff;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.8px;padding:4px 10px;margin-bottom:6px;margin-top:10px}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;padding:0 4px;margin-bottom:4px}
  .info-row{display:flex;gap:6px;align-items:baseline}
  .info-lbl{font-size:9px;color:#888;font-weight:700;text-transform:uppercase;white-space:nowrap;min-width:70px}
  .info-val{font-size:10px;color:#111}
  .info-full{grid-column:1/-1}
  /* REGISTROS */
  .reg-box{border:1px solid #ddd;border-radius:6px;padding:10px;margin-bottom:10px;page-break-inside:avoid}
  .reg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:6px}
  .reg-data{font-size:12px;font-weight:700;color:#0a0a0a}
  .badge-warn{background:#fff3cd;color:#856404;border:1px solid #ffc107;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700}
  .badge-ok{background:#d1fae5;color:#065f46;border:1px solid #22c55e;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700}
  .reg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
  .span2{grid-column:span 2}
  .lbl{display:block;font-size:8px;color:#888;text-transform:uppercase;font-weight:700;margin-bottom:1px}
  .val{font-size:10px;color:#111;font-weight:500}
  .he-val{color:#d97706;font-weight:700}
  /* ASSINATURAS */
  .sig-row{display:flex;gap:12px;margin-top:8px;border-top:1px solid #eee;padding-top:8px}
  .sig-box{flex:1;border:1px solid #ddd;border-radius:4px;padding:8px;text-align:center}
  .sig-title{font-size:8px;font-weight:700;color:#CC0000;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .sig-img{max-height:60px;max-width:100%;object-fit:contain;display:block;margin:0 auto}
  .sig-empty{height:50px;display:flex;align-items:center;justify-content:center;color:#bbb;font-style:italic;font-size:9px}
  .sig-name{font-size:9px;color:#666;margin-top:4px;border-top:1px solid #eee;padding-top:3px}
  /* RODAPÉ */
  .footer{margin-top:16px;border-top:2px solid #CC0000;padding-top:8px;display:flex;justify-content:space-between;font-size:8px;color:#888}
  @media print{
    .no-print{display:none}
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
  /* BOTÃO IMPRIMIR */
  .print-bar{position:fixed;top:0;left:0;right:0;background:#CC0000;padding:10px 20px;display:flex;gap:12px;align-items:center;z-index:999}
  .print-bar button{background:#fff;color:#CC0000;border:none;padding:8px 20px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer}
  .print-bar span{color:#fff;font-size:13px;font-weight:600}
  @media print{.print-bar{display:none}body{padding-top:0}}
  body{padding-top:52px}
</style>
</head>
<body>
<div class="print-bar no-print">
  <span>OS ${os.num} — ${os.cliente||''}</span>
  <button onclick="window.print()">🖨️ Salvar / Imprimir PDF</button>
  <button onclick="window.close()" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4)">✕ Fechar</button>
</div>

<div class="header">
  <div>
    <div class="logo-txt">SOS</div>
    <div class="logo-sub">ENERGIA — Locação de Geradores</div>
  </div>
  <div class="header-right">
    <div class="os-num">ORDEM DE SERVIÇO Nº ${os.num}</div>
    <div class="os-status">${os.status==='fechada'?'ENCERRADA':'EM ANDAMENTO'} · Emitido em ${dataEmissao}</div>
  </div>
</div>

<div class="dashboard">
  <div class="metric"><div class="m-lbl">Registros</div><div class="m-val m-red">${regsOS.length}</div></div>
  <div class="metric"><div class="m-lbl">Horas Totais</div><div class="m-val">${totHoras.toFixed(1)}h</div></div>
  <div class="metric"><div class="m-lbl">HE Operador</div><div class="m-val ${totHEOp>0?'m-warn':'m-ok'}">${heOpMin}min</div></div>
  <div class="metric"><div class="m-lbl">HE Máquina</div><div class="m-val ${totHEMaq>0?'m-warn':'m-ok'}">${totHEMaq>0?totHEMaq.toFixed(1)+'h':'—'}</div></div>
  <div class="metric"><div class="m-lbl">Valor HE</div><div class="m-val ${totValHE>0?'m-warn':'m-ok'}">R$ ${totValHE.toFixed(2)}</div></div>
</div>

<div class="sec-title">Dados do Cliente / Evento</div>
<div class="info-grid">
  <div class="info-row"><span class="info-lbl">Cliente</span><span class="info-val"><strong>${os.cliente||'—'}</strong></span></div>
  <div class="info-row"><span class="info-lbl">Evento</span><span class="info-val">${os.evento||'—'}</span></div>
  <div class="info-row"><span class="info-lbl">Endereço</span><span class="info-val">${os.endereco||'—'}</span></div>
  <div class="info-row"><span class="info-lbl">Cidade/UF</span><span class="info-val">${(os.cidade||'')+(os.uf?'/'+os.uf:'')}</span></div>
  <div class="info-row"><span class="info-lbl">Contato</span><span class="info-val">${os.contato||'—'}</span></div>
  <div class="info-row"><span class="info-lbl">Fone</span><span class="info-val">${os.fone||'—'}</span></div>
  <div class="info-row"><span class="info-lbl">CNPJ</span><span class="info-val">${os.cnpj||'—'}</span></div>
  <div class="info-row"><span class="info-lbl">Operador</span><span class="info-val">${os.operadorNome||'—'}</span></div>
  <div class="info-row"><span class="info-lbl">Período</span><span class="info-val">${os.dataSaida?fmtData(os.dataSaida):'—'} → ${os.dataRetorno?fmtData(os.dataRetorno):'—'}</span></div>
  ${os.instrucoes?`<div class="info-row info-full"><span class="info-lbl">Instruções</span><span class="info-val">${os.instrucoes}</span></div>`:''}
</div>

<div class="sec-title">Equipamentos</div>
<div style="padding:0 4px;margin-bottom:4px">
${(()=>{
  const eqs=os.equipamentos&&os.equipamentos.length?os.equipamentos:[];
  if(!eqs.length) return `<div class="info-row"><span class="info-lbl">Gerador</span><span class="info-val">${os.potencia||'—'} · ${os.patrimonio||'—'}</span></div>`;
  const geradores=eqs.filter(e=>e.tipo==='gerador');
  const acessorios=eqs.filter(e=>e.tipo==='acessorio');
  let html='';
  if(geradores.length){
    html+=`<div style="font-size:9px;font-weight:700;color:#CC0000;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Geradores</div>`;
    html+=`<div class="info-grid" style="margin-bottom:8px">`+geradores.map(g=>`<div class="info-row"><span class="info-lbl">⚡ ${g.potencia||'—'}</span><span class="info-val">Pat: ${g.patrimonio||'—'}</span></div>`).join('')+`</div>`;
  }
  if(acessorios.length){
    html+=`<div style="font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;margin-top:4px">Acessórios</div>`;
    html+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">`+acessorios.map(a=>`<span style="background:#f3f4f6;border:1px solid #ddd;border-radius:4px;padding:2px 7px;font-size:9px">🔌 ${a.nome||'—'}${a.quantidade&&a.quantidade!='1'?' ×'+a.quantidade:''}</span>`).join('')+`</div>`;
  }
  return html;
})()}
</div>

<div class="sec-title">Registros do Operador (${regsOS.length})</div>
${registrosHTML||'<p style="color:#aaa;padding:8px 4px;font-size:11px">Nenhum registro.</p>'}

<div class="footer">
  <span>SOS Energia — Locação de Geradores</span>
  <span>OS ${os.num} | ${dataEmissao}</span>
</div>
</body></html>`;

  const win=window.open('','_blank');
  if(!win){showToast('Popup bloqueado. Permita popups para este site.','err');return;}
  win.document.write(html);
  win.document.close();
  showToast('PDF pronto — clique em "Salvar / Imprimir PDF"');
  }catch(e){showToast('Erro ao gerar PDF: '+(e&&e.message?e.message:String(e)),'err');console.error('_gerarPDF error',e);}
}

function fmtData(d){if(!d) return '';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
