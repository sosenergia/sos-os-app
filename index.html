const sigPads={};
// Variáveis temporárias para preservar assinaturas ao navegar entre steps
let _sigClienteTemp=null;
let _sigOperadorTemp=null;

function initSigPad(id){
  const canvas=document.getElementById(id);if(!canvas) return;
  const rect=canvas.getBoundingClientRect();
  canvas.width=Math.floor(rect.width*window.devicePixelRatio)||400;
  canvas.height=155*window.devicePixelRatio||155;
  canvas.style.width='100%';canvas.style.height='155px';
  const ctx=canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  ctx.strokeStyle='#111';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  sigPads[id]={ctx,hasData:false,drawing:false};
  const gp=e=>{const r=canvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top}};
  canvas.onmousedown=canvas.ontouchstart=e=>{e.preventDefault();sigPads[id].drawing=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y)};
  canvas.onmousemove=canvas.ontouchmove=e=>{e.preventDefault();if(!sigPads[id].drawing) return;const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();sigPads[id].hasData=true};
  canvas.onmouseup=canvas.ontouchend=()=>{sigPads[id].drawing=false};
}
function initSig(){
  // Salva assinaturas já preenchidas antes de reinicializar
  const scOld=document.getElementById('sigCanvas');
  const soOld=document.getElementById('sigCanvasOp');
  if(scOld&&sigPads['sigCanvas']?.hasData) _sigClienteTemp=scOld.toDataURL('image/png');
  if(soOld&&sigPads['sigCanvasOp']?.hasData) _sigOperadorTemp=soOld.toDataURL('image/png');

  // Só inicializa canvas que estão visíveis (dias intermediários têm display:none)
  const sc=document.getElementById('sigCanvas');
  const so=document.getElementById('sigCanvasOp');
  if(sc&&sc.style.display!=='none') initSigPad('sigCanvas');
  if(so&&so.style.display!=='none') initSigPad('sigCanvasOp');

  // Restaura assinaturas salvas nos novos canvases
  setTimeout(()=>{
    if(_sigClienteTemp&&sigPads['sigCanvas']){
      const img=new Image();
      img.onload=()=>{sigPads['sigCanvas'].ctx.drawImage(img,0,0,img.width/window.devicePixelRatio,img.height/window.devicePixelRatio);sigPads['sigCanvas'].hasData=true;};
      img.src=_sigClienteTemp;
    }
    if(_sigOperadorTemp&&sigPads['sigCanvasOp']){
      const img=new Image();
      img.onload=()=>{sigPads['sigCanvasOp'].ctx.drawImage(img,0,0,img.width/window.devicePixelRatio,img.height/window.devicePixelRatio);sigPads['sigCanvasOp'].hasData=true;};
      img.src=_sigOperadorTemp;
    }
  },50);
}
function clearSig(id){
  const p=sigPads[id];
  if(p){const c=document.getElementById(id);p.ctx.clearRect(0,0,c.width,c.height);p.hasData=false;}
  if(id==='sigCanvas') _sigClienteTemp=null;
  if(id==='sigCanvasOp') _sigOperadorTemp=null;
}

let lastReg=null;
let regEnviado=false;
function novoRegistroDia(){
  if(!opOS) return;
  // Reconstrói o formulário para refletir o novo estado (ex: transporte muda de Ida para Volta)
  regEnviado=false;
  buildOpForm(opOS);
  // Avança direto para Step 1 e, depois que o DOM estiver pronto,
  // pré-preenche horímetro inicial de cada gerador com o horFim do rascunho mais recente
  setTimeout(()=>{
    opStep(1);
    window.scrollTo({top:0,behavior:'smooth'});
    // Busca o rascunho mais recente desta OS+operador
    const rascunhos=registros
      .filter(r=>r.osId===opOS.id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho')
      .sort((a,b)=>b.data.localeCompare(a.data)); // mais recente primeiro
    const ultimo=rascunhos[0];
    if(!ultimo||!ultimo.geradoresReg) return;
    // Mapeia eqId → horFim do último rascunho
    const horFimPorEq={};
    ultimo.geradoresReg.forEach(g=>{ if(g.eqId&&g.horFim) horFimPorEq[g.eqId]=g.horFim; });
    // Preenche os inputs de horímetro inicial de cada gerador no formulário
    const geradores=(opOS.equipamentos||[]).filter(e=>e.tipo==='gerador');
    geradores.forEach((g,gi)=>{
      const hf=horFimPorEq[g.id];
      if(!hf) return;
      const input=document.getElementById(`g-hi-${gi}`);
      if(input&&!input.value){ // só preenche se estiver vazio (não sobrescreve edição manual)
        input.value=hf;
        // atualiza label para indicar que foi sugerido automaticamente
        const lbl=input.closest('.field')?.querySelector('label');
        if(lbl&&!lbl.dataset.orig){
          lbl.dataset.orig=lbl.textContent;
          lbl.innerHTML=`${lbl.textContent} <span style="color:var(--yellow);font-size:10px;font-weight:600">(sugerido)</span>`;
        }
      }
    });
  },100);
}

function finalizarReg(){
  const data=document.getElementById('op-data')?.value;
  if(!data){alert('Preencha a data.');return;}
  const temGerador=opOS&&((opOS.equipamentos&&opOS.equipamentos.some(e=>e.tipo==='gerador'))||(opOS.potencia&&!opOS.equipamentos?.length));
  const geradoresReg=temGerador?coletarGeradoresReg():[];
  // Validação: apenas geradores que rodaram precisam de horários
  if(temGerador){
    const ativos=geradoresReg.filter(g=>g.rodou);
    const semHorario=ativos.find(g=>{
      if(g.virou) return !g.dtLiga||!g.dtDesliga;
      return !g.part||!g.par;
    });
    if(semHorario){
      if(semHorario.virou) alert('Preencha a data/hora de liga e desliga do gerador '+(semHorario.potencia||'')+' (virou).');
      else alert('Preencha os horários de Liga/Desliga do gerador '+(semHorario.potencia||'')+'.');
      return;
    }
  }
  // Usa o primeiro gerador ativo como referência para campos legados (compatibilidade)
  const gRef=geradoresReg.find(g=>g.rodou)||geradoresReg[0]||null;
  const part=gRef?.part||'00:00';
  const par=gRef?.par||'00:00';
  const pM=toMin(part),sM=toMin(par);
  const totH=gRef?(sM>pM?sM-pM:sM+1440-pM)/60:0;
  // HE do operador = período de HE informado + chegada antecipada (se marcado)
  const _heIni=document.getElementById('op-he-ini')?.value||'';
  const _heFim=document.getElementById('op-he-fim')?.value||'';
  let heO=0;
  if(_heIni&&_heFim){
    const hIniM=toMin(_heIni),hFimM=toMin(_heFim);
    heO=(hFimM>hIniM?hFimM-hIniM:hFimM+1440-hIniM)/60;
  }
  // Chegada antecipada: soma horas antes das 08h ao heO
  const _cedoAtivo=document.getElementById('op-chegou-cedo')?.checked||false;
  const _cedoIni=document.getElementById('op-cedo-ini')?.value||'';
  const _cedoFim=document.getElementById('op-cedo-fim')?.value||'';
  let heCedo=0;
  if(_cedoAtivo&&_cedoIni&&_cedoFim){
    const cIniM=toMin(_cedoIni),cFimM=toMin(_cedoFim);
    heCedo=(cFimM>cIniM?cFimM-cIniM:cFimM+1440-cIniM)/60;
  }
  heO+=heCedo;
  const _opUser=opOS?usuarios.find(u=>u.id===sessaoAtual.id):null;
  const _heValorOp=(_opUser&&_opUser.heValor>0)?_opUser.heValor:config.heValor;
  const valHEop=heO*_heValorOp;
  // HE máquina — soma de todos os geradores que rodaram
  const heM=geradoresReg.reduce((a,g)=>a+(g.heM||0),0);
  // Captura assinaturas — usa canvas atual ou backup temporário
  const sigCliente=sigPads['sigCanvas']?.hasData
    ? document.getElementById('sigCanvas').toDataURL('image/png')
    : (_sigClienteTemp||null);
  const sigOperador=sigPads['sigCanvasOp']?.hasData
    ? document.getElementById('sigCanvasOp').toDataURL('image/png')
    : (_sigOperadorTemp||null);
  // Assinatura só é obrigatória no último dia
  const _dataFinalReg=document.getElementById('op-data')?.value||'';
  const _ultimoDiaReg=opOS?.dataRetorno ? _dataFinalReg>=opOS.dataRetorno : true;
  if(_ultimoDiaReg && !sigOperador){alert('A assinatura do operador é obrigatória.');return;}
  lastReg={
    id:'reg_'+Date.now(),osId:opOS.id,osNum:opOS.num,cliente:opOS.cliente,evento:opOS.evento||'',
    operadorId:sessaoAtual.id,operadorNome:sessaoAtual.nome,
    data,partida:part,parada:par,
    horIni:gRef?.horIni||'',
    horFim:gRef?.horFim||'',
    obs:document.getElementById('op-obs')?.value||'',
    heIni: document.getElementById('op-he-ini')?.value || '',
    heFim: document.getElementById('op-he-fim')?.value || '',
    chegouCedo: _cedoAtivo,
    cedoIni: _cedoAtivo?_cedoIni:'',
    cedoFim: _cedoAtivo?_cedoFim:'',
    heCedo,
    abastecido: document.getElementById('op-abastecido')?.value||'nao',
    litros: document.getElementById('op-litros')?.value||'',
    placa:document.getElementById('op-placa')?.value||'',
    motorista:document.getElementById('op-mot')?.value||'',
    itinerarioSaida:document.getElementById('op-itin-saida')?.value||'',
    itinerarioChegada:document.getElementById('op-itin-chegada')?.value||'',
    itinerarioSaidaVolta:document.getElementById('op-itin-saida-volta')?.value||'',
    itinerarioChegadaVolta:document.getElementById('op-itin-chegada-volta')?.value||'',
    respCliente:document.getElementById('op-resp')?.value||'',
    nomeOperador:document.getElementById('op-nome-op')?.value||sessaoAtual.nome||'',
    assinatura:sigCliente,assinaturaOp:sigOperador,
    geradoresReg,
    heOperador:heO,valorHEOperador:valHEop,heMaquina:heM,totalHoras:totH,
    refeicoes:refStepperVal('op-ref'),
    valorRefeicao:refStepperVal('op-ref')*25,
    status:'rascunho',
    criadoEm:new Date().toISOString()
  };
  registros=registros.filter(r=>r.id!==lastReg.id);
  registros.push(lastReg);
  DB.set('sos_registros',registros);
  const btnFin=document.getElementById('btn-finalizar');
  if(btnFin){btnFin.disabled=true;btnFin.textContent='Salvando...';}
  fbUpdate('registros/'+lastReg.id, lastReg).then(()=>{
    _finalizarRegUI();
  }).catch(()=>{
    _finalizarRegUI();
    showToast('Salvo localmente (Firebase indisponível)','err');
  });
  return;
}
function _finalizarRegUI(){
  // Limpa backups de assinatura após salvar com sucesso
  _sigClienteTemp=null;
  _sigOperadorTemp=null;
  for(let i=0;i<4;i++){const el=document.getElementById('op'+i);if(el)el.style.display='none';}
  _renderResumoOS();
  showToast('Dia salvo!');
  document.getElementById('op-ok').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function _renderResumoOS(){
  if(!opOS) return;
  const rascunhos=registros.filter(r=>r.osId===opOS.id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho');
  const enviados=registros.filter(r=>r.osId===opOS.id&&r.operadorId===sessaoAtual.id&&r.status==='enviado');
  const resumoEl=document.getElementById('op-ok-resumo');
  if(!resumoEl) return;

  // === OS PERIÓDICA (mensal/quinzenal/semanal) — exibe apenas entrega/devolução ===
  const isPeriodica=opOS.tipoLocacao&&opOS.tipoLocacao!=='evento';
  if(isPeriodica){
    const todosRegs=[...rascunhos,...enviados];
    const regEntrega=todosRegs.find(r=>r.checkEntrega);
    const regDevolucao=todosRegs.find(r=>r.checkDevolucao);
    const tipoLabel={'mensal':'Mensal','quinzenal':'Quinzenal','semanal':'Semanal'}[opOS.tipoLocacao]||opOS.tipoLocacao;
    resumoEl.innerHTML=`
      <div style="font-weight:700;font-size:13px;margin-bottom:10px">OS ${opOS.num} — ${opOS.cliente}${opOS.evento?' · '+opOS.evento:''}</div>
      <div style="font-size:11px;background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.25);border-radius:6px;padding:4px 10px;display:inline-block;margin-bottom:12px;color:#ff4444">📅 Locação ${tipoLabel}</div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <div style="flex:1;background:${regEntrega?'rgba(16,185,129,.12)':'rgba(234,179,8,.08)'};border:1px solid ${regEntrega?'rgba(16,185,129,.3)':'rgba(234,179,8,.2)'};border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:20px;margin-bottom:4px">📦</div>
          <div style="font-size:12px;font-weight:700;color:${regEntrega?'var(--green)':'var(--yellow)'}">${regEntrega?'✓ Entrega registrada':'Aguardando entrega'}</div>
          ${regEntrega?'<div style="font-size:11px;color:var(--dim);margin-top:3px">'+fmtData(regEntrega.data)+'</div>':''}
          ${regEntrega&&regEntrega.horimetro!=null?'<div style="font-size:11px;color:var(--dim);margin-top:2px">⏱ Horímetro: <strong>'+regEntrega.horimetro+'h</strong></div>':''}
        </div>
        <div style="flex:1;background:${regDevolucao?'rgba(16,185,129,.12)':'rgba(100,116,139,.08)'};border:1px solid ${regDevolucao?'rgba(16,185,129,.3)':'rgba(100,116,139,.2)'};border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:20px;margin-bottom:4px">🔄</div>
          <div style="font-size:12px;font-weight:700;color:${regDevolucao?'var(--green)':'var(--dim)'}">${regDevolucao?'✓ Devolução registrada':'Aguardando devolução'}</div>
          ${regDevolucao?'<div style="font-size:11px;color:var(--dim);margin-top:3px">'+fmtData(regDevolucao.data)+'</div>':''}
          ${regDevolucao&&regDevolucao.horimetro!=null?'<div style="font-size:11px;color:var(--dim);margin-top:2px">⏱ Horímetro: <strong>'+regDevolucao.horimetro+'h</strong></div>':''}
          ${regEntrega&&regDevolucao&&regEntrega.horimetro!=null&&regDevolucao.horimetro!=null?'<div style="font-size:11px;color:var(--yellow);margin-top:2px;font-weight:700">Δ '+(regDevolucao.horimetro-regEntrega.horimetro).toFixed(1)+'h rodadas</div>':''}
        </div>
      </div>`;
    // Oculta botões de fluxo de eventos
    const btnEnv=document.getElementById('btn-enviar-admin');
    if(btnEnv) btnEnv.style.display='none';
    const btnNovo=document.querySelector('button[onclick="novoRegistroDia()"]');
    if(btnNovo) btnNovo.style.display='none';
    // Mostra botão coletar outra assinatura se ainda não tem devolução
    const btnPeriod=document.getElementById('btn-coletar-assinatura-period');
    if(btnPeriod) btnPeriod.style.display=regDevolucao?'none':'block';
    return;
  }

  // === OS DE EVENTO (padrão) ===
  // Controla botão periódico (ocultar no fluxo de evento)
  const btnPeriod2=document.getElementById('btn-coletar-assinatura-period');
  if(btnPeriod2) btnPeriod2.style.display='none';

  // Calcula dias contratados e quais já foram preenchidos (rascunho OU enviado)
  let todosDiasPreenchidos=true;
  let diasFaltando=[];
  if(opOS.dataSaida&&opOS.dataRetorno){
    const datasSaida=new Date(opOS.dataSaida+'T12:00:00');
    const datasRetorno=new Date(opOS.dataRetorno+'T12:00:00');
    const datasCobertos=new Set([...rascunhos,...enviados].map(r=>r.data));
    for(let d=new Date(datasSaida);d<=datasRetorno;d.setDate(d.getDate()+1)){
      const iso=d.toISOString().split('T')[0];
      if(!datasCobertos.has(iso)) diasFaltando.push(iso);
    }
    todosDiasPreenchidos=diasFaltando.length===0;
  }

  // Dias enviados — exibe como somente leitura (verde)
  const diasEnviadosHTML=enviados.sort((a,b)=>a.data.localeCompare(b.data)).map(r=>
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">'+
      '<div>'+
        '<span style="font-size:10px;background:rgba(16,185,129,.15);color:var(--green);border-radius:4px;padding:1px 6px;margin-right:6px;font-weight:600">✓ Enviado</span>'+
        '<strong>'+fmtData(r.data)+'</strong>'+
        (r.geradoresReg&&r.geradoresReg.length?
          r.geradoresReg.filter(g=>!g.standby||g.rodou).map(g=>g.virou?'<span style="font-size:11px;color:var(--yellow);margin-left:6px">🔄 '+(g.potencia||'G')+'</span>':'<span style="font-size:11px;color:var(--dim);margin-left:6px">'+(g.potencia||'G')+' '+g.part+'→'+g.par+'</span>').join('')
          :'<span style="font-size:11px;color:var(--dim);margin-left:6px">'+r.partida+'→'+r.parada+'</span>')+
        (r.heOperador>0?'<span style="font-size:11px;color:var(--yellow);margin-left:6px">HE '+fmtHE(r.heOperador)+'</span>':'')+
      '</div>'+
    '</div>').join('');

  const diasRascunhoHTML=rascunhos.sort((a,b)=>a.data.localeCompare(b.data)).map(r=>
    '<div style="padding:8px 0;border-bottom:1px solid var(--border)">'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div>'+
          '<strong>'+fmtData(r.data)+'</strong>'+
          (r.geradoresReg&&r.geradoresReg.length?
            r.geradoresReg.filter(g=>!g.standby||g.rodou).map(g=>g.virou?'<span style="font-size:11px;color:var(--yellow);margin-left:6px">🔄 '+(g.potencia||'G')+'</span>':'<span style="font-size:11px;color:var(--dim);margin-left:6px">'+(g.potencia||'G')+' '+g.part+'→'+g.par+'</span>').join('')
            :'<span style="font-size:11px;color:var(--dim);margin-left:6px">'+r.partida+'→'+r.parada+'</span>')+
          (r.heOperador>0?'<span style="font-size:11px;color:var(--yellow);margin-left:6px">HE '+fmtHE(r.heOperador)+'</span>':'')+
        '</div>'+
        '<div style="display:flex;gap:6px;align-items:center">'+
          '<button onclick="editarHERascunho(\x27'+r.id+'\x27)" style="background:rgba(204,0,0,.15);border:1px solid rgba(204,0,0,.25);color:#CC0000;border-radius:6px;font-size:11px;padding:3px 8px;cursor:pointer" title="Editar HE deste dia">✏️ HE</button>'+
          '<button onclick="excluirRascunho(\x27'+r.id+'\x27)" style="background:none;border:none;color:var(--red-light);font-size:16px;cursor:pointer;padding:0 4px" title="Remover este dia">×</button>'+
        '</div>'+
      '</div>'+
      '<div style="margin-top:4px;font-size:11px;color:var(--dim)">'+
        (r.heIni&&r.heFim?'⏱ HE: '+r.heIni+' → '+r.heFim:'<span style="color:#f59e0b">⚠️ HE não preenchida</span>')+
        (r.chegouCedo&&r.cedoIni&&r.cedoFim?' · Cedo: '+r.cedoIni+'→'+r.cedoFim:'')+
      '</div>'+
    '</div>').join('');

  const faltandoHTML=diasFaltando.length?
    '<div style="background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);border-radius:8px;padding:10px;margin-top:8px">'+
      '<div style="font-size:12px;font-weight:700;color:var(--yellow);margin-bottom:4px">⏳ Dias ainda não registrados ('+diasFaltando.length+'):</div>'+
      diasFaltando.slice(0,7).map(d=>'<div style="font-size:12px;color:var(--dim);padding:2px 0">• '+fmtData(d)+'</div>').join('')+
      (diasFaltando.length>7?'<div style="font-size:11px;color:var(--dim);padding:4px 0 0 0">... e mais '+(diasFaltando.length-7)+' dias</div>':'')+
    '</div>':'';

  const totalRegs=rascunhos.length+enviados.length;
  resumoEl.innerHTML=`
    <div style="font-weight:700;font-size:13px;margin-bottom:8px">OS ${opOS.num} — ${opOS.cliente}${opOS.evento?' · '+opOS.evento:''}</div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:6px">${totalRegs} dia${totalRegs!==1?'s':''} registrado${totalRegs!==1?'s':''}${rascunhos.length>0?' · '+rascunhos.length+' aguardando envio':' · ✓ Tudo enviado'}</div>
    ${diasEnviadosHTML}
    ${diasRascunhoHTML}
    ${!totalRegs?'<div style="color:var(--dim);font-size:12px">Nenhum dia salvo ainda.</div>':''}
    ${faltandoHTML}`;

  // Controla visibilidade do botão de envio
  const btnEnv=document.getElementById('btn-enviar-admin');
  if(btnEnv){
    btnEnv.style.display=todosDiasPreenchidos&&rascunhos.length>0?'block':'none';
  }
  // Controla botão de registrar outro dia
  const btnNovo=document.querySelector('button[onclick="novoRegistroDia()"]');
  if(btnNovo){
    btnNovo.style.display=todosDiasPreenchidos&&diasFaltando.length===0?'none':'block';
  }
}

function editarHERascunho(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r){showToast('Registro não encontrado','err');return;}
  const modal=document.createElement('div');
  modal.id='modal-he-rasc';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9990;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML=`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:380px;width:100%;padding:20px;max-height:90vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-weight:700;font-size:15px">✏️ Editar HE — ${fmtData(r.data)}</div>
        <button onclick="document.getElementById('modal-he-rasc').remove()" style="background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer">×</button>
      </div>
      <div style="background:rgba(204,0,0,.08);border:1px solid rgba(204,0,0,.18);border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px;color:var(--dim)">
        Preencha os horários de HE após chegar na empresa. Os dados salvos neste dia não serão perdidos.
      </div>
      <div class="field">
        <label>HE Início</label>
        <input type="time" id="ehr-ini" value="${r.heIni||''}"/>
      </div>
      <div class="field">
        <label>HE Fim</label>
        <input type="time" id="ehr-fim" value="${r.heFim||''}"/>
      </div>
      <div id="ehr-preview" style="font-size:12px;color:var(--yellow);min-height:18px;margin:-4px 0 10px 0"></div>
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:8px">
          <input type="checkbox" id="ehr-cedo" ${r.chegouCedo?'checked':''}/>
          Chegou cedo (antes das 08h)
        </label>
        <div id="ehr-cedo-fields" style="display:${r.chegouCedo?'grid':'none'};grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
          <div class="field" style="margin:0"><label style="font-size:11px">Entrada cedo</label><input type="time" id="ehr-cedo-ini" value="${r.cedoIni||''}"/></div>
          <div class="field" style="margin:0"><label style="font-size:11px">Saída cedo</label><input type="time" id="ehr-cedo-fim" value="${r.cedoFim||''}"/></div>
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:14px">
        <div style="font-size:12px;color:var(--dim);margin-bottom:8px">🍽 Refeições</div>
        <div style="display:flex;align-items:center;gap:12px">
          ${refStepperHTML('ehr-ref',r.refeicoes||0)}
          <span style="font-size:12px;color:var(--dim)">refeição(ões) · R$ 25,00 cada</span>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button onclick="document.getElementById('modal-he-rasc').remove()" style="flex:1;padding:11px;background:var(--dark);border:1px solid var(--border);color:var(--dim);border-radius:10px;font-size:13px;cursor:pointer">Cancelar</button>
        <button onclick="salvarHERascunho('${r.id}')" style="flex:1;padding:11px;background:rgba(204,0,0,.18);border:1px solid rgba(204,0,0,.3);color:#CC0000;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">💾 Salvar HE</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  // Preview dinâmico
  function atualizarPreviewHER(){
    const ini=document.getElementById('ehr-ini')?.value;
    const fim=document.getElementById('ehr-fim')?.value;
    const prev=document.getElementById('ehr-preview');
    if(!prev) return;
    if(ini&&fim){const iM=toMin(ini),fM=toMin(fim);const h=(fM>iM?fM-iM:fM+1440-iM)/60;prev.textContent=`⏱ ${fmtHE(h)} de HE`;}
    else{prev.textContent='';}
  }
  document.getElementById('ehr-ini')?.addEventListener('change',atualizarPreviewHER);
  document.getElementById('ehr-fim')?.addEventListener('change',atualizarPreviewHER);
  document.getElementById('ehr-cedo')?.addEventListener('change',function(){
    const cf=document.getElementById('ehr-cedo-fields');
    if(cf) cf.style.display=this.checked?'grid':'none';
  });
  atualizarPreviewHER();
}

function salvarHERascunho(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r){showToast('Registro não encontrado','err');return;}
  const ini=document.getElementById('ehr-ini')?.value||'';
  const fim=document.getElementById('ehr-fim')?.value||'';
  if(!ini||!fim){showToast('Preencha o horário de início e fim da HE','err');return;}
  const cedoAtivo=document.getElementById('ehr-cedo')?.checked||false;
  const cedoIni=cedoAtivo?(document.getElementById('ehr-cedo-ini')?.value||''):'';
  const cedoFim=cedoAtivo?(document.getElementById('ehr-cedo-fim')?.value||''):'';
  // Recalcula HE
  const iM=toMin(ini),fM=toMin(fim);
  let heO=(fM>iM?fM-iM:fM+1440-iM)/60;
  let heCedo=0;
  if(cedoAtivo&&cedoIni&&cedoFim){
    const cI=toMin(cedoIni),cF=toMin(cedoFim);
    heCedo=(cF>cI?cF-cI:cF+1440-cI)/60;
  }
  heO+=heCedo;
  const _opUser=usuarios.find(u=>u.id===r.operadorId);
  const _heValor=(_opUser&&_opUser.heValor>0)?_opUser.heValor:config.heValor;
  r.heIni=ini;
  r.heFim=fim;
  r.chegouCedo=cedoAtivo;
  r.cedoIni=cedoIni;
  r.cedoFim=cedoFim;
  r.heCedo=heCedo;
  r.heOperador=heO;
  r.valorHEOperador=heO*_heValor;
  r.refeicoes=refStepperVal('ehr-ref');
  r.valorRefeicao=r.refeicoes*25;
  document.getElementById('modal-he-rasc')?.remove();
  DB.set('sos_registros',registros);
  fbUpdate('registros/'+r.id,r).catch(()=>{});
  _renderResumoOS();
  showToast('HE atualizada!');
}

function excluirRascunho(regId){
  if(!confirm('Remover este dia do registro?')) return;
  registros=registros.filter(r=>r.id!==regId);
  DB.set('sos_registros',registros);
  fbRemove('registros/'+regId)
    .then(()=>{_renderResumoOS();showToast('Dia removido.');})
    .catch(e=>showToast('Erro ao remover: '+(e?.message||'falha'),'err'));
}

function enviarParaAdmin(){

        <div style="font-size:12px;font-weight:700;color:var(--yellow);margin-bottom:6px">📋 Verifique antes de confirmar:</div>
        ${rascunhos.map(r=>

        <button id="btn-confirmar-envio" onclick="confirmarEnvioAdmin()" style="flex:1;padding:12px;background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.4);color:var(--green);border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">✅ Confirmar envio</button>

function confirmarEnvioAdmin(){
  // Remove modal
  document.querySelectorAll('[style*="position:fixed"][style*="z-index:9999"]').forEach(el=>el.remove());
  const rascunhos=registros.filter(r=>r.osId===opOS?.id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho');
  if(!rascunhos.length) return;
  rascunhos.forEach(r=>{r.status='enviado';});
  const btnEnv=document.getElementById('btn-enviar-admin');
  if(btnEnv){btnEnv.disabled=true;btnEnv.textContent='Enviando...';}
  saveAll().then(()=>{
    if(config.webhook){
      rascunhos.forEach(r=>fetch(config.webhook,{method:'POST',body:JSON.stringify({...r,assinatura:r.assinatura?'(capturada)':'não',assinaturaOp:r.assinaturaOp?'(capturada)':'não'}),headers:{'Content-Type':'application/json'}}).catch(()=>{}));
    }
    showToast('Enviado para o administrativo!');
    _renderResumoOS();
    // Mostra botão de WPP e oculta botão de envio
    const btnEnvFinal=document.getElementById('btn-enviar-admin');
    if(btnEnvFinal) btnEnvFinal.style.display='none';
    const wppBtn=document.getElementById('btn-wpp-final');
    if(wppBtn) wppBtn.style.display='block';
    setTimeout(()=>{
      const btnHist=Array.from(document.querySelectorAll('.nav-tab')).find(b=>b.textContent.trim()==='Histórico');
      if(btnHist) switchPage('historico',btnHist);
    },3000);
  }).catch(()=>showToast('Erro ao enviar. Tente novamente.','err'));
}

function enviarWPP(){
  if(!lastReg){alert('Nenhum registro ativo.');return;}
  const num=config.wppNumero?config.wppNumero.replace(/\D/g,''):'';
  const nomeOp=lastReg.nomeOperador||lastReg.operadorNome||'';
  const texto=`Olá, Lilia,\n\nMeu evento foi finalizado com sucesso, segue minha OS no app da SOS OS Digital.\n\nObrigado,\n${nomeOp}`;

  window.open(url,'_blank');
}

function loadRelatorio(){
  const el=document.getElementById('page-relatorio');
  const hoje=new Date().toISOString().split('T')[0];
  const mesAtual=hoje.slice(0,7);

  // Classifica cada OS
  const emAndamento=ordens.filter(o=>o.status!=='fechada'&&o.dataSaida<=hoje&&o.dataRetorno>=hoje);
  const futuras=ordens.filter(o=>o.status!=='fechada'&&o.dataSaida>hoje);
  const doMes=ordens.filter(o=>{
    const ini=o.dataSaida||'';
    const fim=o.dataRetorno||o.dataSaida||'';
    return ini.startsWith(mesAtual)||fim.startsWith(mesAtual)||(ini<=mesAtual+'-31'&&fim>=mesAtual+'-01');
  });
  const encerradasMes=doMes.filter(o=>o.status==='fechada');

  function cardOS(os,corBorda){
    // Bolinha verde para qualquer dia preenchido (rascunho ou enviado)
    const regsOS=registros.filter(r=>r.osId===os.id);
    const datasEnviadas=new Set(regsOS.map(r=>r.data));
    const equips=renderEquipTexto(os);
    const ops=(os.operadores||[]).map(op=>{const u=usuarios.find(u=>u.id===op.userId);return u?u.nome:'?';}).filter(Boolean);

    // Gera indicador de progresso
    let diasHTML='';
    const isPeriodica=os.tipoLocacao&&os.tipoLocacao!=='evento';
    if(isPeriodica){
      // OS periódica — mostra só entrega/devolução
      const temEntrega=regsOS.some(r=>r.checkEntrega);
      const temDevolucao=regsOS.some(r=>r.checkDevolucao);
      const tipoLabel={'mensal':'Mensal','quinzenal':'Quinzenal','semanal':'Semanal'}[os.tipoLocacao]||os.tipoLocacao;
      const _vencBadge2=(()=>{
        if(!os.diaVencimento) return '';
        const hoje=new Date(); hoje.setHours(0,0,0,0);
        const dv=os.diaVencimento;
        let prox=new Date(hoje.getFullYear(),hoje.getMonth(),dv);
        if(prox<hoje) prox=new Date(hoje.getFullYear(),hoje.getMonth()+1,dv);
        const diff=Math.round((prox-hoje)/(1000*60*60*24));
        const cor=diff<=3?'#f87171':diff<=7?'#f59e0b':'#94a3b8';
        const bg=diff<=3?'rgba(248,113,113,.12)':diff<=7?'rgba(245,158,11,.1)':'rgba(148,163,184,.08)';
        return '<span style="font-size:11px;font-weight:700;color:'+cor+';background:'+bg+';border:1px solid '+cor+'40;border-radius:10px;padding:2px 9px;margin-left:6px">📆 Vence dia '+dv+(diff===0?' (hoje)':diff===1?' (amanhã)':' (em '+diff+'d)')+'</span>';
      })();
      diasHTML=`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px">
        <div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid ${temEntrega?'var(--green)':'var(--border)'};background:${temEntrega?'rgba(16,185,129,.12)':'var(--card2)'}">
          <span style="font-size:13px">${temEntrega?'✅':'📦'}</span>
          <span style="font-size:11px;font-weight:700;color:${temEntrega?'var(--green)':'var(--dim)'}">Entrega</span>
        </div>
        <div style="font-size:14px;color:var(--border)">→</div>
        <div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid ${temDevolucao?'var(--green)':'var(--border)'};background:${temDevolucao?'rgba(16,185,129,.12)':'var(--card2)'}">
          <span style="font-size:13px">${temDevolucao?'✅':'🔄'}</span>
          <span style="font-size:11px;font-weight:700;color:${temDevolucao?'var(--green)':'var(--dim)'}">Devolução</span>
        </div>
        <span style="font-size:11px;color:#CC0000;margin-left:2px;background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.2);border-radius:10px;padding:2px 8px">${tipoLabel}</span>
        ${_vencBadge2}
      </div>`;
    } else if(os.dataSaida&&os.dataRetorno){
      // OS de evento — grade de dias
      const dias=[];
      const d=new Date(os.dataSaida+'T12:00:00');
      const fim=new Date(os.dataRetorno+'T12:00:00');
      while(d<=fim){dias.push(d.toISOString().split('T')[0]);d.setDate(d.getDate()+1);}
      const abrev=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
      diasHTML=`<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:6px">
        ${dias.map(dt=>{
          const enviado=datasEnviadas.has(dt);
          const [,m,d2]=dt.split('-');
          const dow=abrev[new Date(dt+'T12:00:00').getDay()];
          return enviado
            ? '<div title="'+d2+'/'+m+' — enviado" style="display:flex;flex-direction:column;align-items:center;gap:2px">'+
                '<div style="width:26px;height:26px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff">✓</div>'+
                '<span style="font-size:9px;color:var(--green);font-weight:600">'+d2+'/'+m+'</span>'+
               '</div>'
            : '<div title="'+d2+'/'+m+' — pendente" style="display:flex;flex-direction:column;align-items:center;gap:2px">'+
                '<div style="width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--dim)">'+dow+'</div>'+
                '<span style="font-size:9px;color:var(--dim)">'+d2+'/'+m+'</span>'+
               '</div>';
        }).join('')}
      </div>`;
    } else if(regsOS.length){
      // OS sem datas definidas — só mostra contagem
      diasHTML=`<div style="margin-top:6px"><span style="font-size:11px;color:var(--green)">✓ ${regsOS.length} dia${regsOS.length!==1?'s':''} enviado${regsOS.length!==1?'s':''}</span></div>`;
    }

    return `
    <div onclick="verOS('${os.id}')" style="border:1px solid ${corBorda};border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;background:var(--card);transition:opacity .15s" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div>
          <span style="font-weight:700;font-size:14px">OS ${os.num}</span>
          <span style="font-size:13px;color:var(--dim);margin-left:8px">${os.cliente}</span>
        </div>
        <span style="font-size:11px;color:var(--dim);white-space:nowrap;margin-left:8px">${fmtData(os.dataSaida)}→${fmtData(os.dataRetorno)}</span>
      </div>
      ${os.evento?'<div style="font-size:12px;color:var(--red);margin-bottom:4px">🎪 '+os.evento+'</div>':''}
      <div style="font-size:11px;color:var(--dim);margin-bottom:2px">${equips}</div>
      ${ops.length?'<div style="font-size:11px;color:var(--dim)">👤 '+ops.join(', ')+'</div>':''}
      ${diasHTML}
    </div>`;
  }

  el.innerHTML=`
  <!-- KPIs do mês -->
  <div class="metric-grid" style="margin-bottom:12px">
    <div class="metric-card">
      <div class="metric-label">Total no mês</div>
      <div class="metric-value">${doMes.length}</div>
      <div class="metric-sub">OS em ${mesAtual.replace('-','/')}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Em andamento</div>
      <div class="metric-value" style="color:var(--green)">${emAndamento.length}</div>
      <div class="metric-sub">acontecendo hoje</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Futuras</div>
      <div class="metric-value" style="color:var(--red)">${futuras.length}</div>
      <div class="metric-sub">agendadas</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Encerradas</div>
      <div class="metric-value" style="color:var(--dim)">${encerradasMes.length}</div>
      <div class="metric-sub">no mês</div>
    </div>
  </div>

  <!-- Em andamento -->
  ${emAndamento.length?
  '<div class="card" style="border-left:3px solid var(--green)">'+
    '<div class="card-title" style="color:var(--green)">🟢 Em andamento ('+emAndamento.length+')</div>'+
    emAndamento.map(os=>cardOS(os,'var(--green)')).join('')+
  '</div>':''}

  <!-- Futuras -->
  ${futuras.length?
  '<div class="card" style="border-left:3px solid var(--red)">'+
    '<div class="card-title" style="color:var(--red)">🔵 Futuras ('+futuras.length+')</div>'+
    futuras.sort((a,b)=>(a.dataSaida||'').localeCompare(b.dataSaida||'')).map(os=>cardOS(os,'rgba(204,0,0,.25)')).join('')+
  '</div>':''}

  ${!emAndamento.length&&!futuras.length?'<div class="card"><p style="color:var(--dim);font-size:13px;text-align:center;padding:12px 0">Nenhuma OS ativa ou futura no momento.</p></div>':''}

  <!-- Encerradas do mês -->
  ${encerradasMes.length?
  '<div class="card" style="border-left:3px solid var(--dim);margin-top:8px">'+
    '<div class="card-title" style="color:var(--dim)">✅ Encerradas no mês ('+encerradasMes.length+')</div>'+
    encerradasMes.sort((a,b)=>(b.dataRetorno||b.dataSaida||'').localeCompare(a.dataRetorno||a.dataSaida||'')).map(os=>cardOS(os,'rgba(136,136,136,.25)')).join('')+
  '</div>':''}`;
}

const RESP_MAP={
  paralelo:`Para paralelizar dois geradores:\n1. Verifique que ambos têm a **mesma tensão** (ex: 220V ou 380V)\n2. **Mesma frequência** (60Hz)\n3. **Mesma sequência de fases** (use fasímetro)\n4. Sincronize a tensão e frequência antes de fechar o disjuntor de paralelo\n5. Use o sincronoscópio ou LEDs para confirmar o sincronismo\n⚠️ Nunca feche o disjuntor sem sincronismo — pode danificar o alternador.`,
  partida:`Gerador não dá partida — checklist:\n1. ✅ Nível do óleo (abaixo do mínimo = bloqueio automático)\n2. ✅ Nível do combustível\n3. ✅ Bateria carregada (mínimo 12V)\n4. ✅ Parada de emergência pressionada?\n5. ✅ Alarme ativo no painel?\n6. ✅ Filtro de combustível entupido?\nSe tudo OK e não parte: verifique bobina do motor de arranque.`,
  disjuntor:`Disjuntor desarmando — causas mais comuns:\n1. **Sobrecarga** — carga conectada maior que a capacidade do gerador\n2. **Curto-circuito** na instalação do cliente\n3. **Aquecimento** — verifique ventilação do gerador\n4. **Falha no AVR** — tensão instável causando pico\nProcedimento: desligue a carga, reset o disjuntor, reconecte a carga gradualmente.`,
  fusível:`Fusível queimado:\n1. Identifique o circuito (painel, bateria, 24V)\n2. Verifique **amperagem correta** — nunca substitua por fusível de amperagem maior\n3. Antes de trocar, identifique a **causa** (curto, sobrecarga)\n4. Fusível do painel 24V: geralmente 5A ou 10A conforme o modelo`,
  horímetro:`O horímetro registra as horas de funcionamento do motor.\n- Horímetro **eletromecânico**: funciona enquanto o motor está rodando\n- Horímetro **digital**: pode ter função de horas parciais\n- Para manutenção: troca de óleo a cada **250-500h** conforme o fabricante\n- Anote sempre o horímetro no início e fim de cada locação`,
  kva:`Cálculo de carga:\n- **KVA**: potência aparente\n- **KW**: potência ativa (KVA × fator de potência)\n- FP típico: 0,8 (motores) a 0,95 (resistivos)\n- Regra prática: não ultrapasse **70-80% da capacidade** do gerador\n- Ex: gerador 180KVA → use no máx. 144KVA de carga`,
  terra:`Aterramento:\n1. Gerador deve estar **aterrado** antes de ligar qualquer carga\n2. Resistência máxima: **5Ω** (NBR 5410)\n3. Em eventos: use estaca de aterramento temporária (mínimo 60cm no solo)\n4. Verifique continuidade do barramento de terra do gerador ao quadro do cliente\n⚠️ Sem aterramento: risco de choque e danos ao equipamento`,
  avr:`AVR (Regulador Automático de Tensão):\n- Mantém a tensão estável sob variação de carga\n- Sintoma de AVR com problema: tensão instável (sobe/desce)\n- Ajuste de tensão: potenciômetro no AVR (geralmente etiqueta V+ / V-)\n- Se a tensão não estabiliza mesmo ajustando: AVR pode precisar de troca\n- Modelos comuns: Stamford AS480, Leroy Somer D350, Newage`
};

let chatFotoBase64=null; // foto pendente para envio

function anexarFoto(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    chatFotoBase64=ev.target.result; // data:image/...;base64,...
    const thumb=document.getElementById('chat-img-thumb');
    const preview=document.getElementById('chat-img-preview');
    if(thumb) thumb.src=chatFotoBase64;
    if(preview) preview.style.display='block';
  };
  reader.readAsDataURL(file);
  e.target.value=''; // reset input para permitir mesma foto
}

function removerFoto(){
  chatFotoBase64=null;
  const preview=document.getElementById('chat-img-preview');
  if(preview) preview.style.display='none';
}

let _micGravando=false;

function toggleMic(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    showToast('Seu navegador não suporta reconhecimento de voz. Use Chrome ou Safari.','err');
    return;
  }
  if(_micGravando){
    _micRecognition&&_micRecognition.stop();
    return;
  }
  _micRecognition=new SpeechRecognition();
  _micRecognition.lang='pt-BR';
  _micRecognition.continuous=false;
  _micRecognition.interimResults=true;

  const btnMic=document.getElementById('btn-mic');
  const inp=document.getElementById('chat-in');

  _micRecognition.onstart=()=>{
    _micGravando=true;
    if(btnMic){btnMic.classList.add('gravando');btnMic.title='Gravando... clique para parar';}
    showToast('🎙️ Ouvindo...');
  };
  _micRecognition.onresult=(e)=>{
    let texto='';
    for(let i=e.resultIndex;i<e.results.length;i++) texto+=e.results[i][0].transcript;
    inp.value=texto;
  };
  _micRecognition.onerror=(e)=>{
    _micGravando=false;
    if(btnMic){btnMic.classList.remove('gravando');btnMic.title='Enviar mensagem por voz';}
    if(e.error==='not-allowed') showToast('Permissão de microfone negada. Permita o acesso nas configurações do navegador.','err');
    else if(e.error!=='aborted') showToast('Erro no microfone: '+e.error,'err');
  };
  _micRecognition.onend=()=>{
    _micGravando=false;
    if(btnMic){btnMic.classList.remove('gravando');btnMic.title='Enviar mensagem por voz';}
    // Se capturou algo, envia automaticamente
    const val=inp.value.trim();
    if(val) enviarChat();
  };

  _micRecognition.start();
}

async function enviarChat(){
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim();
  const temFoto=!!chatFotoBase64;
  if(!msg && !temFoto) return;
  inp.value='';

  const msgs=document.getElementById('chat-msgs');
  // Mostra msg do usuário + thumb da foto se houver
  let userBubble=`<div class="chat-msg user" style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">`;
  if(temFoto) userBubble+=`<img src="${chatFotoBase64}" style="max-height:120px;max-width:200px;border-radius:8px;border:2px solid rgba(255,255,255,.3)"/>`;
  if(msg) userBubble+=`<span>${escHtml(msg)}</span>`;
  userBubble+=`</div>`;
  msgs.innerHTML+=userBubble;
  msgs.scrollTop=msgs.scrollHeight;

  const fotoParaEnviar=chatFotoBase64;
  removerFoto(); // limpa preview

  const typing=document.createElement('div');
  typing.className='chat-msg ai typing';typing.id='typing';
  typing.textContent=temFoto?'Analisando imagem...':'Digitando...';
  msgs.appendChild(typing);msgs.scrollTop=msgs.scrollHeight;

  // Tentar OpenAI — lê a chave do Firebase em tempo real
  let openaiKey = config.openaiKey || '';
  try {
    const cfgSnap = await db.ref('config/openaiKey').once('value');
    if (cfgSnap.val()) { openaiKey = cfgSnap.val(); config.openaiKey = openaiKey; }
  } catch(e) {}

  if(openaiKey){
    // Monta conteúdo da mensagem — texto e/ou imagem
    let userContent;
    if(temFoto){
      userContent=[];
      if(msg) userContent.push({type:'text',text:msg});
      else userContent.push({type:'text',text:'O que está escrito/mostrado nessa imagem? Explique em português o que significa para um operador de gerador.'});
      // extrai só o base64 puro sem o prefixo data:...
      const b64=fotoParaEnviar.split(',')[1];
      const mime=fotoParaEnviar.split(';')[0].split(':')[1];
      userContent.push({type:'image_url',image_url:{url:`data:${mime};base64,${b64}`,detail:'high'}});
    } else {
      userContent=msg;
    }
    chatHistory.push({role:'user',content:userContent});
    try{
      const res=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+openaiKey},
        body:JSON.stringify({
          model:'gpt-4o', // gpt-4o suporta visão (imagens)
          messages:[
            {role:'system',content:'Você é um técnico especialista em geradores elétricos, grupos geradores diesel, instalações elétricas industriais e de eventos. Responda em português brasileiro de forma prática e clara. Se receber uma imagem de painel, controladora ou equipamento em inglês, traduza e explique o que significa para o operador. Foque em procedimentos seguros, normas ABNT, e boas práticas de campo. Empresa: SOS Energia, locação de geradores.'},
            ...chatHistory
          ],
          max_tokens:800
        })
      });
      const data=await res.json();
      if(data.error){throw new Error(data.error.message);}
      const reply=data.choices?.[0]?.message?.content||'Não consegui processar a resposta.';
      chatHistory.push({role:'assistant',content:reply});
      document.getElementById('typing')?.remove();
      msgs.innerHTML+=`<div class="chat-msg ai">${formatMd(reply)}</div>`;
      msgs.scrollTop=msgs.scrollHeight;
      return;
    }catch(e){
      document.getElementById('typing')?.remove();
      msgs.innerHTML+=`<div class="chat-msg ai" style="color:var(--red-light)">⚠️ Erro na IA: ${escHtml(e.message||'Falha na conexão')}. Verifique a chave OpenAI nas Configurações.</div>`;
      msgs.scrollTop=msgs.scrollHeight;
      return;
    }
  }

  // Fallback: respostas pré-programadas
  await new Promise(r=>setTimeout(r,800));
  document.getElementById('typing')?.remove();
  if(temFoto){
    msgs.innerHTML+=`<div class="chat-msg ai">📷 Recebi a foto! Para analisar imagens preciso da chave OpenAI configurada em <strong>Configurações → Agente IA</strong>. Sem ela consigo responder apenas perguntas de texto.</div>`;
    msgs.scrollTop=msgs.scrollHeight;
    return;
  }
  const msgLower=msg.toLowerCase();
  let resp='Não tenho uma resposta específica para isso no momento. Para dúvidas técnicas complexas, entre em contato com o suporte técnico da SOS Energia ou consulte o manual do equipamento.';
  for(const [key,kws] of Object.entries(RESPOSTAS_TECNICAS)){
    if(kws.some(k=>msgLower.includes(k))){resp=RESP_MAP[key];break;}
  }
  msgs.innerHTML+=`<div class="chat-msg ai">${formatMd(resp)}</div>`;
  msgs.scrollTop=msgs.scrollHeight;
}

function formatMd(t){return escHtml(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br/>');}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function salvarNovaHEAdmin(){
  const opId=document.getElementById('ahe-op')?.value;
  const data=document.getElementById('ahe-data')?.value;
  const ini=document.getElementById('ahe-ini')?.value;
  const fim=document.getElementById('ahe-fim')?.value;
  const local=document.getElementById('ahe-local')?.value?.trim()||'';
  const evento=document.getElementById('ahe-evento')?.value?.trim()||'';
  const motivoRaw=document.querySelector('input[name="ahe-motivo"]:checked')?.value||'';
  const motivo=motivoRaw==='__outro__'?(document.getElementById('ahe-motivo-outro')?.value?.trim()||''):motivoRaw;
  if(!opId){showToast('Selecione o colaborador.','err');return;}
  if(!data){showToast('Informe a data.','err');return;}
  if(!ini||!fim){showToast('Informe o início e fim da HE.','err');return;}
  if(!motivoRaw){showToast('Selecione o motivo da HE.','err');return;}
  if(motivoRaw==='__outro__'&&!motivo){showToast('Descreva o motivo da HE.','err');return;}
  const cedoAtivo=document.getElementById('ahe-cedo')?.checked||false;
  const cedoIni=cedoAtivo?(document.getElementById('ahe-cedo-ini')?.value||''):'';
  const cedoFim=cedoAtivo?(document.getElementById('ahe-cedo-fim')?.value||''):'';
  let heCedo=0;
  if(cedoAtivo&&cedoIni&&cedoFim){const cI=toMin(cedoIni),cF=toMin(cedoFim);heCedo=(cF>cI?cF-cI:cF+1440-cI)/60;}
  const iM=toMin(ini),fM=toMin(fim);
  const heBase=(fM>iM?fM-iM:fM+1440-iM)/60;
  const heOperador=heBase+heCedo;
  const refeicoes=refStepperVal('ahe-ref');
  const op=usuarios.find(u=>u.id===opId);
  const valorHora=(op&&op.heValor>0)?op.heValor:config.heValor;
  const reg={
    id:'hav_'+Date.now(),
    heAvulsa:true,
    osId:null,
    osNum:'',
    cliente:'—',
    evento,local,motivoHE:motivo,
    operadorId:opId,
    operadorNome:op?.nome||'',
    data,heIni:ini,heFim:fim,
    chegouCedo:cedoAtivo,cedoIni,cedoFim,heCedo,
    heOperador,valorHEOperador:heOperador*valorHora,
    refeicoes,valorRefeicao:refeicoes*25,
    obs:document.getElementById('ahe-obs')?.value||'',
    heMaquina:0,totalHoras:0,geradoresReg:[],
    status:'enviado',
    lancadoPorAdmin:true,
    lancadoPor:sessaoAtual.nome,
    criadoEm:new Date().toISOString()
  };
  registros.push(reg);
  fbUpdate('registros/'+reg.id,reg).catch(()=>{});
  DB.set('sos_registros',registros);
  document.getElementById('modal-add-he-admin')?.remove();
  showToast(`HE de ${op?.nome||'colaborador'} registrada!`);
  gerarHE();
}

        </div>
        <div></div>
        <div class="field" style="margin:0"><label style="font-size:11px">Início (cedo)</label><input type="time" id="het-cedo-ini" value="${r.cedoIni||''}"/></div>
        <div class="field" style="margin:0"><label style="font-size:11px">Fim (cedo)</label><input type="time" id="het-cedo-fim" value="${r.cedoFim||''}"/></div>
      </div>
      <div id="het-he-preview" style="font-size:12px;color:var(--yellow);margin-top:6px;min-height:16px"></div>

      <div style="font-weight:700;font-size:13px;color:var(--text);margin:14px 0 8px;border-top:1px solid var(--border);padding-top:12px">🍽 Refeições</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
        ${refStepperHTML('het-ref',r.refeicoes||0)}
        <span style="font-size:12px;color:var(--dim)">refeição(ões) · R$ 25,00 cada</span>
      </div>

      <div style="font-weight:700;font-size:13px;color:var(--text);margin:14px 0 8px;border-top:1px solid var(--border);padding-top:12px">📍 Identificação</div>
      <div class="field" style="margin:0 0 8px"><label style="font-size:11px">Local</label><input type="text" id="het-local" value="${r.local||''}" placeholder="Local de trabalho"/></div>
      <div class="field" style="margin:0 0 8px"><label style="font-size:11px">Evento / Obra</label><input type="text" id="het-evento" value="${r.evento||''}" placeholder="Nome do evento"/></div>

      ${motivoHTML}
      ${geradoresHTML}

      <div class="field" style="margin-top:14px"><label>Observações</label><textarea id="het-obs" rows="2" placeholder="Observações...">${r.obs||''}</textarea></div>

      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" style="flex:1" onclick="salvarHETimeReg('${regId}')">💾 Salvar</button>
        <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('modal-hetime-edit').remove()">Cancelar</button>
      </div>
      <p style="font-size:10px;color:var(--dim);margin-top:8px;text-align:center">Correção administrativa — registrada em log.</p>
    </div>`;
  document.body.appendChild(pop);

  // Preview dinâmico de HE total
  const calcHEPreview=()=>{
    const ini=document.getElementById('het-he-ini')?.value;
    const fim=document.getElementById('het-he-fim')?.value;
    const cedo=document.getElementById('het-cedo')?.checked;
    const cIni=document.getElementById('het-cedo-ini')?.value;
    const cFim=document.getElementById('het-cedo-fim')?.value;
    const prev=document.getElementById('het-he-preview');
    if(!prev) return;
    let total=0;
    if(ini&&fim){const iM=toMin(ini),fM=toMin(fim);total+=(fM>iM?fM-iM:fM+1440-iM)/60;}
    if(cedo&&cIni&&cFim){const cIM=toMin(cIni),cFM=toMin(cFim);total+=(cFM>cIM?cFM-cIM:cFM+1440-cIM)/60;}
    prev.textContent=total>0?`⏱ Total HE: ${fmtHE(total)}`:'';
  };
  ['het-he-ini','het-he-fim','het-cedo','het-cedo-ini','het-cedo-fim'].forEach(id=>{
    document.getElementById(id)?.addEventListener('change',calcHEPreview);
  });
  calcHEPreview();
}

function salvarHETimeReg(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r) return;
  const os=r.osId?ordens.find(o=>o.id===r.osId):null;
  const geradores=os?(os.equipamentos||[]).filter(e=>e.tipo==='gerador'):[];

  // Dados básicos
  r.data=document.getElementById('het-data')?.value||r.data;
  const novoOpId=document.getElementById('het-op')?.value;
  if(novoOpId&&novoOpId!==r.operadorId){
    const novoOp=usuarios.find(u=>u.id===novoOpId);
    if(novoOp){r.operadorId=novoOpId;r.operadorNome=novoOp.nome;}
  }

  // HE operador
  const heIni=document.getElementById('het-he-ini')?.value||'';
  const heFim=document.getElementById('het-he-fim')?.value||'';
  r.heIni=heIni; r.heFim=heFim;
  let heBase=0;
  if(heIni&&heFim){const iM=toMin(heIni),fM=toMin(heFim);heBase=(fM>iM?fM-iM:fM+1440-iM)/60;}
  r.chegouCedo=document.getElementById('het-cedo')?.checked||false;
  const cedoIni=document.getElementById('het-cedo-ini')?.value||'';
  const cedoFim=document.getElementById('het-cedo-fim')?.value||'';
  r.cedoIni=cedoIni; r.cedoFim=cedoFim;
  let heCedo=0;
  if(r.chegouCedo&&cedoIni&&cedoFim){const cIM=toMin(cedoIni),cFM=toMin(cedoFim);heCedo=(cFM>cIM?cFM-cIM:cFM+1440-cIM)/60;}
  r.heOperador=heBase+heCedo;
  delete r.valorHEOperador;

  // Refeições
  r.refeicoes=refStepperVal('het-ref');
  r.valorRefeicao=r.refeicoes*25;

  // Identificação
  r.local=document.getElementById('het-local')?.value??r.local;
  r.evento=document.getElementById('het-evento')?.value??r.evento;
  if(r.heAvulsa){const motivoEl=document.querySelector('input[name="het-motivo"]:checked');if(motivoEl) r.motivoHE=motivoEl.value;}
  r.obs=document.getElementById('het-obs')?.value??r.obs;

  // Geradores (OS vinculada)
  if(!r.heAvulsa&&geradores.length&&r.geradoresReg){
    geradores.forEach((g,gi)=>{
      const gd=r.geradoresReg.find(x=>x.eqId===g.id);
      if(!gd||(gd.standby&&!gd.rodou)) return;
      const part=document.getElementById(`het-part-${gi}`)?.value;
      const par=document.getElementById(`het-par-${gi}`)?.value;
      const hi=parseFloat(document.getElementById(`het-hi-${gi}`)?.value||'0');
      const hf=parseFloat(document.getElementById(`het-hf-${gi}`)?.value||'0');
      const hc=parseInt(document.getElementById(`het-hc-${gi}`)?.value||'12');
      const meia=document.getElementById(`het-meia-${gi}`)?.checked||false;
      if(part!==undefined) gd.part=part;
      if(par!==undefined) gd.par=par;
      if(hi) gd.horIni=hi;
      if(hf) gd.horFim=hf;
      gd.hContratadas=isNaN(hc)?12:hc;
      gd.meiadiaria=meia;
      if(gd.part&&gd.par){
        const pM=toMin(gd.part),sM=toMin(gd.par);
        gd.totalHoras=(sM>pM?sM-pM:sM+1440-pM)/60;
        gd.heM=Math.max(0,gd.totalHoras-(meia?6:gd.hContratadas));
      }
    });
    const gRef=r.geradoresReg.find(g=>!g.standby||g.rodou);
    if(gRef){r.partida=gRef.part;r.parada=gRef.par;r.horIni=gRef.horIni;r.horFim=gRef.horFim;r.totalHoras=gRef.totalHoras;}
    r.heMaquina=r.geradoresReg.reduce((a,g)=>a+(g.heM||0),0);
  }

  // Audit trail
  r.corrigidoPor=sessaoAtual.nome;
  r.corrigidoEm=new Date().toISOString();

  fbUpdate('registros/'+r.id, r).catch(()=>{});
  DB.set('sos_registros',registros);
  document.getElementById('modal-hetime-edit')?.remove();
  showToast('HE atualizada com sucesso.');
  gerarHE();
}

function excluirHETimeReg(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r) return;
  const label=r.heAvulsa?`HE Avulsa de ${r.operadorNome} em ${fmtData(r.data)}`:`registro OS ${r.osNum} de ${r.operadorNome} em ${fmtData(r.data)}`;
  if(!confirm(`Excluir ${label}?\n\nEsta ação não pode ser desfeita.`)) return;
  registros=registros.filter(x=>x.id!==regId);
  DB.set('sos_registros',registros);
  fbRemove('registros/'+regId).catch(()=>{});
  showToast('Registro excluído.');
  gerarHE();
}

function aplicarDescontoHE(opId, mes){
  const valor=parseFloat(document.getElementById(`desc-val-${opId}`)?.value?.replace(',','.'));
  const motivo=(document.getElementById(`desc-mot-${opId}`)?.value||'').trim();
  if(!valor||valor<=0){showToast('Informe um valor válido para o desconto.','err');return;}
  if(!motivo){showToast('Informe o motivo do desconto.','err');return;}
  const chave=`${opId}_${mes}`;
  if(!descontosHE[chave]) descontosHE[chave]=[];
  descontosHE[chave].push({id:'desc_'+Date.now(),valor,motivo,criadoEm:new Date().toISOString(),criadoPor:sessaoAtual?.nome||''});
  saveDescontos();
  // Limpa campos
  const vEl=document.getElementById(`desc-val-${opId}`);
  const mEl=document.getElementById(`desc-mot-${opId}`);
  if(vEl) vEl.value='';
  if(mEl) mEl.value='';
  showToast('Desconto aplicado!');
  gerarHE();
}
function removerDescontoHE(opId, mes, descId){
  const chave=`${opId}_${mes}`;
  if(!descontosHE[chave]) return;
  descontosHE[chave]=descontosHE[chave].filter(d=>d.id!==descId);
  if(!descontosHE[chave].length) delete descontosHE[chave];
  saveDescontos();
  showToast('Desconto removido.');
  gerarHE();
}

function gerarHE(){
  const mes=document.getElementById('he-mes')?.value;
  if(!mes) return;
  const out=document.getElementById('he-out');
  const operadores=usuarios.filter(u=>u.perfil==='operador');
  if(!operadores.length){out.innerHTML='<div class="card" style="color:var(--text-secondary);text-align:center;padding:24px">Nenhum operador cadastrado.</div>';return;}

  const regsDoMes=registros.filter(r=>r.data&&r.data.startsWith(mes));

  let totalHEGeral=0,totalValorHEGeral=0,totalRefGeral=0,totalValorRefGeral=0,totalDescontoGeral=0,opComHE=0;
  const cards=operadores.map(u=>{
    const regsOp=regsDoMes.filter(r=>r.operadorId===u.id);
    const totalHE=regsOp.reduce((a,r)=>a+(r.heOperador||0),0);
    const totalRef=regsOp.reduce((a,r)=>a+(r.refeicoes||0),0);
    if(!totalHE&&!totalRef) return ''; // oculta operadores sem HE nem refeições
    opComHE++;
    const valorHora=(u.heValor&&u.heValor>0)?u.heValor:config.heValor;
    const totalValorHE=totalHE*valorHora;
    const totalValorRef=totalRef*25;
    totalHEGeral+=totalHE;
    totalValorHEGeral+=totalValorHE;
    totalRefGeral+=totalRef;
    totalValorRefGeral+=totalValorRef;
    const chaveDesc=`${u.id}_${mes}`;
    totalDescontoGeral+=(descontosHE[chaveDesc]||[]).reduce((a,d)=>a+(d.valor||0),0);
    const descontosOp=descontosHE[chaveDesc]||[];
    const totalDesconto=descontosOp.reduce((a,d)=>a+(d.valor||0),0);
    const regsComHE=regsOp.filter(r=>(r.heOperador||0)>0||(r.refeicoes||0)>0).sort((a,b)=>a.data.localeCompare(b.data));
    const linhasHE=regsComHE.map(r=>{
      const valHE=(r.heOperador||0)*valorHora;
      const valRef=(r.valorRefeicao||((r.refeicoes||0)*25));
      const heBase=r.heOperador-(r.heCedo||0);
      const heHorario=(r.heIni&&r.heFim)?r.heIni+' → '+r.heFim:'';
      const cedoBadge=(r.chegouCedo&&(r.heCedo||0)>0)?'<span style="font-size:11px;background:rgba(204,0,0,.15);color:#CC0000;border-radius:5px;padding:2px 7px;font-weight:600;display:inline-flex;align-items:center;gap:4px">🏢 Cedo '+(r.cedoIni&&r.cedoFim?r.cedoIni+'→'+r.cedoFim:'')+' <span style="opacity:.8">'+fmtHE(r.heCedo)+'</span></span>':'';
      return `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
          <div style="min-width:0;font-size:12px;flex:1">
            <span style="color:var(--dim)">${fmtData(r.data)}</span>
            ${r.heAvulsa?'<span style="font-weight:600;margin-left:8px;background:rgba(204,0,0,.12);color:#CC0000;border-radius:4px;padding:1px 6px">Avulsa</span>':(r.osNum?'<span style="font-weight:600;margin-left:8px">OS '+r.osNum+'</span>':'')}
            ${r.motivoHE?'<span style="margin-left:6px;color:var(--dim)">'+r.motivoHE+'</span>':''}
            ${r.evento?'<span style="margin-left:6px;color:var(--dim)">'+r.evento+'</span>':''}
            ${r.local?'<span style="margin-left:6px;color:var(--dim)">📍 '+r.local+'</span>':''}
            <div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              ${(r.heOperador||0)>0?'<span style="font-size:12px;background:rgba(234,179,8,.1);color:var(--yellow);border-radius:5px;padding:2px 7px;font-weight:600">⏱ '+fmtHE(r.heOperador)+(heHorario?' ('+heHorario+')':'')+' → R$ '+valHE.toFixed(2)+'</span>':''}
              ${cedoBadge}
              ${(r.refeicoes||0)>0?'<span style="font-size:12px;background:rgba(16,185,129,.1);color:#10b981;border-radius:5px;padding:2px 7px;font-weight:600">🍽 ×'+r.refeicoes+' → R$ '+valRef.toFixed(2)+'</span>':''}
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button onclick="editarHETimeReg('${r.id}')" style="background:none;border:1px solid rgba(59,130,246,.3);color:var(--blue);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;white-space:nowrap">✏️ Editar</button>
            <button onclick="excluirHETimeReg('${r.id}')" style="background:none;border:1px solid rgba(204,0,0,.3);color:var(--red-light);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;white-space:nowrap">🗑</button>
          </div>
        </div>
      </div>`;
    }).join('');
    return `
    <div class="card" style="margin-bottom:0;border-left:3px solid var(--yellow)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <div>
          <div style="font-weight:600;font-size:15px">${u.nome}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${regsComHE.length} ocorrência${regsComHE.length!==1?'s':''} · R$${valorHora.toFixed(2)}/h HE</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          ${totalHE>0?'<div style="text-align:right"><div style="font-size:11px;color:var(--dim)">HE</div><div style="font-size:18px;font-weight:700;color:var(--yellow)">'+fmtHE(totalHE)+'</div><div style="font-size:12px;color:var(--yellow);font-weight:600">R$ '+totalValorHE.toFixed(2)+'</div></div>':''}
          ${totalRef>0?'<div style="text-align:right"><div style="font-size:11px;color:var(--dim)">Refeições</div><div style="font-size:18px;font-weight:700;color:#10b981">×'+totalRef+'</div><div style="font-size:12px;color:#10b981;font-weight:600">R$ '+totalValorRef.toFixed(2)+'</div></div>':''}
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:6px">${linhasHE}</div>

      ${descontosOp.length?'<div style="border-top:1px solid rgba(239,68,68,.2);margin-top:8px;padding-top:8px">'+'<div style="font-size:11px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">🔻 Descontos aplicados</div>'+descontosOp.map(d=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">'+'<div style="font-size:12px">'+'<span style="color:#f87171;font-weight:600">− R$ '+d.valor.toFixed(2)+'</span>'+'<span style="color:var(--dim);margin-left:8px">'+d.motivo+'</span>'+(d.criadoPor?'<span style="color:var(--dim);font-size:10px;margin-left:6px">por '+d.criadoPor+'</span>':'')+'</div>'+'<button onclick="removerDescontoHE(\''+u.id+'\',\''+mes+'\',\''+d.id+'\')" style="background:none;border:none;color:var(--red-light);font-size:15px;cursor:pointer;padding:0 4px" title="Remover desconto">×</button>'+'</div>').join('')+'<div style="text-align:right;margin-top:6px;font-size:12px;color:#f87171;font-weight:700">Total descontado: R$ '+totalDesconto.toFixed(2)+'</div>'+'</div>':''}

      <div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
        ${totalDesconto>0?'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px"><span style="color:var(--dim)">Subtotal bruto</span><span style="color:var(--dim)">R$ '+(totalValorHE+totalValorRef).toFixed(2)+'</span></div>'+'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px"><span style="color:#f87171">Descontos</span><span style="color:#f87171">− R$ '+totalDesconto.toFixed(2)+'</span></div>':''}
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;font-weight:700;color:var(--fg)">Total a pagar</span>
          <span style="font-size:17px;font-weight:700;color:var(--green)">R$ ${Math.max(0,totalValorHE+totalValorRef-totalDesconto).toFixed(2)}</span>
        </div>
        <div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
          <div style="font-size:11px;color:var(--dim);margin-bottom:6px;font-weight:600">🔻 Aplicar desconto</div>
          <div style="display:grid;grid-template-columns:110px 1fr auto;gap:6px;align-items:center">
            <input type="number" id="desc-val-${u.id}" placeholder="R$ valor" min="0" step="0.01" style="padding:8px 10px;background:var(--dark);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:13px"/>
            <input type="text" id="desc-mot-${u.id}" placeholder="Motivo (multa, horas devidas...)" maxlength="80" style="padding:8px 10px;background:var(--dark);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:13px"/>
            <button onclick="aplicarDescontoHE('${u.id}','${mes}')" style="padding:8px 12px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:#f87171;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Aplicar</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  const [ano,mesN]=mes.split('-');
  const nomeMes=new Date(parseInt(ano),parseInt(mesN)-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  const semHE=!cards.replace(/\s/g,'');
  out.innerHTML=`
  <div class="metric-grid" style="margin-bottom:12px">
    <div class="metric-card"><div class="metric-label">Com HE no mês</div><div class="metric-value" style="color:${opComHE?'var(--yellow)':'var(--dim)'}">${opComHE}</div></div>
    <div class="metric-card"><div class="metric-label">Total HE</div><div class="metric-value" style="color:var(--yellow)">${totalHEGeral>0?fmtHE(totalHEGeral):'—'}</div></div>
    <div class="metric-card"><div class="metric-label">Total HE R$</div><div class="metric-value" style="color:var(--green)">${totalValorHEGeral>0?'R$ '+totalValorHEGeral.toFixed(2):'—'}</div></div>
    <div class="metric-card"><div class="metric-label">Refeições</div><div class="metric-value" style="color:#10b981">${totalRefGeral>0?'×'+totalRefGeral:'—'}</div></div>
    <div class="metric-card"><div class="metric-label">Total Refeições R$</div><div class="metric-value" style="color:#10b981">${totalValorRefGeral>0?'R$ '+totalValorRefGeral.toFixed(2):'—'}</div></div>
    ${totalDescontoGeral>0?'<div class="metric-card"><div class="metric-label">Descontos</div><div class="metric-value" style="color:#f87171">− R$ '+totalDescontoGeral.toFixed(2)+'</div></div>':''}
    <div class="metric-card" style="${totalDescontoGeral>0?'border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.06)':''}"><div class="metric-label">Total a Pagar</div><div class="metric-value" style="color:var(--green);font-size:18px">${(totalValorHEGeral+totalValorRefGeral)>0?'R$ '+Math.max(0,totalValorHEGeral+totalValorRefGeral-totalDescontoGeral).toFixed(2):'—'}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Detalhamento — ${nomeMes}</div>
    ${semHE
      ? '<div style="text-align:center;color:var(--dim);font-size:13px;padding:16px 0">Nenhum operador registrou HE neste mês.</div>'
      : '<div style="display:flex;flex-direction:column;gap:10px">'+cards+'</div>'
    }
  </div>`;
}

    const dado=_heHistorico[mes];

    const lista=[...dado.funcionarios].sort((a,b)=>b.horas-a.horas);

    </div>

      </div>
      <div style="font-size:11px;color:var(--dim);margin-top:4px">${f.regs} registro${f.regs!==1?'s':''} · bruto R$ ${f.valorBruto.toFixed(2)}${f.desconto>0?' · desconto R$ '+f.desconto.toFixed(2):''}</div>
    </div>`;
  }).join('');

  out.innerHTML=`
  <div class="metric-grid" style="margin-bottom:12px">
    <div class="metric-card"><div class="metric-label">Mês</div><div class="metric-value" style="font-size:13px;color:var(--fg)">${nomeMes}</div></div>

    <div class="metric-card"><div class="metric-label">Total Bruto</div><div class="metric-value" style="color:var(--dim);font-size:15px">R$ ${totalVGeral.toFixed(2)}</div></div>
    ${totalDescGeral>0?'<div class="metric-card"><div class="metric-label">Descontos</div><div class="metric-value" style="color:#f87171">− R$ '+totalDescGeral.toFixed(2)+'</div></div>':''}
    <div class="metric-card" style="border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.06)"><div class="metric-label">Total a Pagar</div><div class="metric-value" style="color:var(--green)">R$ ${Math.max(0,totalVGeral-totalDescGeral).toFixed(2)}</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

function gerarPDFOperador(){
  const opId=document.getElementById('pdf-op-id')?.value;
  const mes=document.getElementById('pdf-op-mes')?.value;
  if(!opId){showToast('Selecione o operador.','err');return;}
  if(!mes){showToast('Selecione o mês.','err');return;}

  const op=usuarios.find(u=>u.id===opId);
  if(!op) return;
  const [ano,mesN]=mes.split('-');
  const dtMes=new Date(parseInt(ano),parseInt(mesN)-1,1);
  const nomeMes=dtMes.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const nomeMesCaps=nomeMes.toUpperCase();
  const regsOp=registros.filter(r=>r.operadorId===opId&&r.data&&r.data.startsWith(mes)&&(r.status==='enviado'||r.status==='rascunho'||r.heAvulsa)).sort((a,b)=>a.data.localeCompare(b.data));
  const valorHora=(op.heValor&&op.heValor>0)?op.heValor:config.heValor;
  const chaveDesc=`${opId}_${mes}`;
  const descontosOp=descontosHE[chaveDesc]||[];
  const totalDesc=descontosOp.reduce((a,d)=>a+(d.valor||0),0);

  if(!regsOp.length){
    document.getElementById('modal-pdf-op')?.remove();
    showToast('Nenhum registro encontrado para este operador no mês selecionado.','err');
    return;
  }

  const totalHE=regsOp.reduce((a,r)=>a+(r.heOperador||0),0);
  const totalRef=regsOp.reduce((a,r)=>a+(r.refeicoes||0),0);
  const totalValorHE=totalHE*valorHora;
  const totalValorRef=totalRef*25;
  const totalBruto=totalValorHE+totalValorRef;
  const totalLiquido=Math.max(0,totalBruto-totalDesc);

  const diasSemana=['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  function diaSemana(dataStr){
    const [y,m,d]=dataStr.split('-').map(Number);
    return diasSemana[new Date(y,m-1,d).getDay()];
  }

  function valorExtenso(v){
    const n=Math.round(v*100);
    const reais=Math.floor(n/100);
    const cents=n%100;
    const unidades=['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
    const dezenas=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
    const centenas=['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
    function numParaExtenso(n){
      if(n===0) return 'zero';
      if(n===100) return 'cem';
      let s='';
      if(n>=1000){const m=Math.floor(n/1000);s+=(m===1?'mil':numParaExtenso(m)+' mil');n=n%1000;if(n>0)s+=' e ';}
      if(n>=100){s+=centenas[Math.floor(n/100)];n=n%100;if(n>0)s+=' e ';}
      if(n>=20){s+=dezenas[Math.floor(n/10)];n=n%10;if(n>0)s+=' e ';}
      if(n>0)s+=unidades[n];
      return s;
    }
    let ext=numParaExtenso(reais)+' reais';
    if(cents>0) ext+=' e '+numParaExtenso(cents)+' centavos';
    return ext.charAt(0).toUpperCase()+ext.slice(1);
  }

  const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const hoje=new Date();
  const dataExtenso=`Brasília/DF, ${hoje.getDate()} de ${meses[hoje.getMonth()]} de ${hoje.getFullYear()}.`;
  const cpfOp=op.cpf||'';

  // Verifica se algum registro tem segundo período
  const temPeriodo2=regsOp.some(r=>r.heIni2&&r.heFim2);
  const nCols=temPeriodo2?10:8; // 8 sem período2, 10 com

  const linhas=regsOp.map((r,i)=>{
    const d=r.data||'';
    const dt=d?`${d.slice(8,10)}/${d.slice(5,7)}`:'—';
    const dia=d?diaSemana(d):'';
    const local=(r.local||r.cliente||'').toUpperCase()||'—';
    const evento=(r.evento||'').toUpperCase()||'—';
    const os=r.osNum||'—';
    const e1=r.heIni||'—';
    const s1=r.heFim||'—';
    const sub=fmtHE(r.heOperador||0);
    const bg=i%2===0?'#fff':'#f5f5f5';
    const tdStyle='text-align:center';
    const p2=temPeriodo2?`<td style="${tdStyle}">${r.heIni2||'—'}</td><td style="${tdStyle}">${r.heFim2||'—'}</td>`:'';
    return `<tr style="background:${bg}">
      <td style="white-space:nowrap">${dt}</td>
      <td style="white-space:nowrap">${dia}</td>
      <td style="word-break:break-word">${local}</td>
      <td style="word-break:break-word">${evento}</td>
      <td style="white-space:nowrap;text-align:center">${os}</td>
      <td style="white-space:nowrap;text-align:center">${e1}</td>
      <td style="white-space:nowrap;text-align:center">${s1}</td>
      ${p2}
      <td style="white-space:nowrap;text-align:center;font-weight:700;color:#111">${sub}</td>
    </tr>`;
  }).join('');

  const descontosLinhas=descontosOp.map(d=>`
    <tr>
      <td colspan="${nCols-1}" style="color:#555">${d.motivo}</td>
