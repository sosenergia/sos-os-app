function abrirLiveDashboardHE(){
  const mes=document.getElementById('rhe-mes')?.value||new Date().toISOString().slice(0,7);
  const [ano,mesN]=mes.split('-');
  const nomeMes=new Date(parseInt(ano),parseInt(mesN)-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  // ── coleta dados do mês ──────────────────────────────────────────────
  const regsDoMes=registros.filter(r=>r.data&&r.data.startsWith(mes));
  const operadores=usuarios.filter(u=>u.perfil==='operador');

  const dadosOp=operadores.map(u=>{
    const regsOp=regsDoMes.filter(r=>r.operadorId===u.id&&r.heOperador>0);
    const totalHE=regsOp.reduce((a,r)=>a+(r.heOperador||0),0);
    const totalRef=regsOp.reduce((a,r)=>a+(r.refeicoes||0),0);
    const eventos=regsOp.filter(r=>r.local&&r.local!=='SOS Energia').length;
    const diasSOS=regsOp.filter(r=>r.local==='SOS Energia').length;
    const chegouCedo=regsOp.filter(r=>r.chegouCedo).length;
    const valorHora=(u.heValor&&u.heValor>0)?u.heValor:config.heValor;
    const valorHE=totalHE*valorHora;
    const valorRef=totalRef*25;
    const chaveDesc=`${u.id}_${mes}`;
    const descs=(descontosHE[chaveDesc]||[]);
    const desc=descs.reduce((a,d)=>a+(d.valor||0),0);
    const liquido=Math.max(0,valorHE+valorRef-desc);
    const heCedo=regsOp.reduce((a,r)=>a+(r.heCedo||0),0);
    return {id:u.id,nome:u.nome,totalHE,totalRef,eventos,diasSOS,chegouCedo,valorHE,valorRef,desc,liquido,regs:regsOp,valorHora,heCedo,descs};
  }).filter(f=>f.totalHE>0||f.eventos>0).sort((a,b)=>b.totalHE-a.totalHE);

  const totalH=dadosOp.reduce((a,f)=>a+f.totalHE,0);
  const totalV=dadosOp.reduce((a,f)=>a+f.liquido,0);
  const totalDesc=dadosOp.reduce((a,f)=>a+f.desc,0);
  const totalRef=dadosOp.reduce((a,f)=>a+f.totalRef,0);
  const totalEv=dadosOp.reduce((a,f)=>a+f.eventos,0);
  const ativos=dadosOp.length;

  if(!ativos){alert('Nenhum operador com HE em '+nomeMes+'.');return;}

  // ── helpers SVG ──────────────────────────────────────────────────────
  const PAL=['#3B82F6','#2063AD','#BCD6F6','#4CAF50','#FF9800','#9F7AEA','#F6AD55','#FC8181','#68D391','#63B3ED','#B794F4'];

  function fmtH(n){const h=Math.floor(n),m=Math.round((n-h)*60);return h+'h'+(m>0?String(m).padStart(2,'0')+'m':'');}
  function fmtR(n){return'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function srt(n){return n.split(' ')[0];}

  function barSVG(names,vals,fmtFn,colors,hpb){
    hpb=hpb||26;const gap=5,lw=88,padL=2;
    const max=Math.max(...vals,1);const W=520,plotW=W-lw-padL-90;
    const H=names.length*(hpb+gap)+8;let s='';
    names.forEach((n,i)=>{
      const bw=Math.max(4,(vals[i]/max)*plotW);const y=4+i*(hpb+gap);
      const col=Array.isArray(colors)?colors[i%colors.length]:colors;
      s+=`<text x="${padL}" y="${y+hpb/2+4}" fill="#5A7CA0" font-size="10" font-weight="600" font-family="Montserrat,sans-serif">${n}</text>
      <rect x="${padL+lw}" y="${y}" width="${bw}" height="${hpb}" rx="5" fill="${col}" opacity="0.88"/>
      <text x="${padL+lw+bw+6}" y="${y+hpb/2+4}" fill="#A8C4E0" font-size="10" font-weight="700" font-family="Montserrat,sans-serif">${fmtFn(vals[i])}</text>`;
    });
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;">${s}</svg>`;
  }

  function donutSVG(names,vals){
    const total=vals.reduce((a,b)=>a+b,0);
    const cx=95,cy=95,R=72,r=42;let angle=-Math.PI/2,slices='',leg='';
    const top=vals.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v).slice(0,8);
    top.forEach(({v,i},j)=>{
      const sw=(v/total)*Math.PI*2;
      const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
      angle+=sw;
      const x2=cx+R*Math.cos(angle),y2=cy+R*Math.sin(angle);
      const lg=sw>Math.PI?1:0;
      const xi1=cx+r*Math.cos(angle-sw),yi1=cy+r*Math.sin(angle-sw);
      const xi2=cx+r*Math.cos(angle),yi2=cy+r*Math.sin(angle);
      slices+=`<path d="M ${x1} ${y1} A ${R} ${R} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${r} ${r} 0 ${lg} 0 ${xi1} ${yi1} Z" fill="${PAL[i%PAL.length]}" stroke="#050B14" stroke-width="2" opacity=".9"/>`;
      const ly=14+j*20;
      leg+=`<rect x="205" y="${ly-9}" width="9" height="9" rx="2" fill="${PAL[i%PAL.length]}"/>
      <text x="220" y="${ly}" fill="#A8C4E0" font-size="10" font-weight="600" font-family="Montserrat,sans-serif">${names[i].split(' ')[0]}</text>
      <text x="340" y="${ly}" fill="#4CAF50" font-size="10" font-weight="700" font-family="Montserrat,sans-serif" text-anchor="end">${fmtR(vals[i])}</text>`;
    });
    return `<svg viewBox="0 0 350 195" style="width:100%;display:block;">
      ${slices}<circle cx="${cx}" cy="${cy}" r="${r-2}" fill="#050B14"/>
      <text x="${cx}" y="${cy-5}" text-anchor="middle" fill="#5A7CA0" font-size="8" font-weight="600" font-family="Montserrat,sans-serif">TOTAL</text>
      <text x="${cx}" y="${cy+8}" text-anchor="middle" fill="#fff" font-size="10" font-weight="800" font-family="Montserrat,sans-serif">${fmtR(total)}</text>
      ${leg}</svg>`;
  }

  function hBarSVG(labels,data,fmtFn,color){
    const bh=20,gap=12,lw=52,padL=2,W=300;
    const max=Math.max(...data,1);
    const H=labels.length*(bh+gap)+8;let s='';
    labels.forEach((lbl,i)=>{
      const bw=Math.max(4,(data[i]/max)*(W-lw-padL-50));
      const y=4+i*(bh+gap);
      s+=`<text x="${padL}" y="${y+bh/2+4}" fill="#5A7CA0" font-size="10" font-weight="600" font-family="Montserrat,sans-serif">${lbl}</text>
      <rect x="${padL+lw}" y="${y}" width="${bw}" height="${bh}" rx="4" fill="${color}" opacity=".85"/>
      <text x="${padL+lw+bw+5}" y="${y+bh/2+4}" fill="#A8C4E0" font-size="9" font-weight="700" font-family="Montserrat,sans-serif">${fmtFn(data[i])}</text>`;
    });
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;">${s}</svg>`;
  }

  // ── score ─────────────────────────────────────────────────────────────
  const maxH=Math.max(...dadosOp.map(f=>f.totalHE),1);
  const maxEv=Math.max(...dadosOp.map(f=>f.eventos),1);
  const maxSOS=Math.max(...dadosOp.map(f=>f.diasSOS),1);
  dadosOp.forEach(f=>{
    f.score=Math.round((f.totalHE/maxH)*50+(f.eventos/maxEv)*30+(f.diasSOS/maxSOS)*20);
  });
  const byScore=[...dadosOp].sort((a,b)=>b.score-a.score);
  const byVal=[...dadosOp].sort((a,b)=>b.liquido-a.liquido);
  const byEv=[...dadosOp].filter(f=>f.eventos>0).sort((a,b)=>b.eventos-a.eventos);
  const topScore=byScore[0];
  const topVal=byVal[0];

  function scoreColor(s){return s>=70?'#4CAF50':s>=40?'#FF9800':'#FF5756';}
  function rankClass(i){return i===0?'r1':i===1?'r2':i===2?'r3':'rn';}
  function rankLabel(i){return i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;}

  const rankKPI=`
    <div class="kpi" style="--ka:#3B82F6"><div class="ki">👥</div><div class="kl">Operadores c/ HE</div><div class="kv">${ativos}</div><div class="ks">em ${nomeMes}</div></div>
    <div class="kpi" style="--ka:#4CAF50"><div class="ki">⏱</div><div class="kl">Total Horas Extras</div><div class="kv">${fmtH(totalH)}</div><div class="ks">média ${fmtH(totalH/ativos)}/pessoa</div></div>
    <div class="kpi" style="--ka:#FF9800"><div class="ki">💰</div><div class="kl">Total a Pagar</div><div class="kv" style="font-size:17px">${fmtR(totalV)}</div><div class="ks">${totalDesc>0?'desc. '+fmtR(totalDesc):'sem descontos'}</div></div>
    <div class="kpi" style="--ka:#9F7AEA"><div class="ki">📅</div><div class="kl">Eventos Externos</div><div class="kv">${totalEv}</div><div class="ks">${byEv.length>0?'top: '+srt(byEv[0].nome)+' ('+byEv[0].eventos+')':'—'}</div></div>
    <div class="kpi" style="--ka:#F6AD55"><div class="ki">🏆</div><div class="kl">Maior Score</div><div class="kv">${topScore.score}</div><div class="ks">${srt(topScore.nome)}</div></div>`;

  const insightVisao=`<strong>📊 Resumo ${nomeMes}:</strong> ${ativos} operador${ativos!==1?'es':''} com HE registrada no sistema.
    Total de <strong>${fmtH(totalH)}</strong> em horas extras, custo líquido de <strong>${fmtR(totalV)}</strong>${totalDesc>0?' (após '+fmtR(totalDesc)+' em descontos)':''}.
    Maior ganhador: <strong>${topVal.nome}</strong> (${fmtR(topVal.liquido)}).
    Líder em horas: <strong>${dadosOp[0].nome}</strong> (${fmtH(dadosOp[0].totalHE)}).`;

  const tableGeral=byScore.map((f,i)=>`<tr>
    <td><span class="rk ${rankClass(i)}">${rankLabel(i)}</span></td>
    <td style="font-weight:700;color:#fff">${f.nome}</td>
    <td><div style="display:flex;align-items:center;gap:8px">
      <div style="background:rgba(255,255,255,.06);border-radius:4px;height:6px;width:80px;overflow:hidden"><div style="width:${f.score}%;height:6px;border-radius:4px;background:${scoreColor(f.score)}"></div></div>
      <span style="font-weight:800;color:${scoreColor(f.score)};font-size:12px">${f.score}</span>
    </div></td>
    <td style="color:#BCD6F6;font-weight:600">${fmtH(f.totalHE)}</td>
    <td style="color:#4CAF50;font-weight:800">${fmtR(f.liquido)}</td>
    <td style="color:#9F7AEA;font-weight:700">${f.eventos}</td>
    <td style="color:#3B82F6;font-weight:600">${f.diasSOS}d</td>
    <td style="color:#CC0000;font-weight:600">${f.totalRef}</td>
  </tr>`).join('');

  // ── aba empenho ───────────────────────────────────────────────────────
  const tableEmpenho=byScore.map((f,i)=>{
    const hpm=fmtH(f.totalHE);
    let perfil=f.score>=70?'⭐ Destaque':f.score>=40?'✅ Regular':'⚠️ Baixo';
    return `<tr>
      <td><span class="rk ${rankClass(i)}">${rankLabel(i)}</span></td>
      <td style="font-weight:700;color:#fff">${f.nome}</td>
      <td><span style="font-weight:800;color:${scoreColor(f.score)};font-size:13px">${f.score}</span><span style="color:var(--tm);font-size:9px">/100</span></td>
      <td style="color:#BCD6F6;font-weight:600">${hpm}</td>
      <td style="color:#9F7AEA;font-weight:600">${f.eventos}</td>
      <td style="color:#3B82F6;font-weight:600">${f.diasSOS}d</td>
      <td style="color:#CC0000">${f.chegouCedo>0?'🏢 '+f.chegouCedo+'x':'—'}</td>
      <td><span class="pill" style="background:rgba(${f.score>=70?'76,175,80':f.score>=40?'255,152,0':'255,87,86'},.15);color:${scoreColor(f.score)};border:1px solid ${scoreColor(f.score)}40">${perfil}</span></td>
    </tr>`;
  }).join('');

  const alertasBaixo=byScore.filter(f=>f.score<30).slice(0,5);
  const alertasAlto=byScore.filter(f=>f.score>=60).slice(0,5);
  const alertasBaixoHTML=alertasBaixo.length
    ?alertasBaixo.map(f=>`<div class="alerta">⚠️ <div><strong>${f.nome}</strong> — Score ${f.score}/100. ${fmtH(f.totalHE)} HE, ${f.eventos} eventos.</div></div>`).join('')
    :'<div class="alerta alerta-g">✅ Nenhum operador com engajamento crítico.</div>';
  const alertasAltoHTML=alertasAlto.length
    ?alertasAlto.map(f=>`<div class="alerta alerta-g">⭐ <div><strong>${f.nome}</strong> — Score ${f.score}/100. ${fmtH(f.totalHE)} HE, ${f.eventos} eventos.</div></div>`).join('')
    :'';

  // ── aba financeiro ────────────────────────────────────────────────────
  const totalBruto=dadosOp.reduce((a,f)=>a+f.valorHE+f.valorRef,0);
  const custoHEmed=totalH>0?totalV/totalH:0;
  const kpiFinHTML=`
    <div class="kpi" style="--ka:#4CAF50"><div class="ki">💰</div><div class="kl">Total a Pagar</div><div class="kv" style="font-size:17px">${fmtR(totalV)}</div><div class="ks">líquido</div></div>
    <div class="kpi" style="--ka:#3B82F6"><div class="ki">📊</div><div class="kl">Total Bruto</div><div class="kv" style="font-size:17px">${fmtR(totalBruto)}</div><div class="ks">antes de descontos</div></div>
    <div class="kpi" style="--ka:#FF9800"><div class="ki">⏱</div><div class="kl">Custo por HE (média)</div><div class="kv" style="font-size:17px">${fmtR(custoHEmed)}</div><div class="ks">R$/hora extra</div></div>
    <div class="kpi" style="--ka:#FF5756"><div class="ki">🔻</div><div class="kl">Total Descontos</div><div class="kv" style="font-size:17px">${fmtR(totalDesc)}</div><div class="ks">${totalDesc>0?dadosOp.filter(f=>f.desc>0).length+' operador(es)':'nenhum'}</div></div>
    <div class="kpi" style="--ka:#9F7AEA"><div class="ki">🍽</div><div class="kl">Refeições</div><div class="kv">${totalRef}</div><div class="ks">${fmtR(totalRef*25)}</div></div>`;

  const tableFin=byVal.map((f,i)=>{
    const rph=f.valorHora>0?f.valorHora.toFixed(2):'-';
    return `<tr>
      <td><span class="rk ${rankClass(i)}">${rankLabel(i)}</span></td>
      <td style="font-weight:700;color:#fff">${f.nome}</td>
      <td style="color:#BCD6F6;font-weight:600">${fmtH(f.totalHE)}</td>
      <td style="color:#4CAF50;font-weight:700">${fmtR(f.valorHE)}</td>
      <td style="color:#9F7AEA;font-weight:600">${f.totalRef} × R$ 25</td>
      <td style="color:#f87171;font-weight:600">${f.desc>0?'−'+fmtR(f.desc):'—'}</td>
      <td style="font-weight:800;color:#4CAF50;font-size:13px">${fmtR(f.liquido)}</td>
      <td><span class="pill" style="background:rgba(32,99,173,.15);color:#BCD6F6;border:1px solid rgba(32,99,173,.25)">R$${rph}/h</span></td>
    </tr>`;
  }).join('');

  // ── aba eventos ───────────────────────────────────────────────────────
  const totalEvG=dadosOp.reduce((a,f)=>a+f.eventos,0);
  const ativosEv=dadosOp.filter(f=>f.eventos>0).length;
  const kpiEvHTML=`
    <div class="kpi" style="--ka:#9F7AEA"><div class="ki">📅</div><div class="kl">Total Eventos</div><div class="kv">${totalEvG}</div><div class="ks">em ${nomeMes}</div></div>
    <div class="kpi" style="--ka:#3B82F6"><div class="ki">👥</div><div class="kl">Executores</div><div class="kv">${ativosEv}</div><div class="ks">operadores</div></div>
    <div class="kpi" style="--ka:#4CAF50"><div class="ki">🥇</div><div class="kl">Mais Eventos</div><div class="kv">${byEv.length>0?byEv[0].eventos:0}</div><div class="ks">${byEv.length>0?srt(byEv[0].nome):'—'}</div></div>

  const tableEv=byEv.length>0?byEv.map((f,i)=>`<tr>
    <td><span class="rk ${rankClass(i)}">${rankLabel(i)}</span></td>
    <td style="font-weight:700;color:#fff">${f.nome}</td>
    <td style="color:#9F7AEA;font-weight:800">${f.eventos}</td>

    <td style="color:#CC0000">${f.chegouCedo>0?'🏢 '+f.chegouCedo+'x':'—'}</td>
  </tr>`).join(''):`<tr><td colspan="6" style="text-align:center;color:#5A7CA0;padding:20px">Nenhum evento externo registrado em ${nomeMes}</td></tr>`;

  // Lista de OS/eventos do mês
  const listaOS=regsDoMes.filter(r=>r.local&&r.local!=='SOS Energia').sort((a,b)=>a.data<b.data?-1:1).map(r=>{
    const op=usuarios.find(u=>u.id===r.operadorId);
    return `<tr>
      <td style="font-size:11px;color:#A8C4E0">${r.data||'—'}</td>
      <td style="font-weight:600;color:#fff;font-size:12px">${r.nomeOS||r.osId||'—'}</td>
      <td style="color:#9F7AEA;font-size:12px">${r.local||'—'}</td>
      <td style="color:#BCD6F6;font-size:12px">${op?op.nome:'—'}</td>
      <td style="color:#4CAF50;font-weight:600;font-size:12px">${fmtH(r.heOperador||0)}</td>
    </tr>`;
  }).join('');

:root{

.kpi:hover{border-color:var(--acc);transform:translateY(-2px);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ka,var(--acc));}
.kpi::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,var(--ka,var(--acc)) 0%,transparent 70%);opacity:.06;}
.kl{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tm);margin-bottom:8px;font-weight:700;}

.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:22px;}
.g12{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:22px;}
.card{background:var(--bgc);border:1px solid rgba(232,25,26,.15);border-radius:4px;padding:20px;transition:border-color .2s;}
.card:hover{border-color:rgba(232,25,26,.40);}
.card h3{font-size:9px;font-weight:800;color:var(--tm);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:14px;}
.tc{background:var(--bgc);border:1px solid rgba(232,25,26,.15);border-radius:4px;overflow:hidden;margin-bottom:22px;}
.th2{padding:12px 20px;border-bottom:1px solid rgba(232,25,26,.12);background:rgba(232,25,26,.05);}
.th2 h3{font-size:9px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:1.4px;}
table{width:100%;border-collapse:collapse;}
thead th{background:rgba(0,0,0,.6);padding:9px 14px;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tm);text-align:left;font-weight:700;}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .13s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(232,25,26,.05);}
tbody td{padding:11px 14px;font-size:12px;font-weight:500;}
.rk{width:24px;height:24px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;}
.r1{background:rgba(246,173,85,.15);color:var(--gold);border:1px solid rgba(246,173,85,.3);}
.r2{background:rgba(203,213,224,.1);color:var(--silv);border:1px solid rgba(203,213,224,.2);}
.r3{background:rgba(198,124,45,.12);color:var(--bron);border:1px solid rgba(198,124,45,.25);}
.rn{background:rgba(255,255,255,.05);color:var(--tm);border:1px solid rgba(255,255,255,.08);}
.pill{display:inline-block;padding:3px 8px;border-radius:3px;font-size:9px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;}
.stag{display:inline-flex;align-items:center;gap:8px;background:rgba(232,25,26,.08);border:1px solid rgba(232,25,26,.25);border-radius:3px;padding:5px 13px;font-size:10px;font-weight:800;color:var(--acc);letter-spacing:.5px;text-transform:uppercase;margin-bottom:18px;}
.stag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--acc);}
.insight{background:rgba(232,25,26,.07);border:1px solid rgba(232,25,26,.25);border-radius:4px;padding:14px 18px;font-size:12px;line-height:1.6;color:var(--ts);margin-bottom:22px;}

.alerta-g{background:rgba(76,175,80,.07);border-color:rgba(76,175,80,.22);color:#81C784;}

</style>

function gerarPDFRelatorioHE(){
  const fonte='app';
  const mes=document.getElementById('rhe-mes')?.value||new Date().toISOString().slice(0,7);

  // ── coleta dados ──────────────────────────────────────────────
  let titulo,subtitulo,metricas,ranking,ganhos,resumoExec,comparativoHTML='',notaHTML='';

  if(fonte==='historico'){
    // Monta a partir dos 3 meses históricos
    const meses=Object.keys(_heHistorico);
    const todosFuncs=[...new Set(meses.flatMap(m=>_heHistorico[m].funcionarios.map(f=>f.nome)))];
    const resumoFuncs=todosFuncs.map(nome=>{
      const totalH=meses.reduce((a,m)=>{const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);return a+(f?f.horas:0);},0);
      const totalV=meses.reduce((a,m)=>{const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);return a+(f?f.valor:0);},0);
      const eventos=meses.reduce((a,m)=>{const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);return a+(f?1:0);},0);
      return {nome,totalH,totalV,eventos};
    }).sort((a,b)=>b.totalV-a.totalV);
    const totalH3=meses.reduce((a,m)=>a+_heHistorico[m].horas,0);
    const totalV3=meses.reduce((a,m)=>a+_heHistorico[m].total,0);
    const topGanho=resumoFuncs[0];
    const topHoras=[...resumoFuncs].sort((a,b)=>b.totalH-a.totalH)[0];
    titulo='DASHBOARD GESTÃO HE · SOS ENERGIA';
    subtitulo='Dezembro 2025 · Janeiro 2026 · Fevereiro 2026';
    metricas=[
      {label:'COLABORADORES ATIVOS',valor:todosFuncs.length,sub:'em 3 meses',cor:'#e74c3c'},
      {label:'TOTAL HORAS EXTRAS',valor:fmtHE(totalH3),sub:'média '+fmtHE(totalH3/todosFuncs.length)+'/pessoa',cor:'#e67e22'},
      {label:'CUSTO TOTAL 3 MESES',valor:'R$ '+totalV3.toFixed(2),sub:'média R$ '+(totalV3/todosFuncs.length).toFixed(2)+'/pessoa',cor:'#9b59b6'},
      {label:'MAIOR GERADOR DE RECEITA',valor:topGanho.nome.split(' ')[0],sub:'R$ '+topGanho.totalV.toFixed(2),cor:'#2ecc71'},
      {label:'MAIS HORAS',valor:topHoras.nome.split(' ')[0],sub:fmtHE(topHoras.totalH),cor:'#3498db'},

    const maxH=[...resumoFuncs].sort((a,b)=>b.totalH-a.totalH)[0]?.totalH||1;
    const scoreMap={};
    resumoFuncs.forEach((f,i)=>{scoreMap[f.nome]=Math.round(100*(1-(i/resumoFuncs.length)));});
    ranking=[...resumoFuncs].sort((a,b)=>scoreMap[b.nome]-scoreMap[a.nome]).slice(0,8).map(f=>({nome:f.nome.split(' ')[0],pts:scoreMap[f.nome],pct:Math.round((scoreMap[f.nome]/100)*100)}));
    ganhos=resumoFuncs.slice(0,8).map((f,i)=>{

function _rhe_pdf_comparativo(){
  const meses=Object.keys(_heHistorico);
  const todosNomes=[...new Set(meses.flatMap(m=>_heHistorico[m].funcionarios.map(f=>f.nome)))].sort();
  const rows=todosNomes.map(nome=>{
    const cols=meses.map(m=>{
      const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);
      return f?`<td style="text-align:right;padding:5px 8px;color:#e67e22;font-size:11px">${fmtHE(f.horas)}</td><td style="text-align:right;padding:5px 8px;color:#2ecc71;font-size:11px">R$ ${f.valor.toFixed(2)}</td>`
               :`<td style="text-align:right;padding:5px 8px;color:#444;font-size:11px">—</td><td style="text-align:right;padding:5px 8px;color:#444;font-size:11px">—</td>`;
    }).join('');
    const total=meses.reduce((a,m)=>{const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);return a+(f?f.valor:0);},0);
    return `<tr style="border-bottom:1px solid #2a2a2a"><td style="padding:5px 8px;font-size:11px;font-weight:600;color:#ccc;white-space:nowrap">${nome}</td>${cols}<td style="text-align:right;padding:5px 8px;color:#2ecc71;font-weight:700;font-size:12px">R$ ${total.toFixed(2)}</td></tr>`;
  }).join('');
  return `<div style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;margin-bottom:20px;overflow-x:auto">
    <div style="font-size:12px;font-weight:700;color:#9b59b6;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px">📅 COMPARATIVO 3 MESES — TODOS OS FUNCIONÁRIOS</div>

      <thead><tr style="border-bottom:2px solid #333">
        <th style="text-align:left;padding:6px 8px;font-size:10px;color:#666;font-weight:600">FUNCIONÁRIO</th>
        <th colspan="2" style="text-align:center;padding:6px 8px;font-size:10px;color:#666;font-weight:600">DEZ 2025</th>
        <th colspan="2" style="text-align:center;padding:6px 8px;font-size:10px;color:#666;font-weight:600">JAN 2026</th>
        <th colspan="2" style="text-align:center;padding:6px 8px;font-size:10px;color:#666;font-weight:600">FEV 2026</th>
        <th style="text-align:right;padding:6px 8px;font-size:10px;color:#2ecc71;font-weight:700">TOTAL</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="border-top:2px solid #444">
        <td style="padding:6px 8px;font-size:11px;font-weight:800;color:#fff">TOTAL</td>
        ${Object.values(_heHistorico).map(d=>'<td style="text-align:right;padding:6px 8px;color:#e67e22;font-size:11px;font-weight:700">'+fmtHE(d.horas)+'</td><td style="text-align:right;padding:6px 8px;color:#2ecc71;font-size:11px;font-weight:700">R$ '+d.total.toFixed(2)+'</td>').join('')}
        <td style="text-align:right;padding:6px 8px;color:#2ecc71;font-weight:800;font-size:13px">R$ ${Object.values(_heHistorico).reduce((a,d)=>a+d.total,0).toFixed(2)}</td>
      </tr></tfoot>
    </table>
  </div>`;
}

function _rhe_comparativo(){
  const meses=Object.keys(_heHistorico);
  const todosNomes=[...new Set(meses.flatMap(m=>_heHistorico[m].funcionarios.map(f=>f.nome)))].sort();
  const rows=todosNomes.map(nome=>{
    const cols=meses.map(m=>{
      const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);
      return f?`<td style="text-align:right;padding:4px 8px;color:var(--yellow);font-size:12px">${fmtHE(f.horas)}</td><td style="text-align:right;padding:4px 8px;color:var(--green);font-size:12px">R$ ${f.valor.toFixed(2)}</td>`
               :`<td style="text-align:right;padding:4px 8px;color:var(--border);font-size:12px">—</td><td style="text-align:right;padding:4px 8px;color:var(--border);font-size:12px">—</td>`;
    }).join('');
    const total=meses.reduce((a,m)=>{const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);return a+(f?f.valor:0);},0);
    return `<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px 8px;font-size:12px;font-weight:600;white-space:nowrap">${nome}</td>${cols}<td style="text-align:right;padding:4px 8px;color:var(--green);font-weight:700;font-size:12px">R$ ${total.toFixed(2)}</td></tr>`;

  return `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">

      <th colspan="2" style="text-align:center;padding:6px 8px;font-size:11px;color:var(--dim)">Jan 2026</th>
      <th colspan="2" style="text-align:center;padding:6px 8px;font-size:11px;color:var(--dim)">Fev 2026</th>
      <th style="text-align:right;padding:6px 8px;font-size:11px;color:var(--green)">Total 3 meses</th>
    </tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr style="border-top:2px solid var(--border)">
      <td style="padding:6px 8px;font-size:12px;font-weight:700">TOTAL</td>
      ${Object.values(_heHistorico).map(d=>'<td style="text-align:right;padding:6px 8px;color:var(--yellow);font-size:12px;font-weight:700">'+fmtHE(d.horas)+'</td><td style="text-align:right;padding:6px 8px;color:var(--green);font-size:12px;font-weight:700">R$ '+d.total.toFixed(2)+'</td>').join('')}
      <td style="text-align:right;padding:6px 8px;color:var(--green);font-weight:700;font-size:13px">R$ ${Object.values(_heHistorico).reduce((a,d)=>a+d.total,0).toFixed(2)}</td>
    </tr></tfoot>
  </table></div>`;
}

let _editUserId=null;
function editUser(id){
  const u=usuarios.find(u=>u.id===id);if(!u) return;
  _editUserId=id;
  document.getElementById('nu-nome').value=u.nome||'';
  document.getElementById('nu-user').value=u.user||'';
  document.getElementById('nu-pass').value=u.senha||'';
  document.getElementById('nu-perfil').value=u.perfil||'operador';
  document.getElementById('nu-wpp').value=u.wpp||'';
  document.getElementById('nu-he').value=u.heValor||'';

  btn.style.background='#d97706';

}
function cancelEditUser(){
  _editUserId=null;
  document.getElementById('nu-nome').value='';
  document.getElementById('nu-user').value='';
  document.getElementById('nu-pass').value='';
  document.getElementById('nu-wpp').value='';
  document.getElementById('nu-he').value='';
  const btn=document.getElementById('btn-add-user');
  btn.textContent='+ Adicionar Usuário';
  btn.style.background='';
  const cancelBtn=document.getElementById('btn-cancel-edit');
  if(cancelBtn) cancelBtn.style.display='none';
  setFeedback('fb-add-user','','');
}
function addUser(){
  const nome=document.getElementById('nu-nome')?.value.trim();
  const user=document.getElementById('nu-user')?.value.trim().toLowerCase();
  const pass=document.getElementById('nu-pass')?.value;
  const perfil=document.getElementById('nu-perfil')?.value;
  const wpp=document.getElementById('nu-wpp')?.value.trim()||'';
  const heValor=parseFloat(document.getElementById('nu-he')?.value)||0;
  const btn=document.getElementById('btn-add-user');
  if(!nome||!user||!pass){setFeedback('fb-add-user','✕ Preencha nome, usuário e senha.','err');return;}
  // Modo edição
  if(_editUserId){
    const idx=usuarios.findIndex(u=>u.id===_editUserId);
    if(idx===-1) return;
    const conflito=usuarios.find(u=>u.user===user&&u.id!==_editUserId);
    if(conflito){setFeedback('fb-add-user','✕ Nome de usuário já em uso.','err');return;}
    usuarios[idx]={...usuarios[idx],nome,user,senha:pass,perfil,wpp,heValor};
    fbSaveWithFeedback(()=>saveAll(), btn, 'fb-add-user').then(()=>{
      cancelEditUser();
      renderUsers();
    });
    return;
  }
  // Modo criação
  if(usuarios.find(u=>u.user===user)){setFeedback('fb-add-user','✕ Usuário já existe.','err');return;}
  usuarios.push({id:'u_'+Date.now(),nome,user,senha:pass,perfil,wpp,heValor});
  fbSaveWithFeedback(()=>saveAll(), btn, 'fb-add-user').then(()=>{
    renderUsers();
    document.getElementById('nu-nome').value='';
    document.getElementById('nu-user').value='';
    document.getElementById('nu-pass').value='';
    document.getElementById('nu-wpp').value='';
    document.getElementById('nu-he').value='';
  });
}
function delUser(id){if(confirm('Remover usuário?')){usuarios=usuarios.filter(u=>u.id!==id);saveAll();renderUsers();}}
function expBackup(){const d=JSON.stringify({ordens,registros,usuarios,config},null,2);const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(d);a.download='sos-backup-'+new Date().toISOString().split('T')[0]+'.json';a.click();}
function impBackup(e){const f=e.target.files[0];if(!f) return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(confirm(`Importar ${d.ordens?.length||0} OS, ${d.registros?.length||0} registros, ${d.usuarios?.length||0} usuários?`)){ordens=d.ordens||[];registros=d.registros||[];usuarios=d.usuarios||usuarios;config={...config,...(d.config||{})};saveAll();renderUsers();alert('Importado!')}}catch{alert('Arquivo inválido.')}};r.readAsText(f);}
function limparTudo(){if(confirm('Apagar TODOS os dados?')){ordens=[];registros=[];saveAll();renderOSList();alert('Dados apagados.');}}

function editarHEReg(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r) return;
  // Remove modal anterior se existir
  document.getElementById('modal-he-edit')?.remove();
  const pop=document.createElement('div');
  pop.id='modal-he-edit';
  pop.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9998;display:flex;align-items:center;justify-content:center;padding:16px';
  pop.innerHTML=`
    <div style="background:var(--card);border:1px solid var(--yellow);border-radius:16px;padding:24px;max-width:360px;width:100%">
      <div style="font-weight:700;font-size:15px;margin-bottom:4px">✏️ Editar HE — ${fmtData(r.data)}</div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:16px">OS ${r.osNum} · ${r.operadorNome}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        <div class="field" style="margin:0"><label>Início HE</label><input type="time" id="mhe-ini" value="${r.heIni||''}"/></div>
        <div class="field" style="margin:0"><label>Fim HE</label><input type="time" id="mhe-fim" value="${r.heFim||''}"/></div>
      </div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:16px">Deixe em branco para zerar a HE deste registro.</div>
      <div id="mhe-preview" style="font-size:13px;color:var(--yellow);margin-bottom:14px;min-height:18px"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" style="flex:1" onclick="salvarHEReg('${regId}')">💾 Salvar</button>
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="document.getElementById('modal-he-edit').remove()">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(pop);
  // Preview ao alterar horários
  ['mhe-ini','mhe-fim'].forEach(id=>document.getElementById(id).addEventListener('input',_previewHE));
  _previewHE();
}
function _previewHE(){
  const ini=document.getElementById('mhe-ini')?.value;
  const fim=document.getElementById('mhe-fim')?.value;
  const prev=document.getElementById('mhe-preview');
  if(!prev) return;
  if(ini&&fim){
    const iM=toMin(ini),fM=toMin(fim);
    const h=(fM>iM?fM-iM:fM+1440-iM)/60;
    prev.textContent=`HE calculada: ${fmtHE(h)}`;
  } else {
    prev.textContent=ini||fim?'Preencha os dois campos.':'HE será zerada.';
  }
}
function salvarHEReg(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r) return;
  const ini=document.getElementById('mhe-ini')?.value||'';
  const fim=document.getElementById('mhe-fim')?.value||'';
  let heH=0;
  if(ini&&fim){
    const iM=toMin(ini),fM=toMin(fim);
    heH=(fM>iM?fM-iM:fM+1440-iM)/60;
  }
  r.heIni=ini;
  r.heFim=fim;
  r.heOperador=heH;
  delete r.valorHEOperador;
  fbSaveRegistros().then(()=>{
    document.getElementById('modal-he-edit')?.remove();
    showToast('HE atualizada com sucesso.');
    verOS(r.osId);
  }).catch(()=>showToast('Erro ao salvar.','err'));
}

function salvarRegistroAdmin(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r) return;
  const os=ordens.find(o=>o.id===r.osId);
  const geradores=(os?.equipamentos||[]).filter(e=>e.tipo==='gerador');

  // Identificação
  r.data=document.getElementById('ead-data')?.value||r.data;
  const nomeOpEdit=document.getElementById('ead-nome-op')?.value;
  if(nomeOpEdit!==undefined){r.operadorNome=nomeOpEdit;r.nomeOperador=nomeOpEdit;}
  const respEdit=document.getElementById('ead-resp')?.value;
  if(respEdit!==undefined) r.respCliente=respEdit;

  // Abastecimento
  r.abastecido=document.getElementById('ead-abast')?.checked||false;
  const litrosVal=parseFloat(document.getElementById('ead-litros')?.value||'0');
  r.litros=isNaN(litrosVal)?0:litrosVal;

  // Atualiza geradores
  if(r.geradoresReg&&geradores.length){
    geradores.forEach((g,gi)=>{
      const gd=r.geradoresReg.find(x=>x.eqId===g.id);
      if(!gd||(gd.standby&&!gd.rodou)) return;
      const virou=document.getElementById(`ead-virou-${gi}`)?.checked||false;
      const hi=document.getElementById(`ead-hi-${gi}`)?.value;
      const hf=document.getElementById(`ead-hf-${gi}`)?.value;
      const hcRaw=parseInt(document.getElementById(`ead-hc-${gi}`)?.value||'12');
      const meia=document.getElementById(`ead-meia-${gi}`)?.checked||false;
      if(hi!==undefined) gd.horIni=parseFloat(hi)||gd.horIni;
      if(hf!==undefined) gd.horFim=parseFloat(hf)||gd.horFim;
      gd.hContratadas=isNaN(hcRaw)?12:hcRaw;
      gd.meiadiaria=meia;
      gd.virou=virou;
      if(virou){
        const dtLiga=document.getElementById(`ead-dt-liga-${gi}`)?.value||'';
        const dtDesliga=document.getElementById(`ead-dt-desliga-${gi}`)?.value||'';
        gd.dtLiga=dtLiga; gd.dtDesliga=dtDesliga;
        gd.part=dtLiga?dtLiga.split('T')[1]?.slice(0,5)||'':'';
        gd.par=dtDesliga?dtDesliga.split('T')[1]?.slice(0,5)||'':'';
        if(dtLiga&&dtDesliga){
          const msL=new Date(dtLiga).getTime(),msD=new Date(dtDesliga).getTime();
          if(!isNaN(msL)&&!isNaN(msD)&&msD>msL){
            gd.totalHoras=(msD-msL)/3600000;
            let limiteTotal=0;
            const d1=new Date(dtLiga);d1.setHours(0,0,0,0);
            const d2=new Date(dtDesliga);d2.setHours(0,0,0,0);
            for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1)){
              const ds=d.toISOString().split('T')[0];
              const pd=(g.previsaoDias||[]).find(p=>p.data===ds);
              limiteTotal+=(meia?6:(pd?.hContratadas||gd.hContratadas||12));
            }
            gd.heM=Math.max(0,gd.totalHoras-limiteTotal);
          }
        }
      } else {
        gd.dtLiga=''; gd.dtDesliga='';
        const part=document.getElementById(`ead-part-${gi}`)?.value;
        const par=document.getElementById(`ead-par-${gi}`)?.value;
        if(part!==undefined) gd.part=part;
        if(par!==undefined) gd.par=par;
        if(gd.part&&gd.par){
          const pM=toMin(gd.part),sM=toMin(gd.par);
          gd.totalHoras=(sM>pM?sM-pM:sM+1440-pM)/60;
          const limH=meia?6:gd.hContratadas;
          gd.heM=Math.max(0,gd.totalHoras-limH);
        }
      }
    });
    // Atualiza referência legada (primeiro gerador ativo)
    const gRef=r.geradoresReg.find(g=>!g.standby||g.rodou);
    if(gRef){r.partida=gRef.part;r.parada=gRef.par;r.horIni=gRef.horIni;r.horFim=gRef.horFim;r.totalHoras=gRef.totalHoras;}
    r.heMaquina=r.geradoresReg.reduce((a,g)=>a+(g.heM||0),0);
  }

  // Atualiza transporte
  r.placa=document.getElementById('ead-placa')?.value??r.placa;
  r.motorista=document.getElementById('ead-mot')?.value??r.motorista;
  r.itinerarioSaida=document.getElementById('ead-itin-saida')?.value??r.itinerarioSaida;
  r.itinerarioChegada=document.getElementById('ead-itin-cheg')?.value??r.itinerarioChegada;
  r.itinerarioSaidaVolta=document.getElementById('ead-itin-saida-v')?.value??r.itinerarioSaidaVolta;
  r.itinerarioChegadaVolta=document.getElementById('ead-itin-cheg-v')?.value??r.itinerarioChegadaVolta;

  // HE operador principal
  const heIni=document.getElementById('ead-he-ini')?.value||'';
  const heFim=document.getElementById('ead-he-fim')?.value||'';
  r.heIni=heIni; r.heFim=heFim;
  let heHBase=0;
  if(heIni&&heFim){const iM=toMin(heIni),fM=toMin(heFim);heHBase=(fM>iM?fM-iM:fM+1440-iM)/60;}

  // Chegou cedo
  r.chegouCedo=document.getElementById('ead-cedo')?.checked||false;
  const cedoIni=document.getElementById('ead-cedo-ini')?.value||'';
  const cedoFim=document.getElementById('ead-cedo-fim')?.value||'';
  r.cedoIni=cedoIni; r.cedoFim=cedoFim;
  let heCedo=0;
  if(r.chegouCedo&&cedoIni&&cedoFim){const cIM=toMin(cedoIni),cFM=toMin(cedoFim);heCedo=(cFM>cIM?cFM-cIM:cFM+1440-cIM)/60;}
  r.heOperador=heHBase+heCedo;
  delete r.valorHEOperador;

  // Refeições
  r.refeicoes=refStepperVal('ead-ref');
  r.valorRefeicao=r.refeicoes*25;

  // Observações
  r.obs=document.getElementById('ead-obs')?.value??r.obs;

  // Marca correção administrativa
  r.corrigidoPor=sessaoAtual.nome;
  r.corrigidoEm=new Date().toISOString();

  fbSaveRegistros().then(()=>{
    DB.set('sos_registros',registros);
    document.getElementById('modal-reg-edit')?.remove();
    showToast('Registro atualizado com sucesso.');
    verOS(r.osId);
  }).catch(()=>showToast('Erro ao salvar.','err'));
}

function excluirRegistroAdmin(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r) return;
  const confirmMsg='Excluir o registro do dia '+fmtData(r.data)+' (OS '+r.osNum+')?\n\nEsta ação não pode ser desfeita.';
  if(!confirm(confirmMsg)) return;
  const osId=r.osId;
  const idx=registros.findIndex(x=>x.id===regId);
  if(idx===-1) return;
  registros.splice(idx,1);
  DB.set('sos_registros',registros);
  fbRemove('registros/'+regId).then(()=>{
    showToast('Registro do dia '+fmtData(r.data)+' excluído.');
    verOS(osId);
  }).catch(()=>{
    registros.splice(idx,0,r); // reverte se falhou
    DB.set('sos_registros',registros);
    showToast('Erro ao excluir. Tente novamente.','err');
  });
}

function _gerarPDF(os, regsOS){
  try{
  regsOS=Array.isArray(regsOS)?regsOS:[];
  const totHoras=regsOS.reduce((a,r)=>a+(r.totalHoras||0),0);
  const totHEMaq=regsOS.reduce((a,r)=>a+(r.heMaquina||0),0);
  // Custo total de HE máquina: soma (heMaquina × heValorGerador) por gerador
  const totValHEMaq=(()=>{
    if(!totHEMaq||!os.equipamentos) return 0;
    const geradores=(os.equipamentos||[]).filter(e=>e.tipo==='gerador');
    return geradores.reduce((acc,g)=>acc+(parseFloat(g.heValorGerador)||0)*totHEMaq,0);
  })();
  // Recalcula HE do operador pelo período informado (heIni/heFim) — proporcional ao valor/hora
  let totHEOp=0, totValHE=0;
  regsOS.forEach(r=>{
    let heH=0;
    if(r.heIni&&r.heFim){
      const hIniM=toMin(r.heIni),hFimM=toMin(r.heFim);
      heH=(hFimM>hIniM?hFimM-hIniM:hFimM+1440-hIniM)/60;
    } else {
      heH=r.heOperador||0;
    }
    // valor/hora: usa valorHEOperador gravado proporcional; ou recalcula pelo heValor do operador
    const opUser=usuarios.find(u=>u.id===r.operadorId);
    const heValorH=(opUser&&opUser.heValor>0)?opUser.heValor:config.heValor;
    totHEOp+=heH;
    totValHE+=heH*heValorH;
  });
  const heOpH=fmtHE(totHEOp);
  const dataEmissao=new Date().toLocaleString('pt-BR');

  // índice do registro mais recente (por data) — assinatura só aparece nele
  const _regsOrdenados=regsOS.slice().sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  const _lastRegId=_regsOrdenados.length?_regsOrdenados[_regsOrdenados.length-1].id:null;

  const registrosHTML=regsOS.map(r=>{
    const heM=r.heMaquina||0;
    const heO=r.heOperador||0;
    const _opUserPdf=usuarios.find(u=>u.id===r.operadorId);
    const _heValPdf=(_opUserPdf&&_opUserPdf.heValor>0)?_opUserPdf.heValor:config.heValor;
    const valHE=heO*_heValPdf;
    const _isLastReg=r.id===_lastRegId;
    return `
    <div class="reg-box">
      <div class="reg-header">
        <span class="reg-data">${fmtData(r.data)}</span>
        ${heM>0?'<span class="badge-warn">⚠ HE MÁQUINA: +'+fmtHE(heM)+'</span>':'<span class="badge-ok">✓ Dentro do contrato</span>'}
      </div>
      <div class="reg-grid">
        ${(()=>{
          const _fDt=function(dt){if(!dt)return'—';const d=new Date(dt);return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});};
          const _gRegs=r.geradoresReg&&r.geradoresReg.length?r.geradoresReg:null;
          if(_gRegs){
            return _gRegs.map(function(gd){
              const _patLabel=gd.patrimonio?(' <span style="color:#888;font-size:9px">('+gd.patrimonio+')</span>'):'';
              const _gTitle='<div class="span2" style="font-weight:700;font-size:10px;color:#CC0000;border-top:1px solid #eee;padding-top:4px;margin-top:2px">⚡ '+(gd.potencia||'Gerador')+_patLabel+'</div>';
              if(gd.standby&&!gd.rodou) return _gTitle+'<div class="span2"><span class="lbl">Status</span><span class="val" style="color:#f59e0b">Stand-by (não rodou)</span></div>';
              if(!gd.rodou) return _gTitle+'<div class="span2"><span class="lbl">Status</span><span class="val" style="color:#888">Não operou</span></div>';
              if(gd.virou) return _gTitle+
                '<div class="span2"><span class="lbl">🔄 Virou</span><span class="val" style="color:#f59e0b;font-weight:700">'+_fDt(gd.dtLiga)+' → '+_fDt(gd.dtDesliga)+' ('+(gd.totalHoras||0).toFixed(1)+'h)</span></div>'+
                '<div><span class="lbl">Horímetro</span><span class="val">'+(gd.horIni||'—')+' → '+(gd.horFim||'—')+'</span></div>'+
                (gd.heM>0?'<div><span class="lbl">HE máquina</span><span class="val" style="color:#856404">+'+gd.heM.toFixed(1)+'h</span></div>':'');
              return _gTitle+
                '<div><span class="lbl">Liga</span><span class="val">'+(gd.part||'—')+'</span></div>'+
                '<div><span class="lbl">Desliga</span><span class="val">'+(gd.par||'—')+'</span></div>'+
                '<div><span class="lbl">Total</span><span class="val">'+(gd.totalHoras||0).toFixed(1)+'h</span></div>'+

            }).join('');

          // fallback OS antiga sem geradoresReg
          return '<div><span class="lbl">Liga</span><span class="val">'+(r.partida||'—')+'</span></div><div><span class="lbl">Desliga</span><span class="val">'+(r.parada||'—')+'</span></div>'+

            '<div><span class="lbl">Horímetro</span><span class="val">'+(r.horIni||'—')+' → '+(r.horFim||'—')+'</span></div>';
        })()}
        <div><span class="lbl">Operador</span><span class="val">${r.nomeOperador||r.operadorNome||'—'}</span></div>

        <div><span class="lbl">Placa</span><span class="val">${r.placa||'—'}</span></div>
        <div><span class="lbl">Saída empresa</span><span class="val">${r.itinerarioSaida||r.itinerario||'—'}</span></div>
        <div><span class="lbl">Chegada evento</span><span class="val">${r.itinerarioChegada||'—'}</span></div>
        <div><span class="lbl">Saída evento</span><span class="val">${r.itinerarioSaidaVolta||'—'}</span></div>
        <div><span class="lbl">Chegada empresa</span><span class="val">${r.itinerarioChegadaVolta||'—'}</span></div>
        ${heO>0?'<div class="span2"><span class="lbl">HE Operador</span><span class="val he-val">'+fmtHE(heO)+' → R$ '+valHE.toFixed(2)+'</span></div>':''}
        ${(r.refeicoes||0)>0?'<div class="span2"><span class="lbl">Refeições (×'+r.refeicoes+')</span><span class="val" style="color:#059669;font-weight:700">R$ '+(r.valorRefeicao||r.refeicoes*25).toFixed(2)+'</span></div>':''}
        ${r.obs?'<div class="span2"><span class="lbl">Observações</span><span class="val">'+r.obs+'</span></div>':''}
      </div>
      ${_isLastReg?`<div class="sig-row">
        <div class="sig-box">
          <div class="sig-title">ASSINATURA DO CLIENTE</div>
          ${r.assinatura?'<img src="'+r.assinatura+'" class="sig-img"/>'  :'<div class="sig-empty">Não coletada</div>'}

          <div class="sig-name">${r.nomeOperador||r.operadorNome||''}</div>
        </div>
      </div>`:''}
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html>

  .m-red{border-color:#CC0000;color:#CC0000}
  .m-warn{border-color:#f59e0b;color:#f59e0b}
  .m-ok{border-color:#22c55e;color:#22c55e}
  /* SEÇÕES */
  .sec-title{background:#CC0000;color:#fff;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.8px;padding:4px 10px;margin-bottom:6px;margin-top:10px}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;padding:0 4px;margin-bottom:4px}
  .info-row{display:flex;gap:6px;align-items:baseline}
  .info-lbl{font-size:9px;color:#888;font-weight:700;text-transform:uppercase;white-space:nowrap;min-width:70px}
  .info-val{font-size:10px;color:#111}
  .info-full{grid-column:1/-1}
  /* REGISTROS */
  .reg-box{border:1px solid #ddd;border-radius:6px;padding:10px;margin-bottom:10px;page-break-inside:avoid}
  .reg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:6px}
  .reg-data{font-size:12px;font-weight:700;color:#0a0a0a}
  .badge-warn{background:#fff3cd;color:#856404;border:1px solid #ffc107;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700}
  .badge-ok{background:#d1fae5;color:#065f46;border:1px solid #22c55e;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700}
  .reg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
  .span2{grid-column:span 2}
  .lbl{display:block;font-size:8px;color:#888;text-transform:uppercase;font-weight:700;margin-bottom:1px}
  .val{font-size:10px;color:#111;font-weight:500}
  .he-val{color:#d97706;font-weight:700}
  /* ASSINATURAS */
  .sig-row{display:flex;gap:12px;margin-top:8px;border-top:1px solid #eee;padding-top:8px}
  .sig-box{flex:1;border:1px solid #ddd;border-radius:4px;padding:8px;text-align:center}
  .sig-title{font-size:8px;font-weight:700;color:#CC0000;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .sig-img{max-height:60px;max-width:100%;object-fit:contain;display:block;margin:0 auto}
  .sig-empty{height:50px;display:flex;align-items:center;justify-content:center;color:#bbb;font-style:italic;font-size:9px}
  .sig-name{font-size:9px;color:#666;margin-top:4px;border-top:1px solid #eee;padding-top:3px}
  /* RODAPÉ */
  .footer{margin-top:16px;border-top:2px solid #CC0000;padding-top:8px;display:flex;justify-content:space-between;font-size:8px;color:#888}
  @media print{
    .no-print{display:none}
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
  /* BOTÃO IMPRIMIR */
  .print-bar{position:fixed;top:0;left:0;right:0;background:#CC0000;padding:10px 20px;display:flex;gap:12px;align-items:center;z-index:999}
  .print-bar button{background:#fff;color:#CC0000;border:none;padding:8px 20px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer}
  .print-bar span{color:#fff;font-size:13px;font-weight:600}
  @media print{.print-bar{display:none}body{padding-top:0}}
  body{padding-top:52px}
</style>
</head>

<div class="sec-title">Equipamentos</div>
<div style="padding:0 4px;margin-bottom:4px">
${(()=>{
  const eqs=os.equipamentos&&os.equipamentos.length?os.equipamentos:[];
  if(!eqs.length) return '<div class="info-row"><span class="info-lbl">Gerador</span><span class="info-val">'+(os.potencia||'—')+' · '+(os.patrimonio||'—')+'</span></div>';
  const geradores=eqs.filter(e=>e.tipo==='gerador');
  const acessorios=eqs.filter(e=>e.tipo==='acessorio');
  let html='';
  if(geradores.length){
    html+='<div style="font-size:9px;font-weight:700;color:#CC0000;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Geradores</div>';
    html+='<table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:8px">'+
      '<thead><tr style="background:#f3f3f3">'+
        '<th style="padding:5px 8px;text-align:left;border:1px solid #ddd;font-size:9px;color:#555;text-transform:uppercase">Potência</th>'+
        '<th style="padding:5px 8px;text-align:left;border:1px solid #ddd;font-size:9px;color:#555;text-transform:uppercase">Patrimônio</th>'+
        '<th style="padding:5px 8px;text-align:right;border:1px solid #ddd;font-size:9px;color:#555;text-transform:uppercase">Horas rodadas</th>'+
        '<th style="padding:5px 8px;text-align:right;border:1px solid #ddd;font-size:9px;color:#856404;text-transform:uppercase">HE máquina</th>'+
        '<th style="padding:5px 8px;text-align:right;border:1px solid #ddd;font-size:9px;color:#CC0000;text-transform:uppercase">Valor HE</th>'+
      '</tr></thead>'+
      '<tbody>'+geradores.map(g=>{
        // Totais por gerador específico, somando todos os registros da OS
        const horasGerador=regsOS.reduce((acc,r)=>{
          const gd=(r.geradoresReg||[]).find(x=>x.eqId===g.id);
          if(!gd||(!gd.standby&&gd.rodou===false)||( gd.standby&&!gd.rodou)) return acc;
          return acc+(gd.totalHoras||0);
        },0);
        const heMaqGerador=regsOS.reduce((acc,r)=>{
          const gd=(r.geradoresReg||[]).find(x=>x.eqId===g.id);
          if(!gd) return acc;
          return acc+(gd.heM||0);
        },0);
        const heVal=parseFloat(g.heValorGerador)||0;
        const valorHETotal=heMaqGerador*heVal;
        const _corHEMaq=heMaqGerador>0?'#856404':'#22c55e';
        const _corValHE=valorHETotal>0?'#CC0000':'#888';
        const _txtHEMaq=heMaqGerador>0?'+'+fmtHE(heMaqGerador)+' extra':'✓ Dentro contrato';
        const _txtValHE=heVal>0?(valorHETotal>0?'R$ '+valorHETotal.toFixed(2)+'<br/><span style="font-size:8px;font-weight:400;color:#888">R$ '+heVal.toFixed(2)+'/hora extra</span>':'R$ 0,00'):'<span style="color:#888">Não informado</span>';
        // patrimônio: prioriza o preenchido pelo operador nos geradoresReg, fallback para g.patrimonio da OS
        const _gdPatrimonio=(regsOS.map(r=>(r.geradoresReg||[]).find(x=>x.eqId===g.id)).filter(x=>x&&x.patrimonio).pop()||{}).patrimonio;
        const _patrimonioPdf=_gdPatrimonio||g.patrimonio||'—';
        return '<tr>'+
          '<td style="padding:5px 8px;border:1px solid #ddd;font-weight:700">⚡ '+(g.potencia||'—')+'</td>'+
          '<td style="padding:5px 8px;border:1px solid #ddd">'+_patrimonioPdf+'</td>'+
          '<td style="padding:5px 8px;border:1px solid #ddd;text-align:right">'+(horasGerador>0?fmtHE(horasGerador):'—')+'</td>'+
          '<td style="padding:5px 8px;border:1px solid #ddd;text-align:right;font-weight:700;color:'+_corHEMaq+'">'+_txtHEMaq+'</td>'+
          '<td style="padding:5px 8px;border:1px solid #ddd;text-align:right;font-weight:700;color:'+_corValHE+'">'+_txtValHE+'</td>'+
        '</tr>';
      }).join('')+'</tbody></table>';
  }
  if(acessorios.length){
    html+='<div style="font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;margin-top:4px">Acessórios</div>';
    html+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">'+acessorios.map(a=>'<span style="background:#f3f4f6;border:1px solid #ddd;border-radius:4px;padding:2px 7px;font-size:9px">🔌 '+(a.nome||'—')+(a.quantidade&&a.quantidade!='1'?' ×'+a.quantidade:'')+'</span>').join('')+'</div>';
  }
  return html;
})()}

function salvarHEAvulsa(){
  const data=document.getElementById('hav-data')?.value;
  const ini=document.getElementById('hav-ini')?.value;
  const fim=document.getElementById('hav-fim')?.value;
  const local=document.getElementById('hav-local')?.value?.trim();
  const evento=document.getElementById('hav-evento')?.value?.trim();
  const motivoEl=document.querySelector('input[name="hav-motivo"]:checked');
  const motivoRaw=motivoEl?.value||'';
  const motivo=motivoRaw==='__outro__'?(document.getElementById('hav-motivo-outro')?.value?.trim()||''):motivoRaw;
  if(!data){showToast('Informe a data.','err');return;}
  if(!ini||!fim){showToast('Informe início e fim do período.','err');return;}
  if(!local){showToast('Informe o local de trabalho.','err');return;}
  if(!motivoRaw){showToast('Selecione o motivo da HE.','err');return;}
  if(motivoRaw==='__outro__'&&!motivo){showToast('Descreva o motivo da HE.','err');return;}
  // Chegou cedo
  const cedoAtivo=document.getElementById('hav-cedo')?.checked||false;
  const cedoIni=cedoAtivo?(document.getElementById('hav-cedo-ini')?.value||''):'';
  const cedoFim=cedoAtivo?(document.getElementById('hav-cedo-fim')?.value||''):'';
  let heCedo=0;
  if(cedoAtivo&&cedoIni&&cedoFim){const cI=toMin(cedoIni),cF=toMin(cedoFim);heCedo=(cF>cI?cF-cI:cF+1440-cI)/60;}
  const iM=toMin(ini),fM=toMin(fim);
  const heBase=(fM>iM?fM-iM:fM+1440-iM)/60;
  const heOperador=heBase+heCedo;
  const refeicoes=refStepperVal('hav-ref');
  const u=usuarios.find(u=>u.id===sessaoAtual.id);
  const valorHora=(u&&u.heValor>0)?u.heValor:config.heValor;
  const reg={
    id:'hav_'+Date.now(),
    heAvulsa:true,
    osId:null,
    osNum:'HE Avulsa',
    cliente:'—',
    evento:evento||'',
    local:local,
    motivoHE:motivo,
    operadorId:sessaoAtual.id,
    operadorNome:sessaoAtual.nome,
    data,
    heIni:ini,
    heFim:fim,
    chegouCedo:cedoAtivo,
    cedoIni,
    cedoFim,
    heCedo,
    heOperador,
    valorHEOperador:heOperador*valorHora,
    refeicoes,
    valorRefeicao:refeicoes*25,
    obs:document.getElementById('hav-obs')?.value||'',
    heMaquina:0,
    totalHoras:0,
    geradoresReg:[],
    status:'enviado',
    criadoEm:new Date().toISOString()
  };
  registros.push(reg);
  fbUpdate('registros/'+reg.id, reg).catch(()=>{});
  DB.set('sos_registros',registros);
  // Modal de confirmação — redireciona para OS ao fechar
  const _modal=document.createElement('div');
  _modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  _modal.innerHTML=`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:340px;width:100%;padding:28px 24px;text-align:center">
      <div style="font-size:44px;margin-bottom:10px">✅</div>
      <div style="font-weight:700;font-size:17px;color:var(--fg);margin-bottom:6px">HE registrada!</div>
      <div style="font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:20px">
        ${fmtHE(heOperador)} de HE ${evento?'em <strong>'+evento+'</strong>':''} ${local?'· '+local:''}<br>
        ${refeicoes?refeicoes+' refeição(ões) · ':''}enviada ao administrativo.
      </div>
      <button onclick="this.closest('[style*=fixed]').remove();const btn=Array.from(document.querySelectorAll('.nav-tab')).find(b=>b.dataset.page==='operador'||b.textContent.trim()==='OS');if(btn)switchPage('operador',btn);else loadOperador();" style="width:100%;padding:13px;background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.4);color:var(--green);border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">
        ← Voltar para OS
      </button>
    </div>`;
  document.body.appendChild(_modal);
}

function excluirHEAvulsa(id){
  if(!confirm('Excluir este registro de HE avulsa?')) return;
  registros=registros.filter(r=>r.id!==id);
  DB.set('sos_registros',registros);
  fbRemove('registros/'+id).catch(()=>{});
  showToast('HE removida.');
  loadHEAvulsa();
}

function loadHistorico(){
  const el=document.getElementById('page-historico');
  if(!el) return;
  // Operador vê apenas suas próprias OS
  const minhasOS=ordens.filter(o=>{
    if(sessaoAtual.perfil==='admin'||sessaoAtual.perfil==='comercial') return true;
    return (o.operadores&&o.operadores.some(op=>op.userId===sessaoAtual.id))||o.operadorId===sessaoAtual.id;
  });
  // Histórico mostra enviados + rascunhos (para o próprio operador ver o progresso)
  const meusRegs=registros.filter(r=>r.operadorId===sessaoAtual.id||r.operadorNome===sessaoAtual.nome);
  if(!minhasOS.length&&!meusRegs.length){
    el.innerHTML='<div class="card"><p style="color:var(--dim);font-size:14px;padding:8px 0">Nenhuma OS no seu histórico ainda.</p></div>';
    return;
  }
  el.innerHTML=`
  <div class="card">
    <div class="card-title">Histórico de OS</div>
    <p style="font-size:12px;color:var(--dim);margin-bottom:12px">Visualização somente leitura. Para alterações, contate o administrador.</p>
    ${minhasOS.slice().reverse().map(os=>{
      const regsOS=meusRegs.filter(r=>r.osId===os.id);
      const rascunhosOS=regsOS.filter(r=>r.status==='rascunho');
      const enviadosOS=regsOS.filter(r=>r.status==='enviado'||!r.status);
      // Soma total de HE: usa heOperador gravado (calculado pelo período informado)
      const totalHEh=regsOS.reduce((acc,r)=>{
        let heO=0;
        if(r.heIni&&r.heFim){
          const hIniM=toMin(r.heIni),hFimM=toMin(r.heFim);
          heO=(hFimM>hIniM?hFimM-hIniM:hFimM+1440-hIniM)/60;
        } else {
          heO=r.heOperador||0;
        }
        return acc+heO;
      },0);
      const _badgeStatus=(os.status==='fechada'||enviadosOS.length)?'badge-green':'badge-yellow';
      const _txtStatus=os.status==='fechada'?'Fechada':enviadosOS.length?'✓ Enviada':'Aguardando';
      const _badgeHE=(regsOS.length&&totalHEh>0)?'<span class="badge badge-yellow">⚠️ '+fmtHE(totalHEh)+' HE</span>':regsOS.length?'<span class="badge badge-green">✓ Sem HE</span>':'';
      const _badgeRasc=rascunhosOS.length?'<span class="badge badge-yellow">📝 '+rascunhosOS.length+' rascunho'+(rascunhosOS.length>1?'s':'')+'</span>':'';
      const _regsDetalhe=regsOS.length?'<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">'+regsOS.map(r=>'<div style="font-size:12px;color:var(--dim);margin-bottom:4px">📋 '+fmtData(r.data)+' · Liga: '+r.partida+' → Desliga: '+r.parada+' · '+(r.totalHoras||0).toFixed(1)+'h</div>').join('')+'</div>':'';
      return '<div class="os-item" style="cursor:default">'+
        '<div class="os-item-header">'+
          '<span style="font-weight:700">OS '+os.num+'</span>'+
          '<div style="display:flex;gap:6px;align-items:center">'+
            _badgeHE+
            _badgeRasc+
            '<span class="badge '+_badgeStatus+'">'+_txtStatus+'</span>'+
          '</div>'+
        '</div>'+
        '<div style="font-size:14px;color:var(--dim);margin-bottom:3px">'+os.cliente+(os.evento?' · '+os.evento:'')+'</div>'+
        '<div style="font-size:12px;color:var(--dim)">'+os.dataSaida+' → '+os.dataRetorno+'</div>'+
        _regsDetalhe+
      '</div>';
    }).join('')}
  </div>`;

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function toMin(t){if(!t) return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}
// Seletor de refeições +/−: gera HTML com input hidden + botões
function refStepperHTML(id,val){
  val=Math.min(2,Math.max(0,parseInt(val)||0));
  return `<div style="display:flex;align-items:center;gap:0;background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:4px 8px;width:fit-content">
    <button type="button" onclick="refStep('${id}',-1)" style="background:none;border:none;color:var(--dim);font-size:20px;line-height:1;cursor:pointer;padding:0 8px 2px;font-weight:300" title="Remover refeição">−</button>
    <span id="${id}-lbl" style="font-size:14px;font-weight:700;color:var(--fg);min-width:16px;text-align:center">${val}</span>
    <button type="button" onclick="refStep('${id}',1)" style="background:none;border:none;color:var(--dim);font-size:20px;line-height:1;cursor:pointer;padding:0 8px 2px;font-weight:300" title="Adicionar refeição">+</button>
    <input type="hidden" id="${id}" value="${val}"/>
  </div>`;
}
function refStep(id,delta){
  const el=document.getElementById(id);
  const lbl=document.getElementById(id+'-lbl');
  if(!el||!lbl) return;
  let v=Math.min(2,Math.max(0,(parseInt(el.value)||0)+delta));
  el.value=v;
  lbl.textContent=v;
  lbl.style.color=v>0?'var(--green)':'var(--fg)';
}
function refStepperVal(id){return Math.min(2,Math.max(0,parseInt(document.getElementById(id)?.value)||0));}
function fmtData(d){if(!d) return '';const[y,m,day]=d.split('-');return`${day}/${m}/${String(y).slice(-2)}`;}
function mascaraTel(el){
  let v=el.value.replace(/\D/g,'').substring(0,11);
  if(v.length<=10) v=v.replace(/(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3');
  else v=v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3');
  el.value=v.replace(/-$/,'');
}
function mascaraCep(el){
  let v=el.value.replace(/\D/g,'').substring(0,8);
  if(v.length>5) v=v.replace(/(\d{5})(\d{1,3})/,'$1-$2');
  el.value=v;
}
async function buscarCep(cep){
  const digits=cep.replace(/\D/g,'');
  if(digits.length!==8) return;
  try{
    const r=await fetch(`https://viacep.com.br/ws/${digits}/json/`);
    const d=await r.json();
    if(d.erro) return;
    const end=document.getElementById('f-end');
    const cid=document.getElementById('f-cid');
    const uf=document.getElementById('f-uf');
    if(end&&!end.value) end.value=(d.logradouro||'')+(d.bairro?', '+d.bairro:'');
    if(cid&&!cid.value) cid.value=d.localidade||'';
    if(uf&&!uf.value) uf.value=d.uf||'';
  }catch(e){}
}
function mascaraCnpjCpf(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length<=11){
    // CPF: 000.000.000-00
    v=v.replace(/(\d{3})(\d)/,'$1.$2');
    v=v.replace(/(\d{3})(\d)/,'$1.$2');
    v=v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  } else {
    // CNPJ: 00.000.000/0001-00
    v=v.substring(0,14);
    v=v.replace(/(\d{2})(\d)/,'$1.$2');
    v=v.replace(/(\d{3})(\d)/,'$1.$2');
    v=v.replace(/(\d{3})(\d)/,'$1/$2');
    v=v.replace(/(\d{4})(\d{1,2})$/,'$1-$2');
  }
  el.value=v;
}
function fmtHE(h){if(!h||h<=0) return '—';const hInt=Math.floor(h);const min=Math.round((h-hInt)*60);return min===0?`${hInt}h`:`${hInt}h${String(min).padStart(2,'0')}`;}

function atualizarBadgeHEMes(){
  const badge=document.getElementById('nav-he-mes');
  if(!badge) return;
  // Só mostra para operadores logados
  if(!sessaoAtual||sessaoAtual.perfil!=='operador'){badge.style.display='none';return;}
  const mesAtual=new Date().toISOString().slice(0,7); // "YYYY-MM"
  // Usa r.heOperador diretamente (mesmo critério do relatório admin)
  // Inclui registros normais (enviados) e HE avulsa registrada pelo admin
  const totalHE=registros
    .filter(r=>r.operadorId===sessaoAtual.id && r.data && r.data.startsWith(mesAtual) && (r.status==='enviado'||r.status==='rascunho'||r.heAvulsa))
    .reduce((acc,r)=>acc+(r.heOperador||0),0);
  if(totalHE>0){
    badge.textContent=`⚡ ${fmtHE(totalHE)} HE no mês`;
    badge.style.display='inline-block';
  } else {
    badge.style.display='none';
  }
}
