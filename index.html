<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#CC0000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SOS OS"/>
  <title>SOS Energia — OS Digital v7.1</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --red:#CC0000;--red-dark:#990000;--red-light:#ff3333;
      --black:#0a0a0a;--dark:#141414;--card:#1c1c1c;--card2:#242424;
      --border:#2e2e2e;--text:#f0f0f0;--dim:#888;
      --green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6;--purple:#a855f7;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--black);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
    /* ── LOGIN ── */
    #login-screen{position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .login-logo{margin-bottom:48px;text-align:center}
    .login-logo svg{width:90px;height:90px}
    .login-logo p{color:var(--dim);font-size:13px;margin-top:8px}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:380px}
    .login-box h2{font-size:18px;margin-bottom:20px;color:var(--text)}
    /* ── NAV ── */
    .nav{background:var(--dark);border-bottom:2px solid var(--red);display:flex;align-items:center;padding:0 12px;height:54px;position:sticky;top:0;z-index:100;gap:8px}
    .nav-row1{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .nav-left{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .nav-logo-sm{width:38px;height:38px}
    .nav-user{font-size:11px;color:var(--dim);background:var(--card2);padding:3px 8px;border-radius:20px}
    .nav-tabs{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;justify-content:flex-end}
    .nav-tabs::-webkit-scrollbar{display:none}
    .nav-tab{background:none;border:none;color:var(--dim);font-size:11px;padding:7px 9px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:.2s}
    .nav-tab.active{background:var(--red);color:#fff;font-weight:700}
    @media(max-width:600px){
      .nav{flex-direction:column;height:auto;padding:6px 10px 0;align-items:stretch}
      .nav-row1{display:flex;align-items:center;gap:6px;padding-bottom:4px;min-width:0}
      .nav-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0;overflow:hidden}
      .nav-logo-sm{width:28px;height:28px;flex-shrink:0}
      .nav-user{font-size:10px;padding:2px 5px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:1}
      #conn-status{flex-shrink:0;font-size:9px}
      #nav-he-mes{font-size:10px !important;padding:2px 5px !important;border-radius:10px !important;flex-shrink:0;white-space:nowrap}
      .nav-row1>button{font-size:10px;padding:3px 7px;flex-shrink:0}
      .nav-tabs{border-top:1px solid var(--border);padding:4px 0 6px;margin:0 -10px;padding-left:10px;padding-right:10px;box-sizing:content-box}
    }
    /* ── LAYOUT ── */
    .page{display:none;padding:14px;max-width:720px;margin:0 auto}
    .page.active{display:block}
    /* ── CARDS ── */
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
    .card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--red);margin-bottom:14px;display:flex;align-items:center;gap:7px}
    /* ── FORM ── */
    .field{margin-bottom:13px}
    .field label{display:block;font-size:11px;color:var(--dim);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .field input,.field select,.field textarea{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;padding:10px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red)}
    .field textarea{resize:vertical;min-height:78px}
    .field select option{background:var(--dark)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
    /* ── BTNS ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;width:100%}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:var(--red-dark)}
    .btn-green{background:var(--green);color:#fff}
    .btn-wpp{background:#25D366;color:#fff}
    .btn-secondary{background:var(--border);color:var(--text)}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--dim)}
    .btn-sm{padding:7px 13px;font-size:12px}
    .btn-icon{width:auto;padding:8px}
    /* ── BADGE ── */
    .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
    .badge-red{background:rgba(204,0,0,.18);color:var(--red-light)}
    .badge-green{background:rgba(34,197,94,.14);color:var(--green)}
    .badge-yellow{background:rgba(245,158,11,.14);color:var(--yellow)}
    .badge-blue{background:rgba(59,130,246,.14);color:var(--blue)}
    .badge-purple{background:rgba(168,85,247,.14);color:var(--purple)}
    /* ── OS ITEM ── */
    .os-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:9px;cursor:pointer;transition:border-color .2s}
    .os-item:hover{border-color:var(--red)}
    .os-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
    /* ── SIG ── */
    #sigCanvas,#sigCanvasOp{border:1px solid var(--border);border-radius:8px;background:#fff;touch-action:none;width:100%;display:block}
    /* ── ALERT ── */
    .alert{border-radius:9px;padding:11px 13px;margin-bottom:13px;font-size:13px;display:flex;gap:9px;align-items:flex-start}
    .alert-red{background:rgba(204,0,0,.13);border:1px solid rgba(204,0,0,.28);color:#ff9090}
    .alert-yellow{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.28);color:var(--yellow)}
    .alert-green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.28);color:var(--green)}
    /* ── TABLE ── */
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th{background:var(--dark);color:var(--dim);font-weight:600;padding:7px 9px;text-align:left}
    .tbl td{padding:7px 9px;border-bottom:1px solid var(--border)}
    .tbl tr:last-child td{border-bottom:none}
    /* ── METRICS ── */
    .metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:14px}
    .metric-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px}
    .metric-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
    .metric-value{font-size:22px;font-weight:700}
    .metric-sub{font-size:11px;color:var(--dim);margin-top:2px}
    /* ── STEPS ── */
    .steps{display:flex;gap:7px;margin-bottom:18px}
    .step{flex:1;height:3px;border-radius:3px;background:var(--border);transition:background .3s}
    .step.done{background:var(--green)}.step.active{background:var(--red)}
    /* ── SWITCH ── */
    .switch{position:relative;width:42px;height:23px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;inset:0;background:var(--border);border-radius:23px;transition:.3s;cursor:pointer}
    .slider:before{content:'';position:absolute;width:17px;height:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
    input:checked+.slider{background:var(--red)}
    input:checked+.slider:before{transform:translateX(19px)}
    /* ── AI CHAT ── */
    .chat-msgs{height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 0;margin-bottom:12px;scroll-behavior:smooth}
    .chat-msg{max-width:85%;padding:10px 13px;border-radius:12px;font-size:14px;line-height:1.5}
    .chat-msg.user{align-self:flex-end;background:var(--red);color:#fff;border-bottom-right-radius:4px}
    .chat-msg.ai{align-self:flex-start;background:var(--card2);border:1px solid var(--border);border-bottom-left-radius:4px}
    .chat-msg.ai.typing{color:var(--dim)}
    .chat-input-row{display:flex;gap:8px}
    .chat-input-row input{flex:1;background:var(--dark);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px 13px;outline:none}
    .chat-input-row input:focus{border-color:var(--red)}
    /* ── EQUIPAMENTOS ── */
    .equip-item{background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;position:relative}
    .equip-item .equip-tipo{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}
    .equip-item .equip-tipo.gerador{background:rgba(204,0,0,.15);color:var(--red-light)}
    .equip-item .equip-tipo.acessorio{background:rgba(139,92,246,.15);color:var(--purple)}
    .equip-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;line-height:1;padding:2px 6px}
    .equip-remove:hover{color:var(--red)}
    .equip-add-btns{display:flex;gap:8px;margin-top:4px}
    .btn-add-gerador{background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.3);color:var(--red-light);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;flex:1}
    .btn-add-acessorio{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);color:var(--purple);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;flex:1}
    .btn-add-gerador:hover{background:rgba(204,0,0,.2)}
    .btn-add-acessorio:hover{background:rgba(139,92,246,.2)}
    .op-item{background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-end;position:relative}
    .op-item .equip-remove{position:static;margin-left:auto;align-self:flex-end;margin-bottom:2px}
    .btn-add-op{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;width:100%;margin-top:4px}
    .btn-add-op:hover{background:rgba(34,197,94,.2)}
    /* conferência de acessórios no operador */
    .acessorio-check{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--dark);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px}
    .acessorio-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--red);cursor:pointer;flex-shrink:0}
    .btn-mic{background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--dim);padding:0 12px;cursor:pointer;flex-shrink:0;font-size:18px;display:flex;align-items:center;transition:all .2s}
    .btn-mic.gravando{background:rgba(204,0,0,.15);border-color:var(--red);color:var(--red);animation:pulse-mic .8s ease-in-out infinite}
    @keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(204,0,0,.4)}50%{box-shadow:0 0 0 6px rgba(204,0,0,0)}}
    /* ── HE WARN ── */
    .he-warn{background:rgba(245,158,11,.1);border:1px solid var(--yellow);border-radius:9px;padding:11px;margin-top:8px;display:none}
    .he-warn.show{display:block}
    /* ── USER CHIP ── */
    .user-chip{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--card2);border:1px solid var(--border);border-radius:9px;margin-bottom:8px}
    @media(max-width:480px){.grid3{grid-template-columns:1fr 1fr}.metric-grid{grid-template-columns:1fr 1fr}}
    /* ── TOAST ── */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:99999;padding:11px 20px;border-radius:10px;font-size:14px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.ok{background:var(--green);color:#fff}
    #toast.err{background:#cc0000;color:#fff}
    /* ── SAVE FEEDBACK ── */
    .save-feedback{font-size:12px;margin-top:6px;min-height:18px;display:block}
    .save-feedback.ok{color:var(--green)}
    .save-feedback.err{color:var(--red-light)}
  </style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>

<script>
// ════════════════════════════════════════
// FEEDBACK VISUAL (toast + inline)
// ════════════════════════════════════════
let _toastTimer=null;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  if(!t) return;
  clearTimeout(_toastTimer);
  t.textContent=(type==='ok'?'✓ ':' ✕ ')+msg;
  t.className='show '+type;
  _toastTimer=setTimeout(()=>{t.className='';},3000);
}
// Seta feedback inline em um elemento (por id)
function setFeedback(elId,msg,type){
  const el=document.getElementById(elId);
  if(!el) return;
  el.textContent=msg;
  el.className='save-feedback '+(type||'ok');
  if(type==='ok') setTimeout(()=>{if(el) el.textContent='';},3000);
}
// Wrapper para salvar no Firebase com feedback
async function fbSaveWithFeedback(saveFn, btnEl, feedbackId){
  if(btnEl){btnEl.disabled=true;btnEl.textContent='Salvando...';}
  try{
    await saveFn();
    if(btnEl){btnEl.disabled=false;btnEl.textContent='Salvar';}
    if(feedbackId) setFeedback(feedbackId,'✓ Salvo','ok');
    showToast('Salvo com sucesso');
  }catch(e){
    if(btnEl){btnEl.disabled=false;btnEl.textContent='Salvar';}
    const errMsg='Erro: '+(e&&e.message?e.message:'falha ao salvar');
    if(feedbackId) setFeedback(feedbackId,errMsg,'err');
    showToast(errMsg,'err');
  }
}

// FIREBASE
// ════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAFzcqGX4jrh-IAF6Tfl2-Wk_IEe1acQUE",
  authDomain: "sos-os-digital.firebaseapp.com",
  databaseURL: "https://sos-os-digital-default-rtdb.firebaseio.com",
  projectId: "sos-os-digital",
  storageBucket: "sos-os-digital.firebasestorage.app",
  messagingSenderId: "1098803329027",
  appId: "1:1098803329027:web:bd18ee6c8b10afeedf3636"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Indicador de conexão
const connRef = db.ref('.info/connected');
connRef.on('value', snap => {
  const online = snap.val();
  const chip = document.getElementById('conn-status');
  if (chip) {
    chip.textContent = online ? '🟢 Online' : '🔴 Offline';
    chip.style.color = online ? 'var(--green)' : 'var(--red-light)';
  }
});

// Listeners em tempo real
function initFirebaseListeners() {
  db.ref('ordens').on('value', snap => {
    ordens = snap.val() ? Object.values(snap.val()).map(o => ({
      ...o,
      diasContratados: o.diasContratados
        ? (Array.isArray(o.diasContratados) ? o.diasContratados : Object.values(o.diasContratados))
        : [],
      equipamentos: o.equipamentos
        ? (Array.isArray(o.equipamentos) ? o.equipamentos : Object.values(o.equipamentos))
        : []
    })) : [];
    DB.set('sos_ordens', ordens);
    renderOSList();
  });
  db.ref('registros').on('value', snap => {
    registros = snap.val() ? Object.values(snap.val()) : [];
    DB.set('sos_registros', registros);
    atualizarBadgeHEMes();
  });
  db.ref('usuarios').on('value', snap => {
    if (snap.val()) {
      usuarios = Object.values(snap.val());
      DB.set('sos_usuarios', usuarios);
    }
  });
  db.ref('config').on('value', snap => {
    if (snap.val()) {
      config = { ...config, ...snap.val() };
      DB.set('sos_config', config);
    }
  });
  db.ref('descontos_he').on('value', snap => {
    if (snap.val()) {
      descontosHE = snap.val();
      DB.set('sos_descontos_he', descontosHE);
    }
  });
}

// Login via Firebase — busca usuários diretamente do DB (fix: novos usuários não ficam presos no cache local)
function doLoginFirebase(userVal, passVal) {
  db.ref('usuarios').once('value').then(snap => {
    const lista = snap.val() ? Object.values(snap.val()) : usuarios;
    const found = lista.find(x => x.user.toLowerCase() === userVal && x.senha === passVal);
    if (!found) {
      document.getElementById('login-err').style.display = 'block';
      document.getElementById('login-btn').disabled = false;
      document.getElementById('login-btn').textContent = 'Entrar';
      return;
    }
    usuarios = lista;
    DB.set('sos_usuarios', usuarios);
    sessaoAtual = found;
    initFirebaseListeners();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('nav-user-chip').textContent = found.nome + ' (' + found.perfil + ')';
    buildNav();
    if (found.perfil === 'admin' || found.perfil === 'comercial') loadAdmin();
    else loadOperador();
  }).catch(() => {
    // Firebase indisponível — tenta com cache local
    const found = usuarios.find(x => x.user.toLowerCase() === userVal && x.senha === passVal);
    if (!found) { document.getElementById('login-err').style.display = 'block'; document.getElementById('login-btn').disabled = false; document.getElementById('login-btn').textContent = 'Entrar'; return; }
    sessaoAtual = found;
    initFirebaseListeners();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('nav-user-chip').textContent = found.nome + ' (' + found.perfil + ')';
    buildNav();
    if (found.perfil === 'admin' || found.perfil === 'comercial') loadAdmin();
    else loadOperador();
  });
}

// Funções de escrita Firebase
function fbSet(path, data) {
  // set() sobrescreve o nó inteiro — usar apenas para nós que este dispositivo controla totalmente (config)
  const p = db.ref(path).set(data).catch(e => console.warn('Firebase write error:', e));
  return Promise.race([p, new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),10000))]);
}
function fbUpdate(path, data) {
  // update() faz merge — salva só as chaves enviadas sem apagar as demais
  const p = db.ref(path).update(data).catch(e => console.warn('Firebase write error:', e));
  return Promise.race([p, new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),10000))]);
}
function fbRemove(path) {
  // remove() deleta o nó permanentemente no Firebase
  const p = db.ref(path).remove().catch(e => console.warn('Firebase remove error:', e));
  return Promise.race([p, new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),10000))]);
}
function fbSaveOrdens() {
  const obj = {};
  ordens.forEach(o => { obj[o.id] = o; });
  return fbUpdate('ordens', obj); // merge: não apaga OS de outros usuários
}
function fbSaveRegistros() {
  const obj = {};
  registros.forEach(r => { obj[r.id] = r; });
  return fbUpdate('registros', obj); // merge: não apaga registros de outros operadores
}
function fbSaveUsuarios() {
  const obj = {};
  usuarios.forEach(u => { obj[u.id] = u; });
  return fbUpdate('usuarios', obj); // merge: não apaga usuários criados em outros dispositivos
}
function fbSaveConfig() {
  return fbSet('config', config); // config é global, set() está correto aqui
}
function fbSaveDescontos() {
  return fbSet('descontos_he', descontosHE);
}

function doLogin(){
  const u=document.getElementById('login-user').value.trim().toLowerCase();
  const p=document.getElementById('login-pass').value;
  if(!u||!p){document.getElementById('login-err').style.display='block';return;}
  const lembrar=document.getElementById('login-lembrar')?.checked;
  if(lembrar){localStorage.setItem('sos_saved_user',u);localStorage.setItem('sos_saved_pass',p);}
  else{localStorage.removeItem('sos_saved_user');localStorage.removeItem('sos_saved_pass');}
  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='Verificando...';
  document.getElementById('login-err').style.display='none';
  doLoginFirebase(u, p);
}

function doLogout(){
  if(!confirm('Sair da conta?')) return;
  // desliga listeners Firebase
  db.ref('ordens').off();
  db.ref('registros').off();
  db.ref('usuarios').off();
  db.ref('config').off();
  sessaoAtual=null;
  document.getElementById('main-nav').style.display='none';
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  // Ao deslogar explicitamente, limpa credenciais salvas
  localStorage.removeItem('sos_saved_user');
  localStorage.removeItem('sos_saved_pass');
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').style.display='none';
  const lembrarEl=document.getElementById('login-lembrar');
  if(lembrarEl) lembrarEl.checked=false;
  const btn=document.getElementById('login-btn');
  if(btn){btn.disabled=false;btn.textContent='Entrar';}
  document.getElementById('login-screen').style.display='flex';
}

function renderOSList(){
  const el=document.getElementById('os-list');
  if(!el) return;
  // OS fechadas não aparecem aqui — ficam na aba Status
  const lista=ordens.filter(o=>o.status!=='fechada').slice().reverse();
  if(!lista.length){el.innerHTML='<p style="color:var(--dim);font-size:13px;padding:6px 0">Nenhuma OS ativa. OS encerradas estão na aba <strong style="color:var(--dim)">Status</strong>.</p>';return;}

  // Separa OS em grupos para admins
  const isAdm=sessaoAtual?.perfil==='admin'||sessaoAtual?.perfil==='comercial';

  function _buildOSCard(os){
    // Bolinha verde para qualquer dia preenchido (rascunho ou enviado)
    const regsEnviados=registros.filter(r=>r.osId===os.id);
    const datasEnviadas=new Set(regsEnviados.map(r=>r.data));
    const abrev=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

    // Bolinhas de dias — periódica mostra só entrega/devolução
    let diasHTML='';
    const isPeriodica=os.tipoLocacao&&os.tipoLocacao!=='evento';
    if(isPeriodica){
      const temEntrega=regsEnviados.some(r=>r.checkEntrega);
      const temDevolucao=regsEnviados.some(r=>r.checkDevolucao);
      diasHTML=`<div style="display:flex;gap:8px;align-items:center;margin-top:8px">
        <div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid ${temEntrega?'var(--green)':'var(--border)'};background:${temEntrega?'rgba(16,185,129,.12)':'var(--card2)'}">
          <span style="font-size:13px">${temEntrega?'✅':'📦'}</span>
          <span style="font-size:11px;font-weight:700;color:${temEntrega?'var(--green)':'var(--dim)'}">Entrega</span>
        </div>
        <div style="font-size:14px;color:var(--border)">→</div>
        <div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid ${temDevolucao?'var(--green)':'var(--border)'};background:${temDevolucao?'rgba(16,185,129,.12)':'var(--card2)'}">
          <span style="font-size:13px">${temDevolucao?'✅':'🔄'}</span>
          <span style="font-size:11px;font-weight:700;color:${temDevolucao?'var(--green)':'var(--dim)'}">Devolução</span>
        </div>
        <span style="font-size:11px;color:var(--dim);margin-left:4px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:2px 8px">${os.tipoLocacao?.charAt(0).toUpperCase()+os.tipoLocacao?.slice(1)||''}</span>
      </div>`;
    } else if(os.dataSaida&&os.dataRetorno){
      const dias=[];
      const d=new Date(os.dataSaida+'T12:00:00');
      const fim=new Date(os.dataRetorno+'T12:00:00');
      while(d<=fim){dias.push(d.toISOString().split('T')[0]);d.setDate(d.getDate()+1);}
      diasHTML=`<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:6px">
        ${dias.map(dt=>{
          const enviado=datasEnviadas.has(dt);
          const [,m,d2]=dt.split('-');
          const dow=abrev[new Date(dt+'T12:00:00').getDay()];
          return enviado
            ?`<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
                <div style="width:26px;height:26px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff">✓</div>
                <span style="font-size:9px;color:var(--green);font-weight:600">${d2}/${m}</span>
               </div>`
            :`<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
                <div style="width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--dim)">${dow}</div>
                <span style="font-size:9px;color:var(--dim)">${d2}/${m}</span>
               </div>`;
        }).join('')}
      </div>`;
    }

    const _badgeNum=regsEnviados.length;
    const _badgeHTML=!os.dataSaida||!os.dataRetorno?(_badgeNum?'<span class="badge badge-green">✓ '+_badgeNum+' dia'+(_badgeNum!==1?'s':'')+'</span>':'<span class="badge badge-yellow">Aguardando</span>'):'';
    const _opHTML=os.operadorNome?'<div style="font-size:12px;color:var(--dim);margin-bottom:2px">👷 '+os.operadorNome+'</div>':'';
    return'<div class="os-item" onclick="verOS(\'' +os.id+ '\')">'+
      '<div class="os-item-header">'+
        '<span style="font-weight:700">OS '+os.num+'</span>'+
        _badgeHTML+
      '</div>'+
      '<div style="font-size:14px;color:var(--dim);margin-bottom:3px">'+os.cliente+(os.evento?' · '+os.evento:'')+'</div>'+
      _opHTML+
      '<div style="font-size:12px;color:var(--dim)">'+fmtData(os.dataSaida)+'→'+fmtData(os.dataRetorno)+' · '+(os.potencia||'')+' · '+(os.patrimonio||'')+'</div>'+
      diasHTML+
    '</div>';
  }

  if(!isAdm){
    // Operador: lista simples sem agrupamento
    el.innerHTML=lista.map(_buildOSCard).join('');
    return;
  }

  // Admin: separa em grupos
  // Grupo 1 — tem rascunho pendente de envio pelo operador
  const grpRascunho=lista.filter(os=>{
    return registros.some(r=>r.osId===os.id&&r.status==='rascunho');
  });
  // Grupo 2 — todos enviados, OS ainda aberta (pendente de fechamento pelo admin)
  const grpEnviado=lista.filter(os=>{
    const regs=registros.filter(r=>r.osId===os.id);
    return regs.length>0 && regs.every(r=>r.status==='enviado');
  });
  // Grupo 3 — sem nenhum registro ainda
  const grpSemReg=lista.filter(os=>{
    return !registros.some(r=>r.osId===os.id);
  });

  function _section(titulo,cor,bg,icone,items){
    if(!items.length) return '';
    return `
      <div style="display:flex;align-items:center;gap:8px;margin:20px 0 8px;padding:8px 14px;background:${bg};border-left:3px solid ${cor};border-radius:0 8px 8px 0">
        <span style="font-size:16px">${icone}</span>
        <span style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:${cor}">${titulo}</span>
        <span style="font-size:11px;font-weight:600;color:${cor};opacity:.7;margin-left:2px">(${items.length})</span>
      </div>
      ${items.map(_buildOSCard).join('')}`;
  }

  el.innerHTML=
    _section('Aguardando envio do operador','#f59e0b','rgba(234,179,8,.08)','⏳',grpRascunho)+
    _section('Enviado pelo operador — pendente da sua finalização','#34d399','rgba(16,185,129,.07)','✅',grpEnviado)+
    _section('Sem registros ainda','#94a3b8','rgba(100,116,139,.07)','📋',grpSemReg);
}

// ── EQUIPAMENTOS DA OS ──
let equipamentosOS=[];
// ── OPERADORES DA OS ──
let operadoresOS=[];   // [{id, userId, wpp}]
let _editandoOSId=null; // null = criação, string = edição

function _gerarPrevisaoDias(){
  // Gera array previsaoDias a partir das datas preenchidas nos inputs f-saida/f-ret
  const s=document.getElementById('f-saida')?.value;
  const r=document.getElementById('f-ret')?.value;
  if(!s||!r) return [];
  const dias=[];
  const d1=new Date(s+'T12:00'),d2=new Date(r+'T12:00');
  for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1))
    dias.push({data:d.toISOString().split('T')[0],hIni:'07:00',hFim:'19:00',naoRoda:false,hContratadas:12});
  return dias;
}

function addEquip(tipo){
  equipamentosOS.push(tipo==='gerador'
    ? {id:'eq_'+Date.now(),tipo:'gerador',potencia:'',patrimonio:'',atuacao:'',heValorGerador:'',standby:false,previsaoDias:_gerarPrevisaoDias()}
    : {id:'eq_'+Date.now(),tipo:'acessorio',nome:'',quantidade:'1'});
  renderEquip();
  // foco no primeiro campo do item adicionado
  setTimeout(()=>{
    const inputs=document.querySelectorAll('#equip-lista .equip-item:last-child input');
    if(inputs[0]) inputs[0].focus();
  },50);
}

function removeEquip(id){
  equipamentosOS=equipamentosOS.filter(e=>e.id!==id);
  renderEquip();
}

function renderEquip(){

  if(!opOS) return;
  const eqs=(opOS.equipamentos||[]).filter(e=>e.tipo==='acessorio');

  const total=eqs.length;
  const checked=eqs.filter(a=>document.getElementById('ck_'+a.id)?.checked).length;
  const aviso=document.getElementById('acessorio-aviso');
  if(aviso) aviso.style.display=checked<total?'block':'none';

function refreshDias(){
  // Regenera previsaoDias de cada gerador quando as datas mudam
  const s=document.getElementById('f-saida')?.value;
  const r=document.getElementById('f-ret')?.value;
  if(!s||!r) return;
  const d1=new Date(s+'T12:00'),d2=new Date(r+'T12:00');
  const novasDatas=[];
  for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1))
    novasDatas.push(d.toISOString().split('T')[0]);
  equipamentosOS.forEach(eq=>{
    if(eq.tipo!=='gerador') return;
    const prevAtual=eq.previsaoDias||[];
    // Monta novo array preservando horários já preenchidos
    eq.previsaoDias=novasDatas.map(dt=>{
      const exist=prevAtual.find(p=>p.data===dt);
      return exist || {data:dt,hIni:'07:00',hFim:'19:00',naoRoda:false};
    });
  });
  renderEquip();
}

function criarOS(){
  const num=document.getElementById('f-num').value.trim();
  const cli=document.getElementById('f-cli').value.trim();
  if(!num||!cli){
    setFeedback('fb-criar-os','✕ Preencha ao menos o Nº da OS e o Cliente.','err');
    return;
  }
  const btnCriar=document.getElementById('btn-criar-os');
  if(btnCriar){btnCriar.disabled=true;btnCriar.textContent='Salvando...';}
  // Resolver operadores — usar lista nova; fallback retrocompat
  const opsValidos=operadoresOS.filter(o=>o.userId);
  const primeiroOp=opsValidos[0]?usuarios.find(u=>u.id===opsValidos[0].userId):null;
  const dadosComuns={
    num,cliente:cli,
    evento:document.getElementById('f-evt').value,
    tipoLocacao:document.getElementById('f-tipo-locacao')?.value||'evento',
    dataSaida:document.getElementById('f-saida').value,
    dataRetorno:document.getElementById('f-ret').value,
    endereco:document.getElementById('f-end').value,
    cidade:document.getElementById('f-cid').value,
    uf:document.getElementById('f-uf').value,
    cep:document.getElementById('f-cep').value,
    contato:document.getElementById('f-contato').value,
    fone:document.getElementById('f-fone').value,
    cnpj:document.getElementById('f-cnpj').value,
    instrucoes:document.getElementById('f-inst').value,
    equipamentos:equipamentosOS.length?[...equipamentosOS]:[],
    potencia:(equipamentosOS.find(e=>e.tipo==='gerador')||{}).potencia||'',
    patrimonio:(equipamentosOS.find(e=>e.tipo==='gerador')||{}).patrimonio||'',
    diasContratados:(()=>{
      // Locação periódica não tem grade de dias
      const _tipo=document.getElementById('f-tipo-locacao')?.value||'evento';
      if(_tipo&&_tipo!=='evento') return [];
      // Gera diasContratados a partir de previsaoDias do primeiro gerador (compatibilidade com calcHE)
      const priGer=equipamentosOS.find(e=>e.tipo==='gerador');
      if(priGer?.previsaoDias?.length) return priGer.previsaoDias.map(dp=>({data:dp.data,hIni:dp.hIni||'07:00',hFim:dp.hFim||'19:00',naoRoda:!!dp.naoRoda}));
      // Fallback: gera a partir das datas
      const s=document.getElementById('f-saida').value;
      const r=document.getElementById('f-ret').value;
      if(!s||!r) return [];
      const dias=[];
      const d1=new Date(s+'T12:00'),d2=new Date(r+'T12:00');
      for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1))
        dias.push({data:d.toISOString().split('T')[0],hIni:'07:00',hFim:'19:00',naoRoda:false,hContratadas:12});
      return dias;
    })(),
    operadores:[...opsValidos],
    // retrocompat: primeiro operador como campos legados
    operadorId:primeiroOp?primeiroOp.id:'',
    operadorNome:primeiroOp?primeiroOp.nome:'',
    operadorWpp:opsValidos[0]?opsValidos[0].wpp:''
  };
  const isEdit=!!_editandoOSId;
  let os;
  if(isEdit){
    const idx=ordens.findIndex(o=>o.id===_editandoOSId);
    if(idx===-1){showToast('OS não encontrada','err');return;}
    os={...ordens[idx],...dadosComuns};
    ordens[idx]=os;
  } else {
    os={id:'os_'+Date.now(),...dadosComuns,criadoPor:sessaoAtual.nome,criadoEm:new Date().toISOString(),status:'aberta'};
    ordens.push(os);
  }
  const btnCriar2=document.getElementById('btn-criar-os');
  fbSaveWithFeedback(()=>saveAll(), btnCriar2, 'fb-criar-os').then(()=>{
    cancelarOS();renderOSList();
    if(isEdit){
      showToast('OS '+os.num+' atualizada com sucesso');
      verOS(os.id);
    } else {
      const link=window.location.href.split('?')[0]+'?os='+os.id;
      showLinkPopup(os,link);
    }
    _editandoOSId=null;
  }).catch(()=>{
    if(btnCriar2){btnCriar2.disabled=false;btnCriar2.textContent=isEdit?'💾 Salvar Alterações':'Criar OS e Gerar Link';}
  });
}

  pop.innerHTML=`<div style="background:var(--card);border:1px solid var(--red);border-radius:16px;padding:24px;max-width:460px;width:100%">

function verOS(id){
  const os=ordens.find(o=>o.id===id);if(!os) return;
  // Garante que a aba OS (admin) está ativa antes de tentar renderizar
  const pageAdmin=document.getElementById('page-admin');
  if(!pageAdmin||!pageAdmin.classList.contains('active')){
    const btnOS=Array.from(document.querySelectorAll('.nav-tab')).find(b=>b.dataset.page==='admin'||b.textContent.trim()==='OS');
    if(btnOS) switchPage('admin',btnOS);
  }
  // Esconde a lista de OS para mostrar o detalhe
  const osList=document.getElementById('os-list');
  if(osList) osList.closest('.card').style.display='none';
  const det=document.getElementById('os-detalhe');
  if(!det) return;
  det.style.display='block';
  det.innerHTML='<div style="text-align:center;padding:40px;color:var(--dim)">Carregando...</div>';
  function _renderVerOS_inner(){
    const isAdminView=sessaoAtual.perfil==='admin'||sessaoAtual.perfil==='comercial';
    // Admin/comercial vê TODOS os registros (enviados, rascunhos e sem status)
    // Operador só vê os próprios registros
    const regs=isAdminView

function fecharDet(){document.getElementById('os-detalhe').style.display='none';document.getElementById('os-list').closest('.card').style.display='block';}
function fecharOSConf(id){if(confirm('Confirmar fechamento desta OS?')){const os=ordens.find(o=>o.id===id);if(os){os.status='fechada';saveAll();verOS(id);}}}
function excluirOS(id){
  const os=ordens.find(o=>o.id===id);if(!os) return;
  const regsIds=registros.filter(r=>r.osId===id).map(r=>r.id);
  const aviso=regsIds.length>0?`\n\n⚠️ Esta OS tem ${regsIds.length} registro(s) de operador. Eles também serão excluídos.`:'';
  if(!confirm(`Excluir permanentemente a OS ${os.num} — ${os.cliente}?${aviso}\n\nEsta ação não pode ser desfeita.`)) return;
  // 1. Remove do estado local e localStorage
  ordens=ordens.filter(o=>o.id!==id);
  registros=registros.filter(r=>r.osId!==id);
  DB.set('sos_ordens',ordens);
  DB.set('sos_registros',registros);
  // 2. Remove os nós diretamente no Firebase (fbUpdate/merge NÃO apaga nós — precisa de remove())
  const removes=[fbRemove('ordens/'+id), ...regsIds.map(rid=>fbRemove('registros/'+rid))];
  Promise.all(removes)
    .then(()=>{showToast(`OS ${os.num} excluída`);fecharDet();renderOSList();})
    .catch(e=>showToast('Erro ao excluir: '+(e&&e.message?e.message:'falha'),'err'));
}

function loadOperador(){
  const el=document.getElementById('page-operador');
  // checar URL param
  const p=new URLSearchParams(window.location.search);
  const osParam=p.get('os');
  if(osParam){const os=ordens.find(o=>o.id===osParam);if(os){el.innerHTML='';buildOpForm(os);return;}}
  // listar OS do operador (ou todas se admin)
  const isAdmin=sessaoAtual.perfil==='admin'||sessaoAtual.perfil==='comercial';
  const lista=ordens.filter(o=>{
    if(o.status==='fechada') return false;
    if(isAdmin) return true;
    const atribuida=(o.operadores&&o.operadores.some(op=>op.userId===sessaoAtual.id))||o.operadorId===sessaoAtual.id;
    if(!atribuida) return false;
    // Oculta OS totalmente enviadas (sem rascunho pendente) — vão pro Histórico
    const temRascunho=registros.some(r=>r.osId===o.id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho');
    const temEnviado=registros.some(r=>r.osId===o.id&&r.operadorId===sessaoAtual.id&&r.status==='enviado');
    if(temEnviado&&!temRascunho) return false;
    return true;
  });
  if(!lista.length){el.innerHTML='<div class="card"><p style="color:var(--dim);font-size:14px;padding:8px 0">Nenhuma OS pendente. Veja seu <strong>Histórico</strong> para OS já enviadas.</p></div>';return;}
  el.innerHTML='<div class="card"><div class="card-title">Minhas OS</div><div id="op-list"></div></div>';
  document.getElementById('op-list').innerHTML=lista.map(os=>{
    const regsOp=registros.filter(r=>r.osId===os.id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho');
    return `
    <div class="os-item" onclick="abrirOpOS('${os.id}')">
      <div class="os-item-header"><span style="font-weight:700">OS ${os.num}</span><span class="badge badge-yellow">Pendente</span></div>
      <div style="font-size:13px;color:var(--dim)">${os.cliente}${os.evento?' · '+os.evento:''}</div>
      <div style="font-size:12px;color:var(--dim)">${fmtData(os.dataSaida)} · ${renderEquipTexto(os)}</div>
      ${regsOp.length?`<div style="font-size:11px;color:var(--yellow);margin-top:3px">📝 ${regsOp.length} rascunho${regsOp.length>1?'s':''} pendente${regsOp.length>1?'s':''}</div>`:''}
    </div>`;
  }).join('');
}

function abrirOpOS(id){
  opOS=ordens.find(o=>o.id===id);
  if(!opOS) return;
  regEnviado=false;
  buildOpForm(opOS);
  const isPeriodica=opOS.tipoLocacao&&opOS.tipoLocacao!=='evento';
  // Para OS periódica: se já tem registros enviados, vai para tela de resumo
  const temEnviado=isPeriodica&&registros.some(r=>r.osId===id&&r.operadorId===sessaoAtual.id&&r.status==='enviado');
  // Para OS de evento: se já tem rascunhos, vai direto para a tela de resumo
  const temRascunho=!isPeriodica&&registros.some(r=>r.osId===id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho');
  if(temRascunho||temEnviado){
    setTimeout(()=>{
      for(let i=0;i<4;i++){const el=document.getElementById('op'+i);if(el)el.style.display='none';}
      lastReg=registros.filter(r=>r.osId===id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho').slice(-1)[0]||null;
      _renderResumoOS();
      document.getElementById('op-ok').style.display='block';
      window.scrollTo({top:0,behavior:'smooth'});
    },50);
  }
}

function _renderStep3(){
  if(!opOS) return;
  const os=opOS;
  const el=document.getElementById('op3');
  if(!el) return;
  // Lê a data que o operador digitou no Step 1 (já disponível agora)
  const dataHoje=document.getElementById('op-data')?.value||new Date().toISOString().split('T')[0];
  const rascunhosOS=registros.filter(r=>r.osId===os.id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho');
  // Último dia = data >= dataRetorno contratado; fallback: tem rascunhos
  const ultimoDia=os.dataRetorno ? dataHoje>=os.dataRetorno : rascunhosOS.length>0;
  if(!ultimoDia){
    el.innerHTML=`
    <div class="card">
      <div style="background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;margin-bottom:6px">📋</div>
        <div style="font-weight:700;color:var(--yellow);margin-bottom:4px">Dia intermediário</div>
        <div style="font-size:12px;color:var(--dim)">A assinatura do cliente será coletada somente no último dia (${fmtData(os.dataRetorno||'')}), com o resumo completo de todas as rodagens.</div>
      </div>
      <canvas id="sigCanvas" style="display:none"></canvas>
      <canvas id="sigCanvasOp" style="display:none"></canvas>
      <input type="hidden" id="op-resp"/>
      <input type="hidden" id="op-nome-op" value="${os.operadorNome||''}"/>
    </div>
    <button class="btn btn-green" id="btn-finalizar" onclick="finalizarReg()" style="margin-top:8px">💾 Salvar este dia</button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="opStep(2)">← Voltar</button>`;
    return;
  }
  // Último dia: resumo de rodagens + assinatura
  const todosRascunhos=[...rascunhosOS].sort((a,b)=>a.data.localeCompare(b.data));
  const resumoRodagens=todosRascunhos.map(r=>{
    const linhasG=r.geradoresReg&&r.geradoresReg.length
      ? r.geradoresReg.map(g=>g.standby&&!g.rodou
          ? `<div style="font-size:12px;color:var(--dim);margin-left:8px">⚡ ${g.potencia||'Gerador'}${g.patrimonio?' ('+g.patrimonio+')':''} — <em>Stand-by (não operou)</em></div>`
          : `<div style="font-size:12px;color:var(--dim);margin-left:8px">⚡ ${g.potencia||'Gerador'}${g.patrimonio?' ('+g.patrimonio+')':''} — ${g.part} às ${g.par} (${g.totalHoras?g.totalHoras.toFixed(1)+'h':'—'})${g.heM>0?' <span style="color:var(--yellow)">+'+g.heM.toFixed(1)+'h HE</span>':''}</div>`
        ).join('')
      : `<div style="font-size:12px;color:var(--dim);margin-left:8px">Liga: ${r.partida} · Desliga: ${r.parada} · ${r.totalHoras?r.totalHoras.toFixed(1)+'h':'—'}</div>`;
    return `<div style="padding:7px 0;border-bottom:1px solid var(--border)">
      <div style="font-weight:700;font-size:13px;margin-bottom:4px">${fmtData(r.data)}</div>
      ${linhasG}
    </div>`;
  }).join('');
  el.innerHTML=`
    <div class="card">
      <div class="card-title">Resumo de Operação</div>
      <p style="font-size:12px;color:var(--dim);margin-bottom:10px">Apresente ao cliente para conferência antes de assinar.</p>
      <div style="background:var(--dark);border-radius:10px;padding:12px;margin-bottom:4px">
        <div style="font-weight:700;font-size:13px;margin-bottom:8px">OS ${os.num} — ${os.cliente}${os.evento?' · '+os.evento:''}</div>
        ${resumoRodagens}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Assinatura do Cliente</div>
      <p style="font-size:13px;color:var(--dim);margin-bottom:11px">Peça ao cliente para assinar confirmando os horários acima.</p>
      <canvas id="sigCanvas" width="400" height="155"></canvas>
      <div style="display:flex;gap:8px;margin-top:7px">
        <button class="btn btn-ghost btn-sm" style="width:auto" onclick="clearSig('sigCanvas')">Limpar</button>
      </div>
      <div class="field" style="margin-top:12px"><label>Nome do responsável (cliente)</label><input id="op-resp" placeholder="Quem assinou pelo cliente"/></div>
    </div>
    <div class="card">
      <div class="card-title">Assinatura do Operador</div>
      <p style="font-size:13px;color:var(--dim);margin-bottom:11px">Assine como operador responsável.</p>
      <canvas id="sigCanvasOp" width="400" height="155"></canvas>
      <div style="display:flex;gap:8px;margin-top:7px">
        <button class="btn btn-ghost btn-sm" style="width:auto" onclick="clearSig('sigCanvasOp')">Limpar</button>
      </div>
      <div class="field" style="margin-top:12px"><label>Nome do operador</label><input id="op-nome-op" value="${os.operadorNome||''}" placeholder="Nome do operador"/></div>
    </div>
    <button class="btn btn-green" id="btn-finalizar" onclick="finalizarReg()">✓ Salvar e Finalizar último dia</button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="opStep(2)">← Voltar</button>`;
}

function opIniciarLocacaoPeriodica(){

  const os=opOS;
  // Verifica quais checks já foram feitos
  const regsOS=registros.filter(r=>r.osId===os.id);
  const jaEntregou=regsOS.some(r=>r.checkEntrega);
  const jaDevolveu=regsOS.some(r=>r.checkDevolucao);
  el.innerHTML=`
  <div class="card">
    <div class="card-title">📅 Locação ${os.tipoLocacao?os.tipoLocacao.charAt(0).toUpperCase()+os.tipoLocacao.slice(1):'Periódica'} — OS ${os.num}</div>

      <tr><td style="color:var(--dim)">Local</td><td>${os.endereco||''} ${os.cidade?'— '+os.cidade:''}${os.uf?'/'+os.uf:''}</td></tr>
      <tr><td style="color:var(--dim)">Equipamentos</td><td>${renderEquipTexto(os)}</td></tr>
      <tr><td style="color:var(--dim)">Período</td><td>${fmtData(os.dataSaida)} → ${fmtData(os.dataRetorno)}</td></tr>
    </table>
  </div>
  <div class="card">
    <div class="card-title">Tipo de Registro</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
      <label style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;border:2px solid ${jaEntregou?'var(--green)':'rgba(16,185,129,.3)'};background:${jaEntregou?'rgba(16,185,129,.08)':'var(--card2)'};cursor:pointer;opacity:${jaEntregou?'.6':'1'}">
        <input type="radio" name="lp-tipo" value="entrega" id="lp-entrega" ${jaEntregou?'disabled':''} style="width:18px;height:18px;accent-color:var(--green)"/>
        <div>
          <div style="font-weight:700;font-size:14px;color:${jaEntregou?'var(--green)':'var(--fg)'}">📦 Entrega ${jaEntregou?'✅ (já realizada)':''}</div>
          <div style="font-size:12px;color:var(--dim)">Cliente recebeu os equipamentos</div>
        </div>
      </label>
      <label style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;border:2px solid ${jaDevolveu?'var(--green)':'rgba(99,102,241,.3)'};background:${jaDevolveu?'rgba(16,185,129,.08)':'var(--card2)'};cursor:pointer;opacity:${jaDevolveu?'.6':'1'}">
        <input type="radio" name="lp-tipo" value="devolucao" id="lp-devolucao" ${jaDevolveu?'disabled':(!jaEntregou?'disabled':'')} style="width:18px;height:18px;accent-color:#818cf8"/>
        <div>
          <div style="font-weight:700;font-size:14px;color:${jaDevolveu?'var(--green)':'var(--fg)'}">🔄 Devolução ${jaDevolveu?'✅ (já realizada)':(!jaEntregou?'(disponível após entrega)':'')}</div>
          <div style="font-size:12px;color:var(--dim)">Equipamentos foram devolvidos</div>
        </div>
      </label>

    <div id="lp-texto-decl" style="background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:var(--dim);line-height:1.7;text-align:justify">
      📦 <strong>Entrega:</strong> Declaro que recebi os equipamentos acima listados em perfeito estado de funcionamento e conservação, responsabilizando-me pelo uso e guarda durante o período de locação.
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="field"><label>Data</label><input type="date" id="lp-data" value="${hoje}"/></div>

  setTimeout(initSig,80);

function finalizarLocacaoPeriodica(){
  const data=document.getElementById('lp-data')?.value;
  const hora=document.getElementById('lp-hora')?.value;
  const resp=document.getElementById('lp-resp')?.value||'';
  if(!data){alert('Preencha a data.');return;}
  const sigCliente=sigPads['sigCanvas']?.hasData?document.getElementById('sigCanvas').toDataURL('image/png'):null;
  const sigOperador=sigPads['sigCanvasOp']?.hasData?document.getElementById('sigCanvasOp').toDataURL('image/png'):null;
  if(!sigOperador){alert('A assinatura do operador é obrigatória.');return;}
  const btn=document.getElementById('btn-finalizar-lp');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const _lpTipo=document.querySelector('input[name="lp-tipo"]:checked')?.value;
  if(!_lpTipo){alert('Selecione o tipo de registro: Entrega ou Devolução.');return;}
  const reg={
    id:'reg_'+Date.now(),
    osId:opOS.id,osNum:opOS.num,cliente:opOS.cliente,evento:opOS.evento||'',
    operadorId:sessaoAtual.id,operadorNome:sessaoAtual.nome,
    data,horaAssinatura:hora,
    respCliente:resp,
    assinatura:sigCliente,assinaturaOp:sigOperador,
    tipoLocacao:opOS.tipoLocacao||'',
    checkEntrega:_lpTipo==='entrega',
    checkDevolucao:_lpTipo==='devolucao',
    status:'enviado',
    criadoEm:new Date().toISOString()
  };
  // Se é devolução, fechar a OS
  if(_lpTipo==='devolucao'){
    const osIdx=ordens.findIndex(o=>o.id===opOS.id);
    if(osIdx>=0) ordens[osIdx].status='fechada';
  }
  registros.push(reg);
  saveAll().then(()=>{
    showToast('Assinatura salva!','ok');
    // Recarrega buildOpForm para ter o bloco op-ok disponível
    buildOpForm(opOS);
    // Oculta todos os steps e mostra op-ok
    for(let i=0;i<4;i++){const el=document.getElementById('op'+i);if(el)el.style.display='none';}
    _renderResumoOS();
    document.getElementById('op-ok').style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }).catch(()=>{
    if(btn){btn.disabled=false;btn.textContent='💾 Salvar Assinatura';}
    showToast('Erro ao salvar. Tente novamente.','err');
  });
}

function opStep(n){
  for(let i=0;i<4;i++){
    document.getElementById('op'+i).style.display=i===n?'block':'none';
    const s=document.getElementById('st'+i);
    if(s) s.className='step '+(i<n?'done':i===n?'active':'');
  }
  if(n===1) setTimeout(atualizarPrevisaoHint,50);
  if(n===3){
    _renderStep3(); // gera o HTML com a data real do operador antes de inicializar assinatura
    setTimeout(initSig,80);
  }
}

function calcHEGerador(gi){
  const part=document.getElementById(`g-part-${gi}`)?.value;
  const par=document.getElementById(`g-par-${gi}`)?.value;
  const hi=parseFloat(document.getElementById(`g-hi-${gi}`)?.value)||0;
  const wEl=document.getElementById(`g-he-warn-${gi}`);
  const txt=document.getElementById(`g-he-txt-${gi}`);
  if(!part||!par){if(wEl)wEl.classList.remove('show');return;}
  const pM=toMin(part),sM=toMin(par);
  const totH=(sM>pM?sM-pM:sM+1440-pM)/60;
  // Horímetro final
  const hfEl=document.getElementById(`g-hf-${gi}`);
  if(hfEl&&hi) hfEl.value=(hi+totH).toFixed(1);
  // Limite contratado: meia diária = 6h; ou hContratadas do dia; senão 12h padrão
  const meiadiaria=document.getElementById(`g-meia-${gi}`)?.checked||false;
  const data=document.getElementById('op-data')?.value;
  const g=(opOS?.equipamentos||[]).filter(e=>e.tipo==='gerador')[gi];
  const prevDia=(g?.previsaoDias||[]).find(p=>p.data===data);
  const hContratadas=prevDia?.hContratadas||12;
  const limiteH=meiadiaria?6:hContratadas;
  const heM=Math.max(0,totH-limiteH);
  if(wEl&&txt){
    const labelContrato=meiadiaria?'meia diária':(hContratadas>12?`${hContratadas}h contratadas`:'diária');
    if(heM>0){txt.textContent=`Operou ${totH.toFixed(1)}h — excedeu ${fmtHE(heM)} do contrato de ${limiteH}h (${labelContrato}).`;wEl.classList.add('show');}
    else wEl.classList.remove('show');
  }
}

function atualizarPrevisaoHint(){

  geradores.forEach((g,gi)=>{
    const el=document.getElementById(`prev-hint-${gi}`);
    if(!el) return;
    const prev=(g.previsaoDias||[]).find(p=>p.data===data);
    // Fallback: hIni/hFim antigo (OS criadas antes desta versão)
    const hIni=prev?.hIni||g.hIni;
    const hFim=prev?.hFim||g.hFim;
    const naoRoda=prev?.naoRoda||false;
    if(naoRoda){
      el.innerHTML=`<div style="font-size:11px;background:rgba(204,0,0,.08);border:1px solid rgba(204,0,0,.25);border-radius:6px;padding:5px 10px;display:inline-block;color:var(--red-light)">🚫 Gerador não opera neste dia (conforme planejamento)</div>`;
    } else if(hIni||hFim){
      const hContr=prev?.hContratadas||12;
      const badgeContr=hContr>12?`<span style="margin-left:6px;background:rgba(234,179,8,.15);color:var(--yellow);font-size:10px;border-radius:4px;padding:1px 6px;font-weight:700">${hContr}h contratadas</span>`:'';
      el.innerHTML=`<div style="font-size:11px;color:var(--dim);background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:5px 10px;display:inline-flex;align-items:center;gap:4px;flex-wrap:wrap">⏰ Previsão: <strong style="color:var(--fg)">${hIni||'--:--'} → ${hFim||'--:--'}</strong>${badgeContr}<span style="font-size:10px;color:var(--dim)">(o horário real prevalece)</span></div>`;
    } else {
      el.innerHTML='';
    }
  });
}

function coletarGeradoresReg(){
  if(!opOS) return [];
  const geradores=(opOS.equipamentos||[]).filter(e=>e.tipo==='gerador');
  return geradores.map((g,gi)=>{
    const isStandby=!!g.standby;
    const rodouStandby=isStandby?(document.getElementById(`g-rodou-${gi}`)?.checked||false):true;
    const naoRodouNormal=!isStandby&&(document.getElementById(`g-nao-rodou-${gi}`)?.checked||false);
    const rodou=isStandby?rodouStandby:!naoRodouNormal;
    if(isStandby&&!rodouStandby) return {eqId:g.id,potencia:g.potencia||'',patrimonio:g.patrimonio||'',standby:true,rodou:false,part:'',par:'',horIni:'',horFim:'',totalHoras:0,heM:0};
    if(naoRodouNormal) return {eqId:g.id,potencia:g.potencia||'',patrimonio:g.patrimonio||'',standby:false,rodou:false,part:'',par:'',horIni:'',horFim:'',totalHoras:0,heM:0};
    const part=document.getElementById(`g-part-${gi}`)?.value||'';
    const par=document.getElementById(`g-par-${gi}`)?.value||'';
    const hi=document.getElementById(`g-hi-${gi}`)?.value||'';
    const hf=document.getElementById(`g-hf-${gi}`)?.value||'';
    const meiadiaria=document.getElementById(`g-meia-${gi}`)?.checked||false;
    const data=document.getElementById('op-data')?.value;
    const prevDia=(g.previsaoDias||[]).find(p=>p.data===data);
    const hContratadas=prevDia?.hContratadas||12;
    const limiteH=meiadiaria?6:hContratadas;
    let totH=0,heM=0;
    if(part&&par){const pM=toMin(part),sM=toMin(par);totH=(sM>pM?sM-pM:sM+1440-pM)/60;heM=Math.max(0,totH-limiteH);}
    return {eqId:g.id,potencia:g.potencia||'',patrimonio:g.patrimonio||'',standby:isStandby,rodou,part,par,horIni:hi,horFim:hf,totalHoras:totH,heM,meiadiaria,hContratadas:limiteH};
  });
}

function calcHE(){
  if(!opOS) return;
  const data=document.getElementById('op-data')?.value;
  const part=document.getElementById('op-part')?.value;
  const par=document.getElementById('op-par')?.value;
  if(!part||!par) return;
  const pM=toMin(part),sM=toMin(par);
  const totH=(sM>pM?sM-pM:sM+1440-pM)/60;
  // HE máquina
  const dc=opOS.diasContratados?.find(d=>d.data===data);
  const wEl=document.getElementById('he-maq-warn');
  // HE máquina — regra: contrato sempre 12h independente do horário
  const CONTRATO_MAQUINA_H = 12;
  const heM_calc = Math.max(0, totH - CONTRATO_MAQUINA_H);
  if(wEl){
    if(heM_calc > 0){
      document.getElementById('he-maq-txt').textContent=`Gerador operou ${totH.toFixed(1)}h — excedeu ${fmtHE(heM_calc)} do contrato de ${CONTRATO_MAQUINA_H}h.`;
      wEl.classList.add('show');
    } else wEl.classList.remove('show');
  }
  calcHorFinal();
}

function calcHorFinal(){
  const part=document.getElementById('op-part')?.value;
  const par=document.getElementById('op-par')?.value;
  const hi=parseFloat(document.getElementById('op-hi')?.value)||0;
  if(!part||!par||!hi) return;
  const pM=toMin(part), sM=toMin(par);
  const totH=(sM>pM?sM-pM:sM+1440-pM)/60;
  const hf=(hi+totH).toFixed(1);
  const hfEl=document.getElementById('op-hf');
  if(hfEl) hfEl.value=hf;
}

const sigPads={};
// Variáveis temporárias para preservar assinaturas ao navegar entre steps
let _sigClienteTemp=null;
let _sigOperadorTemp=null;

function initSigPad(id){
  const canvas=document.getElementById(id);if(!canvas) return;
  const rect=canvas.getBoundingClientRect();
  canvas.width=Math.floor(rect.width*window.devicePixelRatio)||400;
  canvas.height=155*window.devicePixelRatio||155;
  canvas.style.width='100%';canvas.style.height='155px';
  const ctx=canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  ctx.strokeStyle='#111';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  sigPads[id]={ctx,hasData:false,drawing:false};
  const gp=e=>{const r=canvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top}};
  canvas.onmousedown=canvas.ontouchstart=e=>{e.preventDefault();sigPads[id].drawing=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y)};
  canvas.onmousemove=canvas.ontouchmove=e=>{e.preventDefault();if(!sigPads[id].drawing) return;const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();sigPads[id].hasData=true};
  canvas.onmouseup=canvas.ontouchend=()=>{sigPads[id].drawing=false};
}
function initSig(){
  // Salva assinaturas já preenchidas antes de reinicializar
  const scOld=document.getElementById('sigCanvas');
  const soOld=document.getElementById('sigCanvasOp');
  if(scOld&&sigPads['sigCanvas']?.hasData) _sigClienteTemp=scOld.toDataURL('image/png');
  if(soOld&&sigPads['sigCanvasOp']?.hasData) _sigOperadorTemp=soOld.toDataURL('image/png');

  // Só inicializa canvas que estão visíveis (dias intermediários têm display:none)
  const sc=document.getElementById('sigCanvas');
  const so=document.getElementById('sigCanvasOp');
  if(sc&&sc.style.display!=='none') initSigPad('sigCanvas');
  if(so&&so.style.display!=='none') initSigPad('sigCanvasOp');

  // Restaura assinaturas salvas nos novos canvases
  setTimeout(()=>{
    if(_sigClienteTemp&&sigPads['sigCanvas']){
      const img=new Image();
      img.onload=()=>{sigPads['sigCanvas'].ctx.drawImage(img,0,0,img.width/window.devicePixelRatio,img.height/window.devicePixelRatio);sigPads['sigCanvas'].hasData=true;};
      img.src=_sigClienteTemp;
    }
    if(_sigOperadorTemp&&sigPads['sigCanvasOp']){
      const img=new Image();
      img.onload=()=>{sigPads['sigCanvasOp'].ctx.drawImage(img,0,0,img.width/window.devicePixelRatio,img.height/window.devicePixelRatio);sigPads['sigCanvasOp'].hasData=true;};
      img.src=_sigOperadorTemp;
    }
  },50);
}
function clearSig(id){
  const p=sigPads[id];
  if(p){const c=document.getElementById(id);p.ctx.clearRect(0,0,c.width,c.height);p.hasData=false;}
  if(id==='sigCanvas') _sigClienteTemp=null;
  if(id==='sigCanvasOp') _sigOperadorTemp=null;
}

let lastReg=null;
let regEnviado=false;
function novoRegistroDia(){
  if(!opOS) return;
  // Reconstrói o formulário para refletir o novo estado (ex: transporte muda de Ida para Volta)
  regEnviado=false;
  buildOpForm(opOS);
  // Avança direto para Step 1 e, depois que o DOM estiver pronto,
  // pré-preenche horímetro inicial de cada gerador com o horFim do rascunho mais recente
  setTimeout(()=>{
    opStep(1);
    window.scrollTo({top:0,behavior:'smooth'});
    // Busca o rascunho mais recente desta OS+operador
    const rascunhos=registros
      .filter(r=>r.osId===opOS.id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho')
      .sort((a,b)=>b.data.localeCompare(a.data)); // mais recente primeiro
    const ultimo=rascunhos[0];
    if(!ultimo||!ultimo.geradoresReg) return;
    // Mapeia eqId → horFim do último rascunho
    const horFimPorEq={};
    ultimo.geradoresReg.forEach(g=>{ if(g.eqId&&g.horFim) horFimPorEq[g.eqId]=g.horFim; });
    // Preenche os inputs de horímetro inicial de cada gerador no formulário
    const geradores=(opOS.equipamentos||[]).filter(e=>e.tipo==='gerador');
    geradores.forEach((g,gi)=>{
      const hf=horFimPorEq[g.id];
      if(!hf) return;
      const input=document.getElementById(`g-hi-${gi}`);
      if(input&&!input.value){ // só preenche se estiver vazio (não sobrescreve edição manual)
        input.value=hf;
        // atualiza label para indicar que foi sugerido automaticamente
        const lbl=input.closest('.field')?.querySelector('label');
        if(lbl&&!lbl.dataset.orig){
          lbl.dataset.orig=lbl.textContent;
          lbl.innerHTML=`${lbl.textContent} <span style="color:var(--yellow);font-size:10px;font-weight:600">(sugerido)</span>`;
        }
      }
    });
  },100);
}

function finalizarReg(){
  const data=document.getElementById('op-data')?.value;
  if(!data){alert('Preencha a data.');return;}
  const temGerador=opOS&&((opOS.equipamentos&&opOS.equipamentos.some(e=>e.tipo==='gerador'))||(opOS.potencia&&!opOS.equipamentos?.length));
  const geradoresReg=temGerador?coletarGeradoresReg():[];
  // Validação: apenas geradores que rodaram precisam de horários
  if(temGerador){
    const ativos=geradoresReg.filter(g=>g.rodou);
    const semHorario=ativos.find(g=>!g.part||!g.par);
    if(semHorario){alert(`Preencha os horários de Liga/Desliga do gerador ${semHorario.potencia||''}.`);return;}
  }
  // Usa o primeiro gerador ativo como referência para campos legados (compatibilidade)
  const gRef=geradoresReg.find(g=>g.rodou)||geradoresReg[0]||null;
  const part=gRef?.part||'00:00';
  const par=gRef?.par||'00:00';
  const pM=toMin(part),sM=toMin(par);
  const totH=gRef?(sM>pM?sM-pM:sM+1440-pM)/60:0;
  // HE do operador = período de HE informado + chegada antecipada (se marcado)
  const _heIni=document.getElementById('op-he-ini')?.value||'';
  const _heFim=document.getElementById('op-he-fim')?.value||'';
  let heO=0;
  if(_heIni&&_heFim){
    const hIniM=toMin(_heIni),hFimM=toMin(_heFim);
    heO=(hFimM>hIniM?hFimM-hIniM:hFimM+1440-hIniM)/60;
  }
  // Chegada antecipada: soma horas antes das 08h ao heO
  const _cedoAtivo=document.getElementById('op-chegou-cedo')?.checked||false;
  const _cedoIni=document.getElementById('op-cedo-ini')?.value||'';
  const _cedoFim=document.getElementById('op-cedo-fim')?.value||'';
  let heCedo=0;
  if(_cedoAtivo&&_cedoIni&&_cedoFim){
    const cIniM=toMin(_cedoIni),cFimM=toMin(_cedoFim);
    heCedo=(cFimM>cIniM?cFimM-cIniM:cFimM+1440-cIniM)/60;
  }
  heO+=heCedo;
  const _opUser=opOS?usuarios.find(u=>u.id===sessaoAtual.id):null;
  const _heValorOp=(_opUser&&_opUser.heValor>0)?_opUser.heValor:config.heValor;
  const valHEop=heO*_heValorOp;
  // HE máquina — soma de todos os geradores que rodaram
  const heM=geradoresReg.reduce((a,g)=>a+(g.heM||0),0);
  // Captura assinaturas — usa canvas atual ou backup temporário
  const sigCliente=sigPads['sigCanvas']?.hasData
    ? document.getElementById('sigCanvas').toDataURL('image/png')
    : (_sigClienteTemp||null);
  const sigOperador=sigPads['sigCanvasOp']?.hasData
    ? document.getElementById('sigCanvasOp').toDataURL('image/png')
    : (_sigOperadorTemp||null);
  // Assinatura só é obrigatória no último dia
  const _dataFinalReg=document.getElementById('op-data')?.value||'';
  const _ultimoDiaReg=opOS?.dataRetorno ? _dataFinalReg>=opOS.dataRetorno : true;
  if(_ultimoDiaReg && !sigOperador){alert('A assinatura do operador é obrigatória.');return;}
  lastReg={
    id:'reg_'+Date.now(),osId:opOS.id,osNum:opOS.num,cliente:opOS.cliente,evento:opOS.evento||'',
    operadorId:sessaoAtual.id,operadorNome:sessaoAtual.nome,
    data,partida:part,parada:par,
    horIni:gRef?.horIni||'',
    horFim:gRef?.horFim||'',
    obs:document.getElementById('op-obs')?.value||'',
    heIni: document.getElementById('op-he-ini')?.value || '',
    heFim: document.getElementById('op-he-fim')?.value || '',
    chegouCedo: _cedoAtivo,
    cedoIni: _cedoAtivo?_cedoIni:'',
    cedoFim: _cedoAtivo?_cedoFim:'',
    heCedo,
    abastecido: document.getElementById('op-abastecido')?.value||'nao',
    litros: document.getElementById('op-litros')?.value||'',
    placa:document.getElementById('op-placa')?.value||'',
    motorista:document.getElementById('op-mot')?.value||'',
    itinerarioSaida:document.getElementById('op-itin-saida')?.value||'',
    itinerarioChegada:document.getElementById('op-itin-chegada')?.value||'',
    itinerarioSaidaVolta:document.getElementById('op-itin-saida-volta')?.value||'',
    itinerarioChegadaVolta:document.getElementById('op-itin-chegada-volta')?.value||'',
    respCliente:document.getElementById('op-resp')?.value||'',
    nomeOperador:document.getElementById('op-nome-op')?.value||opOS.operadorNome||'',
    assinatura:sigCliente,assinaturaOp:sigOperador,
    geradoresReg,
    heOperador:heO,valorHEOperador:valHEop,heMaquina:heM,totalHoras:totH,
    refeicoes:refStepperVal('op-ref'),
    valorRefeicao:refStepperVal('op-ref')*25,
    status:'rascunho',
    criadoEm:new Date().toISOString()
  };
  registros.push(lastReg);
  const btnFin=document.getElementById('btn-finalizar');
  if(btnFin){btnFin.disabled=true;btnFin.textContent='Salvando...';}
  saveAll().then(()=>{
    _finalizarRegUI();
  }).catch(()=>{
    _finalizarRegUI();
    showToast('Salvo localmente (Firebase indisponível)','err');
  });
  return;
}
function _finalizarRegUI(){
  // Limpa backups de assinatura após salvar com sucesso
  _sigClienteTemp=null;
  _sigOperadorTemp=null;
  for(let i=0;i<4;i++){const el=document.getElementById('op'+i);if(el)el.style.display='none';}
  _renderResumoOS();
  showToast('Dia salvo!');
  document.getElementById('op-ok').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function _renderResumoOS(){
  if(!opOS) return;
  const rascunhos=registros.filter(r=>r.osId===opOS.id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho');
  const enviados=registros.filter(r=>r.osId===opOS.id&&r.operadorId===sessaoAtual.id&&r.status==='enviado');
  const resumoEl=document.getElementById('op-ok-resumo');
  if(!resumoEl) return;

  // === OS PERIÓDICA (mensal/quinzenal/semanal) — exibe apenas entrega/devolução ===
  const isPeriodica=opOS.tipoLocacao&&opOS.tipoLocacao!=='evento';
  if(isPeriodica){
    const todosRegs=[...rascunhos,...enviados];
    const regEntrega=todosRegs.find(r=>r.checkEntrega);
    const regDevolucao=todosRegs.find(r=>r.checkDevolucao);
    const tipoLabel={'mensal':'Mensal','quinzenal':'Quinzenal','semanal':'Semanal'}[opOS.tipoLocacao]||opOS.tipoLocacao;
    resumoEl.innerHTML=`
      <div style="font-weight:700;font-size:13px;margin-bottom:10px">OS ${opOS.num} — ${opOS.cliente}${opOS.evento?' · '+opOS.evento:''}</div>
      <div style="font-size:11px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);border-radius:6px;padding:4px 10px;display:inline-block;margin-bottom:12px;color:#a5b4fc">📅 Locação ${tipoLabel}</div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <div style="flex:1;background:${regEntrega?'rgba(16,185,129,.12)':'rgba(234,179,8,.08)'};border:1px solid ${regEntrega?'rgba(16,185,129,.3)':'rgba(234,179,8,.2)'};border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:20px;margin-bottom:4px">📦</div>
          <div style="font-size:12px;font-weight:700;color:${regEntrega?'var(--green)':'var(--yellow)'}">${regEntrega?'✓ Entrega registrada':'Aguardando entrega'}</div>
          ${regEntrega?`<div style="font-size:11px;color:var(--dim);margin-top:3px">${fmtData(regEntrega.data)}</div>`:''}
        </div>
        <div style="flex:1;background:${regDevolucao?'rgba(16,185,129,.12)':'rgba(100,116,139,.08)'};border:1px solid ${regDevolucao?'rgba(16,185,129,.3)':'rgba(100,116,139,.2)'};border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:20px;margin-bottom:4px">🔄</div>
          <div style="font-size:12px;font-weight:700;color:${regDevolucao?'var(--green)':'var(--dim)'}">${regDevolucao?'✓ Devolução registrada':'Aguardando devolução'}</div>
          ${regDevolucao?`<div style="font-size:11px;color:var(--dim);margin-top:3px">${fmtData(regDevolucao.data)}</div>`:''}
        </div>
      </div>`;
    // Oculta botões de fluxo de eventos
    const btnEnv=document.getElementById('btn-enviar-admin');
    if(btnEnv) btnEnv.style.display='none';
    const btnNovo=document.querySelector('button[onclick="novoRegistroDia()"]');
    if(btnNovo) btnNovo.style.display='none';
    // Mostra botão coletar outra assinatura se ainda não tem devolução
    const btnPeriod=document.getElementById('btn-coletar-assinatura-period');
    if(btnPeriod) btnPeriod.style.display=regDevolucao?'none':'block';
    return;
  }

  // === OS DE EVENTO (padrão) ===
  // Controla botão periódico (ocultar no fluxo de evento)

    </div>`:'';

  const totalRegs=rascunhos.length+enviados.length;
  resumoEl.innerHTML=`

    btnNovo.style.display=todosDiasPreenchidos&&diasFaltando.length===0?'none':'block';
  }

function salvarHERascunho(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r){showToast('Registro não encontrado','err');return;}
  const ini=document.getElementById('ehr-ini')?.value||'';
  const fim=document.getElementById('ehr-fim')?.value||'';
  if(!ini||!fim){showToast('Preencha o horário de início e fim da HE','err');return;}
  const cedoAtivo=document.getElementById('ehr-cedo')?.checked||false;
  const cedoIni=cedoAtivo?(document.getElementById('ehr-cedo-ini')?.value||''):'';
  const cedoFim=cedoAtivo?(document.getElementById('ehr-cedo-fim')?.value||''):'';
  // Recalcula HE
  const iM=toMin(ini),fM=toMin(fim);
  let heO=(fM>iM?fM-iM:fM+1440-iM)/60;
  let heCedo=0;
  if(cedoAtivo&&cedoIni&&cedoFim){
    const cI=toMin(cedoIni),cF=toMin(cedoFim);
    heCedo=(cF>cI?cF-cI:cF+1440-cI)/60;
  }
  heO+=heCedo;
  const _opUser=usuarios.find(u=>u.id===r.operadorId);
  const _heValor=(_opUser&&_opUser.heValor>0)?_opUser.heValor:config.heValor;
  r.heIni=ini;
  r.heFim=fim;
  r.chegouCedo=cedoAtivo;
  r.cedoIni=cedoIni;
  r.cedoFim=cedoFim;
  r.heCedo=heCedo;
  r.heOperador=heO;
  r.valorHEOperador=heO*_heValor;
  r.refeicoes=refStepperVal('ehr-ref');
  r.valorRefeicao=r.refeicoes*25;
  document.getElementById('modal-he-rasc')?.remove();
  DB.set('sos_registros',registros);
  fbUpdate('registros/'+r.id,r).catch(()=>{});
  _renderResumoOS();
  showToast('HE atualizada!');
}

function excluirRascunho(regId){
  if(!confirm('Remover este dia do registro?')) return;
  registros=registros.filter(r=>r.id!==regId);
  DB.set('sos_registros',registros);
  fbRemove('registros/'+regId)
    .then(()=>{_renderResumoOS();showToast('Dia removido.');})
    .catch(e=>showToast('Erro ao remover: '+(e?.message||'falha'),'err'));
}

function confirmarEnvioAdmin(){

  const rascunhos=registros.filter(r=>r.osId===opOS?.id&&r.operadorId===sessaoAtual.id&&r.status==='rascunho');
  if(!rascunhos.length) return;
  rascunhos.forEach(r=>{r.status='enviado';});
  const btnEnv=document.getElementById('btn-enviar-admin');
  if(btnEnv){btnEnv.disabled=true;btnEnv.textContent='Enviando...';}
  saveAll().then(()=>{
    if(config.webhook){
      rascunhos.forEach(r=>fetch(config.webhook,{method:'POST',body:JSON.stringify({...r,assinatura:r.assinatura?'(capturada)':'não',assinaturaOp:r.assinaturaOp?'(capturada)':'não'}),headers:{'Content-Type':'application/json'}}).catch(()=>{}));

function loadRelatorio(){
  const el=document.getElementById('page-relatorio');
  const hoje=new Date().toISOString().split('T')[0];
  const mesAtual=hoje.slice(0,7);

  // Classifica cada OS
  const emAndamento=ordens.filter(o=>o.status!=='fechada'&&o.dataSaida<=hoje&&o.dataRetorno>=hoje);
  const futuras=ordens.filter(o=>o.status!=='fechada'&&o.dataSaida>hoje);
  const doMes=ordens.filter(o=>{
    const ini=o.dataSaida||'';
    const fim=o.dataRetorno||o.dataSaida||'';
    return ini.startsWith(mesAtual)||fim.startsWith(mesAtual)||(ini<=mesAtual+'-31'&&fim>=mesAtual+'-01');
  });
  const encerradasMes=doMes.filter(o=>o.status==='fechada');

  function cardOS(os,corBorda){
    // Bolinha verde para qualquer dia preenchido (rascunho ou enviado)
    const regsOS=registros.filter(r=>r.osId===os.id);
    const datasEnviadas=new Set(regsOS.map(r=>r.data));
    const equips=renderEquipTexto(os);
    const ops=(os.operadores||[]).map(op=>{const u=usuarios.find(u=>u.id===op.userId);return u?u.nome:'?';}).filter(Boolean);

    // Gera lista de dias do evento
    let diasHTML='';
    if(os.dataSaida&&os.dataRetorno){
      const dias=[];
      const d=new Date(os.dataSaida+'T12:00:00');
      const fim=new Date(os.dataRetorno+'T12:00:00');
      while(d<=fim){dias.push(d.toISOString().split('T')[0]);d.setDate(d.getDate()+1);}
      const abrev=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
      diasHTML=`<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:6px">
        ${dias.map(dt=>{
          const enviado=datasEnviadas.has(dt);
          const [,m,d2]=dt.split('-');
          const dow=abrev[new Date(dt+'T12:00:00').getDay()];
          return enviado
            ? `<div title="${d2}/${m} — enviado" style="display:flex;flex-direction:column;align-items:center;gap:2px">
                <div style="width:26px;height:26px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff">✓</div>
                <span style="font-size:9px;color:var(--green);font-weight:600">${d2}/${m}</span>
               </div>`
            : `<div title="${d2}/${m} — pendente" style="display:flex;flex-direction:column;align-items:center;gap:2px">
                <div style="width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--dim)">${dow}</div>
                <span style="font-size:9px;color:var(--dim)">${d2}/${m}</span>
               </div>`;
        }).join('')}
      </div>`;
    } else if(regsOS.length){
      // OS sem datas definidas — só mostra contagem
      diasHTML=`<div style="margin-top:6px"><span style="font-size:11px;color:var(--green)">✓ ${regsOS.length} dia${regsOS.length!==1?'s':''} enviado${regsOS.length!==1?'s':''}</span></div>`;
    }

    return `
    <div onclick="verOS('${os.id}')" style="border:1px solid ${corBorda};border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;background:var(--card);transition:opacity .15s" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div>
          <span style="font-weight:700;font-size:14px">OS ${os.num}</span>
          <span style="font-size:13px;color:var(--dim);margin-left:8px">${os.cliente}</span>
        </div>
        <span style="font-size:11px;color:var(--dim);white-space:nowrap;margin-left:8px">${fmtData(os.dataSaida)}→${fmtData(os.dataRetorno)}</span>
      </div>
      ${os.evento?`<div style="font-size:12px;color:var(--purple);margin-bottom:4px">🎪 ${os.evento}</div>`:''}
      <div style="font-size:11px;color:var(--dim);margin-bottom:2px">${equips}</div>
      ${ops.length?`<div style="font-size:11px;color:var(--dim)">👤 ${ops.join(', ')}</div>`:''}
      ${diasHTML}
    </div>`;
  }

  el.innerHTML=`
  <!-- KPIs do mês -->
  <div class="metric-grid" style="margin-bottom:12px">
    <div class="metric-card">
      <div class="metric-label">Total no mês</div>
      <div class="metric-value">${doMes.length}</div>
