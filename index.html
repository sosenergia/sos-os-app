const RESPOSTAS_TECNICAS={
  paralelo:['paralelo','sincronizar','sincronismo'],'partida':['partida','ligar','dar partida','não liga','não inicia'],
  'disjuntor':['disjuntor','trip','desarmou','desarmando'],'fusível':['fusível','fusivel','queimou'],
  'horímetro':['horímetro','horimetro'],'kva':['kva','potência','potencia','carga'],
  'terra':['aterramento','terra','proteção'],'avr':['avr','tensão','regulador']
};
const RESP_MAP={
  paralelo:`Para paralelizar dois geradores:\n1. Verifique que ambos têm a **mesma tensão** (ex: 220V ou 380V)\n2. **Mesma frequência** (60Hz)\n3. **Mesma sequência de fases** (use fasímetro)\n4. Sincronize a tensão e frequência antes de fechar o disjuntor de paralelo\n5. Use o sincronoscópio ou LEDs para confirmar o sincronismo\n⚠️ Nunca feche o disjuntor sem sincronismo — pode danificar o alternador.`,
  partida:`Gerador não dá partida — checklist:\n1. ✅ Nível do óleo (abaixo do mínimo = bloqueio automático)\n2. ✅ Nível do combustível\n3. ✅ Bateria carregada (mínimo 12V)\n4. ✅ Parada de emergência pressionada?\n5. ✅ Alarme ativo no painel?\n6. ✅ Filtro de combustível entupido?\nSe tudo OK e não parte: verifique bobina do motor de arranque.`,
  disjuntor:`Disjuntor desarmando — causas mais comuns:\n1. **Sobrecarga** — carga conectada maior que a capacidade do gerador\n2. **Curto-circuito** na instalação do cliente\n3. **Aquecimento** — verifique ventilação do gerador\n4. **Falha no AVR** — tensão instável causando pico\nProcedimento: desligue a carga, reset o disjuntor, reconecte a carga gradualmente.`,
  fusível:`Fusível queimado:\n1. Identifique o circuito (painel, bateria, 24V)\n2. Verifique **amperagem correta** — nunca substitua por fusível de amperagem maior\n3. Antes de trocar, identifique a **causa** (curto, sobrecarga)\n4. Fusível do painel 24V: geralmente 5A ou 10A conforme o modelo`,
  horímetro:`O horímetro registra as horas de funcionamento do motor.\n- Horímetro **eletromecânico**: funciona enquanto o motor está rodando\n- Horímetro **digital**: pode ter função de horas parciais\n- Para manutenção: troca de óleo a cada **250-500h** conforme o fabricante\n- Anote sempre o horímetro no início e fim de cada locação`,
  kva:`Cálculo de carga:\n- **KVA**: potência aparente\n- **KW**: potência ativa (KVA × fator de potência)\n- FP típico: 0,8 (motores) a 0,95 (resistivos)\n- Regra prática: não ultrapasse **70-80% da capacidade** do gerador\n- Ex: gerador 180KVA → use no máx. 144KVA de carga`,
  terra:`Aterramento:\n1. Gerador deve estar **aterrado** antes de ligar qualquer carga\n2. Resistência máxima: **5Ω** (NBR 5410)\n3. Em eventos: use estaca de aterramento temporária (mínimo 60cm no solo)\n4. Verifique continuidade do barramento de terra do gerador ao quadro do cliente\n⚠️ Sem aterramento: risco de choque e danos ao equipamento`,
  avr:`AVR (Regulador Automático de Tensão):\n- Mantém a tensão estável sob variação de carga\n- Sintoma de AVR com problema: tensão instável (sobe/desce)\n- Ajuste de tensão: potenciômetro no AVR (geralmente etiqueta V+ / V-)\n- Se a tensão não estabiliza mesmo ajustando: AVR pode precisar de troca\n- Modelos comuns: Stamford AS480, Leroy Somer D350, Newage`
};

let chatFotoBase64=null; // foto pendente para envio

function anexarFoto(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    chatFotoBase64=ev.target.result; // data:image/...;base64,...
    const thumb=document.getElementById('chat-img-thumb');
    const preview=document.getElementById('chat-img-preview');
    if(thumb) thumb.src=chatFotoBase64;
    if(preview) preview.style.display='block';
  };
  reader.readAsDataURL(file);
  e.target.value=''; // reset input para permitir mesma foto
}

function removerFoto(){
  chatFotoBase64=null;
  const preview=document.getElementById('chat-img-preview');
  if(preview) preview.style.display='none';
}

// ── RECONHECIMENTO DE VOZ ──
let _micRecognition=null;
let _micGravando=false;

function toggleMic(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    showToast('Seu navegador não suporta reconhecimento de voz. Use Chrome ou Safari.','err');
    return;
  }
  if(_micGravando){
    _micRecognition&&_micRecognition.stop();
    return;
  }
  _micRecognition=new SpeechRecognition();
  _micRecognition.lang='pt-BR';
  _micRecognition.continuous=false;
  _micRecognition.interimResults=true;

  const btnMic=document.getElementById('btn-mic');
  const inp=document.getElementById('chat-in');

  _micRecognition.onstart=()=>{
    _micGravando=true;
    if(btnMic){btnMic.classList.add('gravando');btnMic.title='Gravando... clique para parar';}
    showToast('🎙️ Ouvindo...');
  };
  _micRecognition.onresult=(e)=>{
    let texto='';
    for(let i=e.resultIndex;i<e.results.length;i++) texto+=e.results[i][0].transcript;
    inp.value=texto;
  };
  _micRecognition.onerror=(e)=>{
    _micGravando=false;
    if(btnMic){btnMic.classList.remove('gravando');btnMic.title='Enviar mensagem por voz';}
    if(e.error==='not-allowed') showToast('Permissão de microfone negada. Permita o acesso nas configurações do navegador.','err');
    else if(e.error!=='aborted') showToast('Erro no microfone: '+e.error,'err');
  };
  _micRecognition.onend=()=>{
    _micGravando=false;
    if(btnMic){btnMic.classList.remove('gravando');btnMic.title='Enviar mensagem por voz';}
    // Se capturou algo, envia automaticamente
    const val=inp.value.trim();
    if(val) enviarChat();
  };

  _micRecognition.start();
}

async function enviarChat(){
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim();
  const temFoto=!!chatFotoBase64;
  if(!msg && !temFoto) return;
  inp.value='';

  const msgs=document.getElementById('chat-msgs');
  // Mostra msg do usuário + thumb da foto se houver
  let userBubble=`<div class="chat-msg user" style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">`;
  if(temFoto) userBubble+=`<img src="${chatFotoBase64}" style="max-height:120px;max-width:200px;border-radius:8px;border:2px solid rgba(255,255,255,.3)"/>`;
  if(msg) userBubble+=`<span>${escHtml(msg)}</span>`;
  userBubble+=`</div>`;
  msgs.innerHTML+=userBubble;
  msgs.scrollTop=msgs.scrollHeight;

  const fotoParaEnviar=chatFotoBase64;
  removerFoto(); // limpa preview

  const typing=document.createElement('div');
  typing.className='chat-msg ai typing';typing.id='typing';
  typing.textContent=temFoto?'Analisando imagem...':'Digitando...';
  msgs.appendChild(typing);msgs.scrollTop=msgs.scrollHeight;

  // Tentar OpenAI — lê a chave do Firebase em tempo real
  let openaiKey = config.openaiKey || '';
  try {
    const cfgSnap = await db.ref('config/openaiKey').once('value');
    if (cfgSnap.val()) { openaiKey = cfgSnap.val(); config.openaiKey = openaiKey; }
  } catch(e) {}

  if(openaiKey){
    // Monta conteúdo da mensagem — texto e/ou imagem
    let userContent;
    if(temFoto){
      userContent=[];
      if(msg) userContent.push({type:'text',text:msg});
      else userContent.push({type:'text',text:'O que está escrito/mostrado nessa imagem? Explique em português o que significa para um operador de gerador.'});
      // extrai só o base64 puro sem o prefixo data:...
      const b64=fotoParaEnviar.split(',')[1];
      const mime=fotoParaEnviar.split(';')[0].split(':')[1];
      userContent.push({type:'image_url',image_url:{url:`data:${mime};base64,${b64}`,detail:'high'}});
    } else {
      userContent=msg;
    }
    chatHistory.push({role:'user',content:userContent});
    try{
      const res=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+openaiKey},
        body:JSON.stringify({
          model:'gpt-4o', // gpt-4o suporta visão (imagens)
          messages:[
            {role:'system',content:'Você é um técnico especialista em geradores elétricos, grupos geradores diesel, instalações elétricas industriais e de eventos. Responda em português brasileiro de forma prática e clara. Se receber uma imagem de painel, controladora ou equipamento em inglês, traduza e explique o que significa para o operador. Foque em procedimentos seguros, normas ABNT, e boas práticas de campo. Empresa: SOS Energia, locação de geradores.'},
            ...chatHistory
          ],
          max_tokens:800
        })
      });
      const data=await res.json();
      if(data.error){throw new Error(data.error.message);}
      const reply=data.choices?.[0]?.message?.content||'Não consegui processar a resposta.';
      chatHistory.push({role:'assistant',content:reply});
      document.getElementById('typing')?.remove();
      msgs.innerHTML+=`<div class="chat-msg ai">${formatMd(reply)}</div>`;
      msgs.scrollTop=msgs.scrollHeight;
      return;
    }catch(e){
      document.getElementById('typing')?.remove();
      msgs.innerHTML+=`<div class="chat-msg ai" style="color:var(--red-light)">⚠️ Erro na IA: ${escHtml(e.message||'Falha na conexão')}. Verifique a chave OpenAI nas Configurações.</div>`;
      msgs.scrollTop=msgs.scrollHeight;
      return;
    }
  }

  // Fallback: respostas pré-programadas
  await new Promise(r=>setTimeout(r,800));
  document.getElementById('typing')?.remove();
  if(temFoto){
    msgs.innerHTML+=`<div class="chat-msg ai">📷 Recebi a foto! Para analisar imagens preciso da chave OpenAI configurada em <strong>Configurações → Agente IA</strong>. Sem ela consigo responder apenas perguntas de texto.</div>`;
    msgs.scrollTop=msgs.scrollHeight;
    return;
  }
  const msgLower=msg.toLowerCase();
  let resp='Não tenho uma resposta específica para isso no momento. Para dúvidas técnicas complexas, entre em contato com o suporte técnico da SOS Energia ou consulte o manual do equipamento.';
  for(const [key,kws] of Object.entries(RESPOSTAS_TECNICAS)){
    if(kws.some(k=>msgLower.includes(k))){resp=RESP_MAP[key];break;}
  }
  msgs.innerHTML+=`<div class="chat-msg ai">${formatMd(resp)}</div>`;
  msgs.scrollTop=msgs.scrollHeight;
}

function formatMd(t){return escHtml(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br/>');}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    else prev.textContent='';

function salvarNovaHEAdmin(){
  const opId=document.getElementById('ahe-op')?.value;
  const data=document.getElementById('ahe-data')?.value;
  const ini=document.getElementById('ahe-ini')?.value;
  const fim=document.getElementById('ahe-fim')?.value;
  const local=document.getElementById('ahe-local')?.value?.trim()||'';
  const evento=document.getElementById('ahe-evento')?.value?.trim()||'';
  const motivoRaw=document.querySelector('input[name="ahe-motivo"]:checked')?.value||'';
  const motivo=motivoRaw==='__outro__'?(document.getElementById('ahe-motivo-outro')?.value?.trim()||''):motivoRaw;
  if(!opId){showToast('Selecione o colaborador.','err');return;}
  if(!data){showToast('Informe a data.','err');return;}
  if(!ini||!fim){showToast('Informe o início e fim da HE.','err');return;}
  if(!motivoRaw){showToast('Selecione o motivo da HE.','err');return;}
  if(motivoRaw==='__outro__'&&!motivo){showToast('Descreva o motivo da HE.','err');return;}
  const cedoAtivo=document.getElementById('ahe-cedo')?.checked||false;
  const cedoIni=cedoAtivo?(document.getElementById('ahe-cedo-ini')?.value||''):'';
  const cedoFim=cedoAtivo?(document.getElementById('ahe-cedo-fim')?.value||''):'';
  let heCedo=0;
  if(cedoAtivo&&cedoIni&&cedoFim){const cI=toMin(cedoIni),cF=toMin(cedoFim);heCedo=(cF>cI?cF-cI:cF+1440-cI)/60;}
  const iM=toMin(ini),fM=toMin(fim);
  const heBase=(fM>iM?fM-iM:fM+1440-iM)/60;
  const heOperador=heBase+heCedo;
  const refeicoes=refStepperVal('ahe-ref');
  const op=usuarios.find(u=>u.id===opId);
  const valorHora=(op&&op.heValor>0)?op.heValor:config.heValor;
  const reg={
    id:'hav_'+Date.now(),
    heAvulsa:true,
    osId:null,
    osNum:'',
    cliente:'—',
    evento,local,motivoHE:motivo,
    operadorId:opId,
    operadorNome:op?.nome||'',
    data,heIni:ini,heFim:fim,
    chegouCedo:cedoAtivo,cedoIni,cedoFim,heCedo,
    heOperador,valorHEOperador:heOperador*valorHora,
    refeicoes,valorRefeicao:refeicoes*25,
    obs:document.getElementById('ahe-obs')?.value||'',
    heMaquina:0,totalHoras:0,geradoresReg:[],
    status:'enviado',
    lancadoPorAdmin:true,
    lancadoPor:sessaoAtual.nome,
    criadoEm:new Date().toISOString()
  };
  registros.push(reg);
  fbUpdate('registros/'+reg.id,reg).catch(()=>{});

function salvarHETimeReg(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r) return;
  const os=r.osId?ordens.find(o=>o.id===r.osId):null;
  const geradores=os?(os.equipamentos||[]).filter(e=>e.tipo==='gerador'):[];

  // Dados básicos
  r.data=document.getElementById('het-data')?.value||r.data;
  const novoOpId=document.getElementById('het-op')?.value;
  if(novoOpId&&novoOpId!==r.operadorId){
    const novoOp=usuarios.find(u=>u.id===novoOpId);
    if(novoOp){r.operadorId=novoOpId;r.operadorNome=novoOp.nome;}
  }

  // HE operador
  const heIni=document.getElementById('het-he-ini')?.value||'';
  const heFim=document.getElementById('het-he-fim')?.value||'';
  r.heIni=heIni; r.heFim=heFim;
  let heBase=0;
  if(heIni&&heFim){const iM=toMin(heIni),fM=toMin(heFim);heBase=(fM>iM?fM-iM:fM+1440-iM)/60;}
  r.chegouCedo=document.getElementById('het-cedo')?.checked||false;
  const cedoIni=document.getElementById('het-cedo-ini')?.value||'';
  const cedoFim=document.getElementById('het-cedo-fim')?.value||'';
  r.cedoIni=cedoIni; r.cedoFim=cedoFim;
  let heCedo=0;
  if(r.chegouCedo&&cedoIni&&cedoFim){const cIM=toMin(cedoIni),cFM=toMin(cedoFim);heCedo=(cFM>cIM?cFM-cIM:cFM+1440-cIM)/60;}
  r.heOperador=heBase+heCedo;
  delete r.valorHEOperador;

  // Refeições
  r.refeicoes=refStepperVal('het-ref');
  r.valorRefeicao=r.refeicoes*25;

  // Identificação
  r.local=document.getElementById('het-local')?.value??r.local;
  r.evento=document.getElementById('het-evento')?.value??r.evento;
  if(r.heAvulsa){const motivoEl=document.querySelector('input[name="het-motivo"]:checked');if(motivoEl) r.motivoHE=motivoEl.value;}
  r.obs=document.getElementById('het-obs')?.value??r.obs;

  // Geradores (OS vinculada)
  if(!r.heAvulsa&&geradores.length&&r.geradoresReg){
    geradores.forEach((g,gi)=>{
      const gd=r.geradoresReg.find(x=>x.eqId===g.id);
      if(!gd||(gd.standby&&!gd.rodou)) return;
      const part=document.getElementById(`het-part-${gi}`)?.value;
      const par=document.getElementById(`het-par-${gi}`)?.value;
      const hi=parseFloat(document.getElementById(`het-hi-${gi}`)?.value||'0');
      const hf=parseFloat(document.getElementById(`het-hf-${gi}`)?.value||'0');
      const hc=parseInt(document.getElementById(`het-hc-${gi}`)?.value||'12');
      const meia=document.getElementById(`het-meia-${gi}`)?.checked||false;
      if(part!==undefined) gd.part=part;
      if(par!==undefined) gd.par=par;
      if(hi) gd.horIni=hi;
      if(hf) gd.horFim=hf;
      gd.hContratadas=isNaN(hc)?12:hc;
      gd.meiadiaria=meia;
      if(gd.part&&gd.par){
        const pM=toMin(gd.part),sM=toMin(gd.par);
        gd.totalHoras=(sM>pM?sM-pM:sM+1440-pM)/60;
        gd.heM=Math.max(0,gd.totalHoras-(meia?6:gd.hContratadas));
      }
    });
    const gRef=r.geradoresReg.find(g=>!g.standby||g.rodou);
    if(gRef){r.partida=gRef.part;r.parada=gRef.par;r.horIni=gRef.horIni;r.horFim=gRef.horFim;r.totalHoras=gRef.totalHoras;}
    r.heMaquina=r.geradoresReg.reduce((a,g)=>a+(g.heM||0),0);
  }

  // Audit trail
  r.corrigidoPor=sessaoAtual.nome;
  r.corrigidoEm=new Date().toISOString();

  fbUpdate('registros/'+r.id, r).catch(()=>{});
  DB.set('sos_registros',registros);
  document.getElementById('modal-hetime-edit')?.remove();
  showToast('HE atualizada com sucesso.');
  gerarHE();
}

function excluirHETimeReg(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r) return;
  const label=r.heAvulsa?`HE Avulsa de ${r.operadorNome} em ${fmtData(r.data)}`:`registro OS ${r.osNum} de ${r.operadorNome} em ${fmtData(r.data)}`;
  if(!confirm(`Excluir ${label}?\n\nEsta ação não pode ser desfeita.`)) return;
  registros=registros.filter(x=>x.id!==regId);
  DB.set('sos_registros',registros);
  fbRemove('registros/'+regId).catch(()=>{});
  showToast('Registro excluído.');
  gerarHE();
}

function aplicarDescontoHE(opId, mes){
  const valor=parseFloat(document.getElementById(`desc-val-${opId}`)?.value?.replace(',','.'));
  const motivo=(document.getElementById(`desc-mot-${opId}`)?.value||'').trim();
  if(!valor||valor<=0){showToast('Informe um valor válido para o desconto.','err');return;}
  if(!motivo){showToast('Informe o motivo do desconto.','err');return;}
  const chave=`${opId}_${mes}`;
  if(!descontosHE[chave]) descontosHE[chave]=[];
  descontosHE[chave].push({id:'desc_'+Date.now(),valor,motivo,criadoEm:new Date().toISOString(),criadoPor:sessaoAtual?.nome||''});
  saveDescontos();
  // Limpa campos
  const vEl=document.getElementById(`desc-val-${opId}`);
  const mEl=document.getElementById(`desc-mot-${opId}`);
  if(vEl) vEl.value='';
  if(mEl) mEl.value='';
  showToast('Desconto aplicado!');
  gerarHE();
}
function removerDescontoHE(opId, mes, descId){
  const chave=`${opId}_${mes}`;
  if(!descontosHE[chave]) return;
  descontosHE[chave]=descontosHE[chave].filter(d=>d.id!==descId);
  if(!descontosHE[chave].length) delete descontosHE[chave];
  saveDescontos();
  showToast('Desconto removido.');
  gerarHE();
}

function gerarHE(){
  const mes=document.getElementById('he-mes')?.value;
  if(!mes) return;
  const out=document.getElementById('he-out');
  const operadores=usuarios.filter(u=>u.perfil==='operador');
  if(!operadores.length){out.innerHTML='<div class="card" style="color:var(--text-secondary);text-align:center;padding:24px">Nenhum operador cadastrado.</div>';return;}

  const regsDoMes=registros.filter(r=>r.data&&r.data.startsWith(mes));

  let totalHEGeral=0,totalValorHEGeral=0,totalRefGeral=0,totalValorRefGeral=0,totalDescontoGeral=0,opComHE=0;
  const cards=operadores.map(u=>{
    const regsOp=regsDoMes.filter(r=>r.operadorId===u.id);
    const totalHE=regsOp.reduce((a,r)=>a+(r.heOperador||0),0);
    const totalRef=regsOp.reduce((a,r)=>a+(r.refeicoes||0),0);
    if(!totalHE&&!totalRef) return ''; // oculta operadores sem HE nem refeições
    opComHE++;
    const valorHora=(u.heValor&&u.heValor>0)?u.heValor:config.heValor;
    const totalValorHE=totalHE*valorHora;
    const totalValorRef=totalRef*25;
    totalHEGeral+=totalHE;
    totalValorHEGeral+=totalValorHE;
    totalRefGeral+=totalRef;
    totalValorRefGeral+=totalValorRef;
    const chaveDesc=`${u.id}_${mes}`;
    totalDescontoGeral+=(descontosHE[chaveDesc]||[]).reduce((a,d)=>a+(d.valor||0),0);
    const descontosOp=descontosHE[chaveDesc]||[];
    const totalDesconto=descontosOp.reduce((a,d)=>a+(d.valor||0),0);
    const regsComHE=regsOp.filter(r=>(r.heOperador||0)>0||(r.refeicoes||0)>0).sort((a,b)=>a.data.localeCompare(b.data));
    const linhasHE=regsComHE.map(r=>{
      const valHE=(r.heOperador||0)*valorHora;
      const valRef=(r.valorRefeicao||((r.refeicoes||0)*25));
      const heBase=r.heOperador-(r.heCedo||0);
      const heHorario=(r.heIni&&r.heFim)?`${r.heIni} → ${r.heFim}`:'';
      const cedoBadge=(r.chegouCedo&&(r.heCedo||0)>0)?`<span style="font-size:11px;background:rgba(99,102,241,.15);color:#818cf8;border-radius:5px;padding:2px 7px;font-weight:600;display:inline-flex;align-items:center;gap:4px">🏢 Cedo ${r.cedoIni&&r.cedoFim?r.cedoIni+'→'+r.cedoFim:''} <span style="opacity:.8">${fmtHE(r.heCedo)}</span></span>`:'';
      return `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
          <div style="min-width:0;font-size:12px;flex:1">
            <span style="color:var(--dim)">${fmtData(r.data)}</span>
            ${r.heAvulsa?`<span style="font-weight:600;margin-left:8px;background:rgba(139,92,246,.15);color:#a78bfa;border-radius:4px;padding:1px 6px">Avulsa</span>`:(r.osNum?`<span style="font-weight:600;margin-left:8px">OS ${r.osNum}</span>`:'')}
            ${r.motivoHE?`<span style="margin-left:6px;color:var(--dim)">${r.motivoHE}</span>`:''}

        </div>
        <div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
          <div style="font-size:11px;color:var(--dim);margin-bottom:6px;font-weight:600">🔻 Aplicar desconto</div>
          <div style="display:grid;grid-template-columns:110px 1fr auto;gap:6px;align-items:center">
            <input type="number" id="desc-val-${u.id}" placeholder="R$ valor" min="0" step="0.01" style="padding:8px 10px;background:var(--dark);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:13px"/>
            <input type="text" id="desc-mot-${u.id}" placeholder="Motivo (multa, horas devidas...)" maxlength="80" style="padding:8px 10px;background:var(--dark);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:13px"/>
            <button onclick="aplicarDescontoHE('${u.id}','${mes}')" style="padding:8px 12px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:#f87171;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Aplicar</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  const [ano,mesN]=mes.split('-');
  const nomeMes=new Date(parseInt(ano),parseInt(mesN)-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  const semHE=!cards.replace(/\s/g,'');
  out.innerHTML=`
  <div class="metric-grid" style="margin-bottom:12px">
    <div class="metric-card"><div class="metric-label">Com HE no mês</div><div class="metric-value" style="color:${opComHE?'var(--yellow)':'var(--dim)'}">${opComHE}</div></div>
    <div class="metric-card"><div class="metric-label">Total HE</div><div class="metric-value" style="color:var(--yellow)">${totalHEGeral>0?fmtHE(totalHEGeral):'—'}</div></div>
    <div class="metric-card"><div class="metric-label">Total HE R$</div><div class="metric-value" style="color:var(--green)">${totalValorHEGeral>0?'R$ '+totalValorHEGeral.toFixed(2):'—'}</div></div>
    <div class="metric-card"><div class="metric-label">Refeições</div><div class="metric-value" style="color:#10b981">${totalRefGeral>0?'×'+totalRefGeral:'—'}</div></div>
    <div class="metric-card"><div class="metric-label">Total Refeições R$</div><div class="metric-value" style="color:#10b981">${totalValorRefGeral>0?'R$ '+totalValorRefGeral.toFixed(2):'—'}</div></div>
    ${totalDescontoGeral>0?`<div class="metric-card"><div class="metric-label">Descontos</div><div class="metric-value" style="color:#f87171">− R$ ${totalDescontoGeral.toFixed(2)}</div></div>`:''}
    <div class="metric-card" style="${totalDescontoGeral>0?'border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.06)':''}"><div class="metric-label">Total a Pagar</div><div class="metric-value" style="color:var(--green);font-size:18px">${(totalValorHEGeral+totalValorRefGeral)>0?'R$ '+Math.max(0,totalValorHEGeral+totalValorRefGeral-totalDescontoGeral).toFixed(2):'—'}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Detalhamento — ${nomeMes}</div>
    ${semHE
      ? `<div style="text-align:center;color:var(--dim);font-size:13px;padding:16px 0">Nenhum operador registrou HE neste mês.</div>`
      : `<div style="display:flex;flex-direction:column;gap:10px">${cards}</div>`
    }
  </div>`;
}

function renderRelatorioHE(){
  const fonte='app';
  const mes=document.getElementById('rhe-mes')?.value||new Date().toISOString().slice(0,7);
  const out=document.getElementById('rhe-out');
  if(!out) return;

  if(fonte==='historico'){
    const dado=_heHistorico[mes];
    if(!dado){
      out.innerHTML=`<div class="card" style="text-align:center;color:var(--dim);padding:24px">Sem dados históricos importados para este mês.<br><span style="font-size:12px">Disponíveis: Dezembro 2025, Janeiro 2026, Fevereiro 2026.</span></div>`;
      return;
    }
    const lista=[...dado.funcionarios].sort((a,b)=>b.horas-a.horas);
    const maxHoras=lista[0]?.horas||1;
    const linhas=lista.map((f,i)=>{
      const pct=Math.round((f.horas/maxHoras)*100);
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-size:13px;font-weight:600">${medal} ${f.nome}</div>
          <div style="text-align:right">
            <span style="font-size:13px;color:var(--yellow);font-weight:700">${fmtHE(f.horas)}</span>
            <span style="font-size:12px;color:var(--green);margin-left:10px;font-weight:700">R$ ${f.valor.toFixed(2)}</span>
          </div>
        </div>
        <div style="background:var(--dark);border-radius:4px;height:6px;overflow:hidden">
          <div style="height:100%;border-radius:4px;background:linear-gradient(90deg,var(--yellow),var(--green));width:${pct}%"></div>
        </div>
      </div>`;
    }).join('');
    out.innerHTML=`
    <div class="metric-grid" style="margin-bottom:12px">
      <div class="metric-card"><div class="metric-label">Mês</div><div class="metric-value" style="font-size:14px;color:var(--fg)">${dado.label}</div></div>
      <div class="metric-card"><div class="metric-label">Funcionários</div><div class="metric-value" style="color:var(--yellow)">${lista.length}</div></div>
      <div class="metric-card"><div class="metric-label">Total Horas</div><div class="metric-value" style="color:var(--yellow)">${fmtHE(dado.horas)}</div></div>
      <div class="metric-card"><div class="metric-label">Total Pago</div><div class="metric-value" style="color:var(--green)">R$ ${dado.total.toFixed(2)}</div></div>
      <div class="metric-card"><div class="metric-label">Média/pessoa</div><div class="metric-value" style="color:var(--dim);font-size:15px">R$ ${(dado.total/lista.length).toFixed(2)}</div></div>
      <div class="metric-card"><div class="metric-label">Maior gasto</div><div class="metric-value" style="color:#f87171;font-size:13px">${[...lista].sort((a,b)=>b.valor-a.valor)[0]?.nome.split(' ')[0]||'—'} · R$ ${[...lista].sort((a,b)=>b.valor-a.valor)[0]?.valor.toFixed(2)||'—'}</div></div>
    </div>
    ${dado.nota?`<div style="background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--yellow)">⚠️ ${dado.nota}</div>`:''}
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-title" style="margin:0">Ranking de Horas — ${dado.label}</div>
        <span style="font-size:11px;color:var(--dim)">${lista.length} funcionário${lista.length!==1?'s':''}</span>
      </div>
      ${linhas}
    </div>
    <div class="card" style="margin-top:8px">
      <div class="card-title">Comparativo 3 Meses (histórico)</div>
      ${_rhe_comparativo()}
    </div>`;
    return;
  }

  // Fonte: App (registros do sistema)
  const regsDoMes=registros.filter(r=>r.data&&r.data.startsWith(mes));
  const operadores=usuarios.filter(u=>u.perfil==='operador');
  const [ano,mesN]=mes.split('-');
  const nomeMes=new Date(parseInt(ano),parseInt(mesN)-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  if(!regsDoMes.length){
    out.innerHTML=`<div class="card" style="text-align:center;color:var(--dim);padding:24px">Nenhum registro encontrado no app para ${nomeMes}.</div>`;
    return;
  }

  let totalHGeral=0,totalVGeral=0,totalRefGeral=0,totalDescGeral=0;
  const dadosOp=operadores.map(u=>{
    const regsOp=regsDoMes.filter(r=>r.operadorId===u.id);
    const totalHE=regsOp.reduce((a,r)=>a+(r.heOperador||0),0);
    const totalRef=regsOp.reduce((a,r)=>a+(r.refeicoes||0),0);
    if(!totalHE&&!totalRef) return null;
    const valorHora=(u.heValor&&u.heValor>0)?u.heValor:config.heValor;
    const valorHE=totalHE*valorHora;
    const valorRef=totalRef*25;
    const chaveDesc=`${u.id}_${mes}`;
    const desc=(descontosHE[chaveDesc]||[]).reduce((a,d)=>a+(d.valor||0),0);
    const liquido=Math.max(0,valorHE+valorRef-desc);
    totalHGeral+=totalHE;totalVGeral+=valorHE+valorRef;totalRefGeral+=totalRef;totalDescGeral+=desc;
    return {nome:u.nome,horas:totalHE,valorBruto:valorHE+valorRef,desconto:desc,liquido,refeicoes:totalRef,regs:regsOp.length};
  }).filter(Boolean).sort((a,b)=>b.horas-a.horas);

  if(!dadosOp.length){
    out.innerHTML=`<div class="card" style="text-align:center;color:var(--dim);padding:24px">Nenhum operador com HE em ${nomeMes}.</div>`;
    return;
  }
  const maxH=dadosOp[0]?.horas||1;
  const linhas=dadosOp.map((f,i)=>{
    const pct=Math.round((f.horas/maxH)*100);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;flex-wrap:wrap;gap:4px">
        <div style="font-size:13px;font-weight:600">${medal} ${f.nome}</div>
        <div style="text-align:right;display:flex;gap:10px;flex-wrap:wrap">
          <span style="font-size:12px;color:var(--yellow);font-weight:700">⏱ ${fmtHE(f.horas)}</span>
          ${f.refeicoes>0?`<span style="font-size:12px;color:#10b981">🍽 ×${f.refeicoes}</span>`:''}
          ${f.desconto>0?`<span style="font-size:12px;color:#f87171">🔻 −R$ ${f.desconto.toFixed(2)}</span>`:''}
          <span style="font-size:13px;color:var(--green);font-weight:700">R$ ${f.liquido.toFixed(2)}</span>
        </div>
      </div>
      <div style="background:var(--dark);border-radius:4px;height:6px;overflow:hidden">
        <div style="height:100%;border-radius:4px;background:linear-gradient(90deg,var(--yellow),var(--green));width:${pct}%"></div>
      </div>
      <div style="font-size:11px;color:var(--dim);margin-top:4px">${f.regs} registro${f.regs!==1?'s':''} · bruto R$ ${f.valorBruto.toFixed(2)}${f.desconto>0?' · desconto R$ '+f.desconto.toFixed(2):''}</div>
    </div>`;
  }).join('');

  out.innerHTML=`
  <div class="metric-grid" style="margin-bottom:12px">
    <div class="metric-card"><div class="metric-label">Mês</div><div class="metric-value" style="font-size:13px;color:var(--fg)">${nomeMes}</div></div>
    <div class="metric-card"><div class="metric-label">Operadores c/ HE</div><div class="metric-value" style="color:var(--yellow)">${dadosOp.length}</div></div>
    <div class="metric-card"><div class="metric-label">Total Horas</div><div class="metric-value" style="color:var(--yellow)">${fmtHE(totalHGeral)}</div></div>
    <div class="metric-card"><div class="metric-label">Total Bruto</div><div class="metric-value" style="color:var(--dim);font-size:15px">R$ ${totalVGeral.toFixed(2)}</div></div>
    ${totalDescGeral>0?`<div class="metric-card"><div class="metric-label">Descontos</div><div class="metric-value" style="color:#f87171">− R$ ${totalDescGeral.toFixed(2)}</div></div>`:''}

    </div>
    ${linhas}
  </div>`;
}

function gerarPDFOperador(){
  const opId=document.getElementById('pdf-op-id')?.value;
  const mes=document.getElementById('pdf-op-mes')?.value;
  if(!opId){showToast('Selecione o operador.','err');return;}
  if(!mes){showToast('Selecione o mês.','err');return;}

  const op=usuarios.find(u=>u.id===opId);
  if(!op) return;
  const [ano,mesN]=mes.split('-');
  const dtMes=new Date(parseInt(ano),parseInt(mesN)-1,1);
  const nomeMes=dtMes.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const nomeMesCaps=nomeMes.toUpperCase();
  const regsOp=registros.filter(r=>r.operadorId===opId&&r.data&&r.data.startsWith(mes)&&(r.status==='enviado'||r.heAvulsa)).sort((a,b)=>a.data.localeCompare(b.data));
  const valorHora=(op.heValor&&op.heValor>0)?op.heValor:config.heValor;
  const chaveDesc=`${opId}_${mes}`;
  const descontosOp=descontosHE[chaveDesc]||[];
  const totalDesc=descontosOp.reduce((a,d)=>a+(d.valor||0),0);

  if(!regsOp.length){
    document.getElementById('modal-pdf-op')?.remove();
    showToast('Nenhum registro encontrado para este operador no mês selecionado.','err');
    return;
  }

  const totalHE=regsOp.reduce((a,r)=>a+(r.heOperador||0),0);
  const totalRef=regsOp.reduce((a,r)=>a+(r.refeicoes||0),0);
  const totalValorHE=totalHE*valorHora;
  const totalValorRef=totalRef*25;
  const totalBruto=totalValorHE+totalValorRef;
  const totalLiquido=Math.max(0,totalBruto-totalDesc);

  const diasSemana=['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  function diaSemana(dataStr){
    const [y,m,d]=dataStr.split('-').map(Number);
    return diasSemana[new Date(y,m-1,d).getDay()];
  }

  function valorExtenso(v){
    const n=Math.round(v*100);
    const reais=Math.floor(n/100);
    const cents=n%100;
    const unidades=['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
    const dezenas=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
    const centenas=['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
    function numParaExtenso(n){
      if(n===0) return 'zero';
      if(n===100) return 'cem';
      let s='';
      if(n>=1000){const m=Math.floor(n/1000);s+=(m===1?'mil':numParaExtenso(m)+' mil');n=n%1000;if(n>0)s+=' e ';}
      if(n>=100){s+=centenas[Math.floor(n/100)];n=n%100;if(n>0)s+=' e ';}
      if(n>=20){s+=dezenas[Math.floor(n/10)];n=n%10;if(n>0)s+=' e ';}
      if(n>0)s+=unidades[n];
      return s;
    }
    let ext=numParaExtenso(reais)+' reais';
    if(cents>0) ext+=' e '+numParaExtenso(cents)+' centavos';
    return ext.charAt(0).toUpperCase()+ext.slice(1);
  }

  const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const hoje=new Date();
  const dataExtenso=`Brasília/DF, ${hoje.getDate()} de ${meses[hoje.getMonth()]} de ${hoje.getFullYear()}.`;
  const cpfOp=op.cpf||'';

  // Verifica se algum registro tem segundo período

  const nCols=temPeriodo2?10:8; // 8 sem período2, 10 com

    const d=r.data||'';
    const dt=d?`${d.slice(8,10)}/${d.slice(5,7)}`:'—';
    const dia=d?diaSemana(d):'';
    const local=(r.local||r.cliente||'').toUpperCase()||'—';
    const evento=(r.evento||'').toUpperCase()||'—';
    const os=r.osNum||'—';
    const e1=r.heIni||'—';
    const s1=r.heFim||'—';
    const sub=fmtHE(r.heOperador||0);
    const bg=i%2===0?'#fff':'#f5f5f5';
    const tdStyle='text-align:center';
    const p2=temPeriodo2?`<td style="${tdStyle}">${r.heIni2||'—'}</td><td style="${tdStyle}">${r.heFim2||'—'}</td>`:'';
    return `<tr style="background:${bg}">
      <td style="white-space:nowrap">${dt}</td>

function abrirLiveDashboardHE(){
  const mes=document.getElementById('rhe-mes')?.value||new Date().toISOString().slice(0,7);
  const [ano,mesN]=mes.split('-');
  const nomeMes=new Date(parseInt(ano),parseInt(mesN)-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  // ── coleta dados do mês ──────────────────────────────────────────────
  const regsDoMes=registros.filter(r=>r.data&&r.data.startsWith(mes));
  const operadores=usuarios.filter(u=>u.perfil==='operador');

  const dadosOp=operadores.map(u=>{
    const regsOp=regsDoMes.filter(r=>r.operadorId===u.id&&r.heOperador>0);
    const totalHE=regsOp.reduce((a,r)=>a+(r.heOperador||0),0);
    const totalRef=regsOp.reduce((a,r)=>a+(r.refeicoes||0),0);
    const eventos=regsOp.filter(r=>r.local&&r.local!=='SOS Energia').length;
    const diasSOS=regsOp.filter(r=>r.local==='SOS Energia').length;
    const chegouCedo=regsOp.filter(r=>r.chegouCedo).length;
    const valorHora=(u.heValor&&u.heValor>0)?u.heValor:config.heValor;
    const valorHE=totalHE*valorHora;
    const valorRef=totalRef*25;
    const chaveDesc=`${u.id}_${mes}`;
    const descs=(descontosHE[chaveDesc]||[]);
    const desc=descs.reduce((a,d)=>a+(d.valor||0),0);
    const liquido=Math.max(0,valorHE+valorRef-desc);
    const heCedo=regsOp.reduce((a,r)=>a+(r.heCedo||0),0);
    return {id:u.id,nome:u.nome,totalHE,totalRef,eventos,diasSOS,chegouCedo,valorHE,valorRef,desc,liquido,regs:regsOp,valorHora,heCedo,descs};
  }).filter(f=>f.totalHE>0||f.eventos>0).sort((a,b)=>b.totalHE-a.totalHE);

  const totalH=dadosOp.reduce((a,f)=>a+f.totalHE,0);
  const totalV=dadosOp.reduce((a,f)=>a+f.liquido,0);
  const totalDesc=dadosOp.reduce((a,f)=>a+f.desc,0);
  const totalRef=dadosOp.reduce((a,f)=>a+f.totalRef,0);
  const totalEv=dadosOp.reduce((a,f)=>a+f.eventos,0);
  const ativos=dadosOp.length;

  if(!ativos){alert('Nenhum operador com HE em '+nomeMes+'.');return;}

  // ── helpers SVG ──────────────────────────────────────────────────────
  const PAL=['#3B82F6','#2063AD','#BCD6F6','#4CAF50','#FF9800','#9F7AEA','#F6AD55','#FC8181','#68D391','#63B3ED','#B794F4'];

  function fmtH(n){const h=Math.floor(n),m=Math.round((n-h)*60);return h+'h'+(m>0?String(m).padStart(2,'0')+'m':'');}
  function fmtR(n){return'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function srt(n){return n.split(' ')[0];}

  function barSVG(names,vals,fmtFn,colors,hpb){
    hpb=hpb||26;const gap=5,lw=88,padL=2;
    const max=Math.max(...vals,1);const W=520,plotW=W-lw-padL-90;
    const H=names.length*(hpb+gap)+8;let s='';
    names.forEach((n,i)=>{
      const bw=Math.max(4,(vals[i]/max)*plotW);const y=4+i*(hpb+gap);
      const col=Array.isArray(colors)?colors[i%colors.length]:colors;
      s+=`<text x="${padL}" y="${y+hpb/2+4}" fill="#5A7CA0" font-size="10" font-weight="600" font-family="Montserrat,sans-serif">${n}</text>
      <rect x="${padL+lw}" y="${y}" width="${bw}" height="${hpb}" rx="5" fill="${col}" opacity="0.88"/>
      <text x="${padL+lw+bw+6}" y="${y+hpb/2+4}" fill="#A8C4E0" font-size="10" font-weight="700" font-family="Montserrat,sans-serif">${fmtFn(vals[i])}</text>`;
    });
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;">${s}</svg>`;
  }

  function donutSVG(names,vals){
    const total=vals.reduce((a,b)=>a+b,0);
    const cx=95,cy=95,R=72,r=42;let angle=-Math.PI/2,slices='',leg='';
    const top=vals.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v).slice(0,8);
    top.forEach(({v,i},j)=>{
      const sw=(v/total)*Math.PI*2;
      const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
      angle+=sw;
      const x2=cx+R*Math.cos(angle),y2=cy+R*Math.sin(angle);
      const lg=sw>Math.PI?1:0;
      const xi1=cx+r*Math.cos(angle-sw),yi1=cy+r*Math.sin(angle-sw);
      const xi2=cx+r*Math.cos(angle),yi2=cy+r*Math.sin(angle);
      slices+=`<path d="M ${x1} ${y1} A ${R} ${R} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${r} ${r} 0 ${lg} 0 ${xi1} ${yi1} Z" fill="${PAL[i%PAL.length]}" stroke="#050B14" stroke-width="2" opacity=".9"/>`;
      const ly=14+j*20;
      leg+=`<rect x="205" y="${ly-9}" width="9" height="9" rx="2" fill="${PAL[i%PAL.length]}"/>
      <text x="220" y="${ly}" fill="#A8C4E0" font-size="10" font-weight="600" font-family="Montserrat,sans-serif">${names[i].split(' ')[0]}</text>
      <text x="340" y="${ly}" fill="#4CAF50" font-size="10" font-weight="700" font-family="Montserrat,sans-serif" text-anchor="end">${fmtR(vals[i])}</text>`;
    });
    return `<svg viewBox="0 0 350 195" style="width:100%;display:block;">
      ${slices}<circle cx="${cx}" cy="${cy}" r="${r-2}" fill="#050B14"/>
      <text x="${cx}" y="${cy-5}" text-anchor="middle" fill="#5A7CA0" font-size="8" font-weight="600" font-family="Montserrat,sans-serif">TOTAL</text>
      <text x="${cx}" y="${cy+8}" text-anchor="middle" fill="#fff" font-size="10" font-weight="800" font-family="Montserrat,sans-serif">${fmtR(total)}</text>
      ${leg}</svg>`;
  }

  function hBarSVG(labels,data,fmtFn,color){
    const bh=20,gap=12,lw=52,padL=2,W=300;
    const max=Math.max(...data,1);
    const H=labels.length*(bh+gap)+8;let s='';
    labels.forEach((lbl,i)=>{
      const bw=Math.max(4,(data[i]/max)*(W-lw-padL-50));
      const y=4+i*(bh+gap);
      s+=`<text x="${padL}" y="${y+bh/2+4}" fill="#5A7CA0" font-size="10" font-weight="600" font-family="Montserrat,sans-serif">${lbl}</text>
      <rect x="${padL+lw}" y="${y}" width="${bw}" height="${bh}" rx="4" fill="${color}" opacity=".85"/>
      <text x="${padL+lw+bw+5}" y="${y+bh/2+4}" fill="#A8C4E0" font-size="9" font-weight="700" font-family="Montserrat,sans-serif">${fmtFn(data[i])}</text>`;
    });
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;">${s}</svg>`;
  }

  // ── score ─────────────────────────────────────────────────────────────
  const maxH=Math.max(...dadosOp.map(f=>f.totalHE),1);
  const maxEv=Math.max(...dadosOp.map(f=>f.eventos),1);
  const maxSOS=Math.max(...dadosOp.map(f=>f.diasSOS),1);
  dadosOp.forEach(f=>{
    f.score=Math.round((f.totalHE/maxH)*50+(f.eventos/maxEv)*30+(f.diasSOS/maxSOS)*20);
  });
  const byScore=[...dadosOp].sort((a,b)=>b.score-a.score);
  const byVal=[...dadosOp].sort((a,b)=>b.liquido-a.liquido);
  const byEv=[...dadosOp].filter(f=>f.eventos>0).sort((a,b)=>b.eventos-a.eventos);
  const topScore=byScore[0];
  const topVal=byVal[0];

  function scoreColor(s){return s>=70?'#4CAF50':s>=40?'#FF9800':'#FF5756';}
  function rankClass(i){return i===0?'r1':i===1?'r2':i===2?'r3':'rn';}
  function rankLabel(i){return i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;}

  const rankKPI=`
    <div class="kpi" style="--ka:#3B82F6"><div class="ki">👥</div><div class="kl">Operadores c/ HE</div><div class="kv">${ativos}</div><div class="ks">em ${nomeMes}</div></div>
    <div class="kpi" style="--ka:#4CAF50"><div class="ki">⏱</div><div class="kl">Total Horas Extras</div><div class="kv">${fmtH(totalH)}</div><div class="ks">média ${fmtH(totalH/ativos)}/pessoa</div></div>
    <div class="kpi" style="--ka:#FF9800"><div class="ki">💰</div><div class="kl">Total a Pagar</div><div class="kv" style="font-size:17px">${fmtR(totalV)}</div><div class="ks">${totalDesc>0?'desc. '+fmtR(totalDesc):'sem descontos'}</div></div>
    <div class="kpi" style="--ka:#9F7AEA"><div class="ki">📅</div><div class="kl">Eventos Externos</div><div class="kv">${totalEv}</div><div class="ks">${byEv.length>0?'top: '+srt(byEv[0].nome)+' ('+byEv[0].eventos+')':'—'}</div></div>
    <div class="kpi" style="--ka:#F6AD55"><div class="ki">🏆</div><div class="kl">Maior Score</div><div class="kv">${topScore.score}</div><div class="ks">${srt(topScore.nome)}</div></div>`;

  const insightVisao=`<strong>📊 Resumo ${nomeMes}:</strong> ${ativos} operador${ativos!==1?'es':''} com HE registrada no sistema.
    Total de <strong>${fmtH(totalH)}</strong> em horas extras, custo líquido de <strong>${fmtR(totalV)}</strong>${totalDesc>0?' (após '+fmtR(totalDesc)+' em descontos)':''}.
    Maior ganhador: <strong>${topVal.nome}</strong> (${fmtR(topVal.liquido)}).
    Líder em horas: <strong>${dadosOp[0].nome}</strong> (${fmtH(dadosOp[0].totalHE)}).`;

  const tableGeral=byScore.map((f,i)=>`<tr>
    <td><span class="rk ${rankClass(i)}">${rankLabel(i)}</span></td>
    <td style="font-weight:700;color:#fff">${f.nome}</td>
    <td><div style="display:flex;align-items:center;gap:8px">
      <div style="background:rgba(255,255,255,.06);border-radius:4px;height:6px;width:80px;overflow:hidden"><div style="width:${f.score}%;height:6px;border-radius:4px;background:${scoreColor(f.score)}"></div></div>
      <span style="font-weight:800;color:${scoreColor(f.score)};font-size:12px">${f.score}</span>
    </div></td>
    <td style="color:#BCD6F6;font-weight:600">${fmtH(f.totalHE)}</td>
    <td style="color:#4CAF50;font-weight:800">${fmtR(f.liquido)}</td>
    <td style="color:#9F7AEA;font-weight:700">${f.eventos}</td>
    <td style="color:#3B82F6;font-weight:600">${f.diasSOS}d</td>
    <td style="color:#818cf8;font-weight:600">${f.totalRef}</td>
  </tr>`).join('');

  // ── aba empenho ───────────────────────────────────────────────────────
  const tableEmpenho=byScore.map((f,i)=>{
    const hpm=fmtH(f.totalHE);
    let perfil=f.score>=70?'⭐ Destaque':f.score>=40?'✅ Regular':'⚠️ Baixo';
    return `<tr>
      <td><span class="rk ${rankClass(i)}">${rankLabel(i)}</span></td>
      <td style="font-weight:700;color:#fff">${f.nome}</td>
      <td><span style="font-weight:800;color:${scoreColor(f.score)};font-size:13px">${f.score}</span><span style="color:var(--tm);font-size:9px">/100</span></td>
      <td style="color:#BCD6F6;font-weight:600">${hpm}</td>
      <td style="color:#9F7AEA;font-weight:600">${f.eventos}</td>
      <td style="color:#3B82F6;font-weight:600">${f.diasSOS}d</td>
      <td style="color:#818cf8">${f.chegouCedo>0?'🏢 '+f.chegouCedo+'x':'—'}</td>
      <td><span class="pill" style="background:rgba(${f.score>=70?'76,175,80':f.score>=40?'255,152,0':'255,87,86'},.15);color:${scoreColor(f.score)};border:1px solid ${scoreColor(f.score)}40">${perfil}</span></td>
    </tr>`;
  }).join('');

  const alertasBaixo=byScore.filter(f=>f.score<30).slice(0,5);
  const alertasAlto=byScore.filter(f=>f.score>=60).slice(0,5);
  const alertasBaixoHTML=alertasBaixo.length
    ?alertasBaixo.map(f=>`<div class="alerta">⚠️ <div><strong>${f.nome}</strong> — Score ${f.score}/100. ${fmtH(f.totalHE)} HE, ${f.eventos} eventos.</div></div>`).join('')
    :'<div class="alerta alerta-g">✅ Nenhum operador com engajamento crítico.</div>';
  const alertasAltoHTML=alertasAlto.length
    ?alertasAlto.map(f=>`<div class="alerta alerta-g">⭐ <div><strong>${f.nome}</strong> — Score ${f.score}/100. ${fmtH(f.totalHE)} HE, ${f.eventos} eventos.</div></div>`).join('')
    :'';

  // ── aba financeiro ────────────────────────────────────────────────────
  const totalBruto=dadosOp.reduce((a,f)=>a+f.valorHE+f.valorRef,0);
  const custoHEmed=totalH>0?totalV/totalH:0;
  const kpiFinHTML=`
    <div class="kpi" style="--ka:#4CAF50"><div class="ki">💰</div><div class="kl">Total a Pagar</div><div class="kv" style="font-size:17px">${fmtR(totalV)}</div><div class="ks">líquido</div></div>
    <div class="kpi" style="--ka:#3B82F6"><div class="ki">📊</div><div class="kl">Total Bruto</div><div class="kv" style="font-size:17px">${fmtR(totalBruto)}</div><div class="ks">antes de descontos</div></div>
    <div class="kpi" style="--ka:#FF9800"><div class="ki">⏱</div><div class="kl">Custo por HE (média)</div><div class="kv" style="font-size:17px">${fmtR(custoHEmed)}</div><div class="ks">R$/hora extra</div></div>
    <div class="kpi" style="--ka:#FF5756"><div class="ki">🔻</div><div class="kl">Total Descontos</div><div class="kv" style="font-size:17px">${fmtR(totalDesc)}</div><div class="ks">${totalDesc>0?dadosOp.filter(f=>f.desc>0).length+' operador(es)':'nenhum'}</div></div>
    <div class="kpi" style="--ka:#9F7AEA"><div class="ki">🍽</div><div class="kl">Refeições</div><div class="kv">${totalRef}</div><div class="ks">${fmtR(totalRef*25)}</div></div>`;

  const tableFin=byVal.map((f,i)=>{
    const rph=f.totalHE>0?Math.round(f.liquido/f.totalHE):'-';
    return `<tr>
      <td><span class="rk ${rankClass(i)}">${rankLabel(i)}</span></td>
      <td style="font-weight:700;color:#fff">${f.nome}</td>
      <td style="color:#BCD6F6;font-weight:600">${fmtH(f.totalHE)}</td>
      <td style="color:#4CAF50;font-weight:700">${fmtR(f.valorHE)}</td>
      <td style="color:#9F7AEA;font-weight:600">${f.totalRef} × R$ 25</td>
      <td style="color:#f87171;font-weight:600">${f.desc>0?'−'+fmtR(f.desc):'—'}</td>
      <td style="font-weight:800;color:#4CAF50;font-size:13px">${fmtR(f.liquido)}</td>
      <td><span class="pill" style="background:rgba(32,99,173,.15);color:#BCD6F6;border:1px solid rgba(32,99,173,.25)">R$${rph}/h</span></td>
    </tr>`;
  }).join('');

  // ── aba eventos ───────────────────────────────────────────────────────
  const totalEvG=dadosOp.reduce((a,f)=>a+f.eventos,0);
  const ativosEv=dadosOp.filter(f=>f.eventos>0).length;
  const kpiEvHTML=`
    <div class="kpi" style="--ka:#9F7AEA"><div class="ki">📅</div><div class="kl">Total Eventos</div><div class="kv">${totalEvG}</div><div class="ks">em ${nomeMes}</div></div>
    <div class="kpi" style="--ka:#3B82F6"><div class="ki">👥</div><div class="kl">Executores</div><div class="kv">${ativosEv}</div><div class="ks">operadores</div></div>
    <div class="kpi" style="--ka:#4CAF50"><div class="ki">🥇</div><div class="kl">Mais Eventos</div><div class="kv">${byEv.length>0?byEv[0].eventos:0}</div><div class="ks">${byEv.length>0?srt(byEv[0].nome):'—'}</div></div>
    <div class="kpi" style="--ka:#FF9800"><div class="ki">📊</div><div class="kl">Média por Executor</div><div class="kv">${ativosEv>0?(totalEvG/ativosEv).toFixed(1):0}</div><div class="ks">eventos/operador</div></div>`;

  const tableEv=byEv.length>0?byEv.map((f,i)=>`<tr>
    <td><span class="rk ${rankClass(i)}">${rankLabel(i)}</span></td>
    <td style="font-weight:700;color:#fff">${f.nome}</td>
    <td style="color:#9F7AEA;font-weight:800">${f.eventos}</td>
    <td style="color:#BCD6F6;font-weight:600">${fmtH(f.totalHE)}</td>
    <td style="color:#4CAF50;font-weight:700">${fmtR(f.liquido)}</td>

  </tr>`).join(''):`<tr><td colspan="6" style="text-align:center;color:#5A7CA0;padding:20px">Nenhum evento externo registrado em ${nomeMes}</td></tr>`;

      <td style="color:#4CAF50;font-weight:600;font-size:12px">${fmtH(r.heOperador||0)}</td>
    </tr>`;
  }).join('');

  // ── HTML do dashboard ─────────────────────────────────────────────────
  const html=`<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Dashboard HE · ${nomeMes} · SOS Energia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap');
:root{
  --bg:#000000;--bg1:#0D0D0D;--bg2:#111111;
  --bgc:rgba(255,255,255,0.04);--bgh:rgba(232,25,26,0.06);
  --bdr:rgba(232,25,26,0.20);--bdrl:rgba(255,255,255,0.06);
  --acc:#E8191A;--accb:#FF3333;--accl:#FF8080;--accg:rgba(232,25,26,0.30);
  --tp:#FFFFFF;--ts:#CCCCCC;--tm:#777777;
  --grn:#4CAF50;--org:#FF9800;--red:#E8191A;--pur:#CC44FF;
  --gold:#F6AD55;--silv:#CBD5E0;--bron:#C67C2D;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',system-ui,sans-serif;background:var(--bg);color:var(--tp);min-height:100vh;background-image:radial-gradient(circle at 85% 5%,rgba(232,25,26,.08) 0%,transparent 50%);}
header{background:#0D0D0D;border-bottom:1px solid rgba(232,25,26,.25);padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hl{display:flex;align-items:center;gap:16px;}
.logo-img{width:44px;height:44px;object-fit:contain;}
.logo-sos{height:32px;object-fit:contain;}
header h1{font-size:15px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;}
header p{font-size:10px;color:var(--tm);margin-top:2px;font-weight:500;}
.hbadge{background:var(--acc);color:#fff;font-size:10px;font-weight:800;padding:6px 16px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;}
.tw{background:#0D0D0D;border-bottom:1px solid rgba(232,25,26,.20);padding:0 32px;}
.tabs{display:flex;gap:0;}
.tab{padding:14px 22px;cursor:pointer;font-size:11px;font-weight:700;color:var(--tm);border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.3px;text-transform:uppercase;}
.tab:hover{color:#fff;}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);}
.ct{padding:28px 32px;max-width:1400px;margin:0 auto;}
.kg{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px;}
.kpi{background:var(--bgc);border:1px solid rgba(232,25,26,.15);border-radius:4px;padding:18px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;}
.kpi:hover{border-color:var(--acc);transform:translateY(-2px);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ka,var(--acc));}
.kpi::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,var(--ka,var(--acc)) 0%,transparent 70%);opacity:.06;}
.kl{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tm);margin-bottom:8px;font-weight:700;}
.kv{font-size:22px;font-weight:900;color:var(--tp);line-height:1;letter-spacing:-.5px;}
.ks{font-size:10px;color:var(--tm);margin-top:6px;font-weight:500;}
.ki{position:absolute;bottom:12px;right:14px;font-size:18px;opacity:.15;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:22px;}
.g12{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:22px;}
.card{background:var(--bgc);border:1px solid rgba(232,25,26,.15);border-radius:4px;padding:20px;transition:border-color .2s;}
.card:hover{border-color:rgba(232,25,26,.40);}
.card h3{font-size:9px;font-weight:800;color:var(--tm);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:14px;}
.tc{background:var(--bgc);border:1px solid rgba(232,25,26,.15);border-radius:4px;overflow:hidden;margin-bottom:22px;}
.th2{padding:12px 20px;border-bottom:1px solid rgba(232,25,26,.12);background:rgba(232,25,26,.05);}
.th2 h3{font-size:9px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:1.4px;}
table{width:100%;border-collapse:collapse;}
thead th{background:rgba(0,0,0,.6);padding:9px 14px;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tm);text-align:left;font-weight:700;}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .13s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(232,25,26,.05);}
tbody td{padding:11px 14px;font-size:12px;font-weight:500;}
.rk{width:24px;height:24px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;}
.r1{background:rgba(246,173,85,.15);color:var(--gold);border:1px solid rgba(246,173,85,.3);}
.r2{background:rgba(203,213,224,.1);color:var(--silv);border:1px solid rgba(203,213,224,.2);}
.r3{background:rgba(198,124,45,.12);color:var(--bron);border:1px solid rgba(198,124,45,.25);}
.rn{background:rgba(255,255,255,.05);color:var(--tm);border:1px solid rgba(255,255,255,.08);}
.pill{display:inline-block;padding:3px 8px;border-radius:3px;font-size:9px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;}
.stag{display:inline-flex;align-items:center;gap:8px;background:rgba(232,25,26,.08);border:1px solid rgba(232,25,26,.25);border-radius:3px;padding:5px 13px;font-size:10px;font-weight:800;color:var(--acc);letter-spacing:.5px;text-transform:uppercase;margin-bottom:18px;}
.stag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--acc);}
.insight{background:rgba(232,25,26,.07);border:1px solid rgba(232,25,26,.25);border-radius:4px;padding:14px 18px;font-size:12px;line-height:1.6;color:var(--ts);margin-bottom:22px;}
.insight strong{color:var(--acc);}
.alerta{background:rgba(255,152,0,.07);border:1px solid rgba(255,152,0,.22);border-radius:4px;padding:12px 16px;font-size:11px;color:#FFB74D;display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
.alerta-g{background:rgba(76,175,80,.07);border-color:rgba(76,175,80,.22);color:#81C784;}
@media(max-width:1100px){.kg{grid-template-columns:repeat(3,1fr);}}
@media(max-width:800px){.kg{grid-template-columns:1fr 1fr;}.g2,.g3,.g12{grid-template-columns:1fr;}}
</style>
</head>

function gerarPDFRelatorioHE(){
  const fonte='app';
  const mes=document.getElementById('rhe-mes')?.value||new Date().toISOString().slice(0,7);

  // ── coleta dados ──────────────────────────────────────────────
  let titulo,subtitulo,metricas,ranking,ganhos,resumoExec,comparativoHTML='',notaHTML='';

  if(fonte==='historico'){
    // Monta a partir dos 3 meses históricos
    const meses=Object.keys(_heHistorico);
    const todosFuncs=[...new Set(meses.flatMap(m=>_heHistorico[m].funcionarios.map(f=>f.nome)))];
    const resumoFuncs=todosFuncs.map(nome=>{
      const totalH=meses.reduce((a,m)=>{const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);return a+(f?f.horas:0);},0);
      const totalV=meses.reduce((a,m)=>{const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);return a+(f?f.valor:0);},0);
      const eventos=meses.reduce((a,m)=>{const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);return a+(f?1:0);},0);
      return {nome,totalH,totalV,eventos};
    }).sort((a,b)=>b.totalV-a.totalV);
    const totalH3=meses.reduce((a,m)=>a+_heHistorico[m].horas,0);
    const totalV3=meses.reduce((a,m)=>a+_heHistorico[m].total,0);
    const topGanho=resumoFuncs[0];
    const topHoras=[...resumoFuncs].sort((a,b)=>b.totalH-a.totalH)[0];
    titulo='DASHBOARD GESTÃO HE · SOS ENERGIA';
    subtitulo='Dezembro 2025 · Janeiro 2026 · Fevereiro 2026';
    metricas=[
      {label:'COLABORADORES ATIVOS',valor:todosFuncs.length,sub:'em 3 meses',cor:'#e74c3c'},
      {label:'TOTAL HORAS EXTRAS',valor:fmtHE(totalH3),sub:'média '+fmtHE(totalH3/todosFuncs.length)+'/pessoa',cor:'#e67e22'},
      {label:'CUSTO TOTAL 3 MESES',valor:'R$ '+totalV3.toFixed(2),sub:'média R$ '+(totalV3/todosFuncs.length).toFixed(2)+'/pessoa',cor:'#9b59b6'},
      {label:'MAIOR GERADOR DE RECEITA',valor:topGanho.nome.split(' ')[0],sub:'R$ '+topGanho.totalV.toFixed(2),cor:'#2ecc71'},
      {label:'MAIS HORAS',valor:topHoras.nome.split(' ')[0],sub:fmtHE(topHoras.totalH),cor:'#3498db'},
    ];
    const maxV=resumoFuncs[0]?.totalV||1;
    const maxH=[...resumoFuncs].sort((a,b)=>b.totalH-a.totalH)[0]?.totalH||1;
    const scoreMap={};
    resumoFuncs.forEach((f,i)=>{scoreMap[f.nome]=Math.round(100*(1-(i/resumoFuncs.length)));});
    ranking=[...resumoFuncs].sort((a,b)=>scoreMap[b.nome]-scoreMap[a.nome]).slice(0,8).map(f=>({nome:f.nome.split(' ')[0],pts:scoreMap[f.nome],pct:Math.round((scoreMap[f.nome]/100)*100)}));
    ganhos=resumoFuncs.slice(0,8).map((f,i)=>{
      const cores=['#e74c3c','#e74c3c','#e67e22','#2ecc71','#9b59b6','#3498db','#1abc9c','#f39c12'];
      return {nome:f.nome.split(' ')[0],valor:'R$ '+f.totalV.toFixed(2),pct:Math.round((f.totalV/maxV)*100),cor:cores[i]||'#95a5a6'};
    });
    resumoExec=`No trimestre <strong>Dez/25–Fev/26</strong>, a equipe freelance da SOS Energia somou <strong style="color:#e67e22">${fmtHE(totalH3)}</strong> em horas extras com custo total de <strong style="color:#e74c3c">R$ ${totalV3.toFixed(2)}</strong>. Maior gerador de receita: <strong style="color:#e74c3c">${topGanho.nome}</strong> (R$ ${topGanho.totalV.toFixed(2)}). Maior carga horária: <strong style="color:#e67e22">${topHoras.nome}</strong> (${fmtHE(topHoras.totalH)}).`;
    comparativoHTML=_rhe_pdf_comparativo();
  } else {
    // App — mês selecionado
    const [ano,mesN]=mes.split('-');
    const nomeMes=new Date(parseInt(ano),parseInt(mesN)-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    const regsDoMes=registros.filter(r=>r.data&&r.data.startsWith(mes));
    const operadores=usuarios.filter(u=>u.perfil==='operador');
    const dadosOp=operadores.map(u=>{
      const regsOp=regsDoMes.filter(r=>r.operadorId===u.id);
      const totalHE=regsOp.reduce((a,r)=>a+(r.heOperador||0),0);
      const totalRef=regsOp.reduce((a,r)=>a+(r.refeicoes||0),0);
      if(!totalHE&&!totalRef) return null;
      const valorHora=(u.heValor&&u.heValor>0)?u.heValor:config.heValor;
      const valorHE=totalHE*valorHora;
      const valorRef=totalRef*25;
      const chaveDesc=`${u.id}_${mes}`;
      const desc=(descontosHE[chaveDesc]||[]).reduce((a,d)=>a+(d.valor||0),0);
      return {nome:u.nome,totalHE,valorHE,valorRef,desc,liquido:Math.max(0,valorHE+valorRef-desc),regs:regsOp.length,totalRef};
    }).filter(Boolean).sort((a,b)=>b.liquido-a.liquido);
    if(!dadosOp.length){alert('Nenhum dado para este mês no app.');return;}
    const totalH=dadosOp.reduce((a,f)=>a+f.totalHE,0);
    const totalV=dadosOp.reduce((a,f)=>a+f.liquido,0);
    const totalDesc=dadosOp.reduce((a,f)=>a+f.desc,0);
    const topGanho=dadosOp[0];
    const topHoras=[...dadosOp].sort((a,b)=>b.totalHE-a.totalHE)[0];
    titulo='RELATÓRIO HE · SOS OS APP';
    subtitulo=nomeMes.toUpperCase();
    metricas=[
      {label:'OPERADORES COM HE',valor:dadosOp.length,sub:'no mês',cor:'#e74c3c'},
      {label:'TOTAL HORAS EXTRAS',valor:fmtHE(totalH),sub:'média '+fmtHE(totalH/dadosOp.length)+'/pessoa',cor:'#e67e22'},
      {label:'TOTAL A PAGAR',valor:'R$ '+totalV.toFixed(2),sub:totalDesc>0?'desc. R$ '+totalDesc.toFixed(2):'sem descontos',cor:'#9b59b6'},
      {label:'MAIOR GANHADOR',valor:topGanho.nome.split(' ')[0],sub:'R$ '+topGanho.liquido.toFixed(2),cor:'#2ecc71'},
      {label:'MAIS HORAS',valor:topHoras.nome.split(' ')[0],sub:fmtHE(topHoras.totalHE),cor:'#3498db'},
    ];
    const maxV=dadosOp[0]?.liquido||1;
    const maxH=[...dadosOp].sort((a,b)=>b.totalHE-a.totalHE)[0]?.totalHE||1;
    const scoreBase=[...dadosOp].sort((a,b)=>b.totalHE-a.totalHE);
    ranking=scoreBase.slice(0,8).map((f,i)=>{const pts=Math.round(100*(1-i/scoreBase.length));return{nome:f.nome.split(' ')[0],pts,pct:pts};});
    const cores=['#e74c3c','#e74c3c','#e67e22','#2ecc71','#9b59b6','#3498db','#1abc9c','#f39c12'];
    ganhos=dadosOp.slice(0,8).map((f,i)=>({nome:f.nome.split(' ')[0],valor:'R$ '+f.liquido.toFixed(2),pct:Math.round((f.liquido/maxV)*100),cor:cores[i]||'#95a5a6'}));
    resumoExec=`Em <strong>${nomeMes}</strong>, ${dadosOp.length} operador${dadosOp.length!==1?'es':''} registraram horas extras no sistema. Total de <strong style="color:#e67e22">${fmtHE(totalH)}</strong> em HE com custo líquido de <strong style="color:#e74c3c">R$ ${totalV.toFixed(2)}</strong>${totalDesc>0?' (após R$ '+totalDesc.toFixed(2)+' em descontos)':''}.  Maior ganhador: <strong style="color:#e74c3c">${topGanho.nome}</strong> (R$ ${topGanho.liquido.toFixed(2)}). Maior carga: <strong style="color:#e67e22">${topHoras.nome}</strong> (${fmtHE(topHoras.totalHE)}).`;
  }

  // ── monta HTML do PDF ─────────────────────────────────────────
  const rankHTML=ranking.map((f,i)=>{
    const corBarra=f.pct>=75?'#e74c3c':f.pct>=50?'#e67e22':f.pct>=30?'#f1c40f':'#95a5a6';
    return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <div style="width:90px;font-size:13px;font-weight:600;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.nome}</div>
      <div style="flex:1;background:#2a2a2a;border-radius:4px;height:22px;overflow:hidden">
        <div style="height:100%;background:${corBarra};border-radius:4px;width:${f.pct}%;transition:width .3s"></div>
      </div>
      <div style="width:52px;text-align:right;font-size:13px;font-weight:700;color:#fff">${f.pts}pts</div>
    </div>`;
  }).join('');

  const ganhoHTML=ganhos.map(f=>`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <div style="width:90px;font-size:13px;font-weight:600;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.nome}</div>
      <div style="flex:1;background:#2a2a2a;border-radius:4px;height:22px;overflow:hidden">
        <div style="height:100%;background:${f.cor};border-radius:4px;width:${f.pct}%"></div>
      </div>
      <div style="width:90px;text-align:right;font-size:12px;font-weight:700;color:#fff">${f.valor}</div>
    </div>`).join('');

  const metricaHTML=metricas.map(m=>`
    <div style="background:#1e1e1e;border:1px solid #333;border-top:3px solid ${m.cor};border-radius:8px;padding:16px 14px;min-width:0">
      <div style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">${m.label}</div>

  const html=`<!DOCTYPE html>

    <div style="width:44px;height:44px;background:#e74c3c;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px">⚡</div>

    </div>

  <div style="font-size:12px;color:#555">Gerado em ${new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
</div>

<!-- Separador seção -->
<div style="background:#1a1a1a;border:1px solid #333;border-left:4px solid #e74c3c;border-radius:6px;padding:8px 14px;margin-bottom:18px;display:inline-block">

function _rhe_pdf_comparativo(){
  const meses=Object.keys(_heHistorico);
  const todosNomes=[...new Set(meses.flatMap(m=>_heHistorico[m].funcionarios.map(f=>f.nome)))].sort();
  const rows=todosNomes.map(nome=>{
    const cols=meses.map(m=>{
      const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);
      return f?`<td style="text-align:right;padding:5px 8px;color:#e67e22;font-size:11px">${fmtHE(f.horas)}</td><td style="text-align:right;padding:5px 8px;color:#2ecc71;font-size:11px">R$ ${f.valor.toFixed(2)}</td>`
               :`<td style="text-align:right;padding:5px 8px;color:#444;font-size:11px">—</td><td style="text-align:right;padding:5px 8px;color:#444;font-size:11px">—</td>`;
    }).join('');
    const total=meses.reduce((a,m)=>{const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);return a+(f?f.valor:0);},0);

        <th style="text-align:right;padding:6px 8px;font-size:10px;color:#2ecc71;font-weight:700">TOTAL</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="border-top:2px solid #444">
        <td style="padding:6px 8px;font-size:11px;font-weight:800;color:#fff">TOTAL</td>
        ${Object.values(_heHistorico).map(d=>`<td style="text-align:right;padding:6px 8px;color:#e67e22;font-size:11px;font-weight:700">${fmtHE(d.horas)}</td><td style="text-align:right;padding:6px 8px;color:#2ecc71;font-size:11px;font-weight:700">R$ ${d.total.toFixed(2)}</td>`).join('')}

function _rhe_comparativo(){
  const meses=Object.keys(_heHistorico);
  const todosNomes=[...new Set(meses.flatMap(m=>_heHistorico[m].funcionarios.map(f=>f.nome)))].sort();
  const rows=todosNomes.map(nome=>{
    const cols=meses.map(m=>{
      const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);
      return f?`<td style="text-align:right;padding:4px 8px;color:var(--yellow);font-size:12px">${fmtHE(f.horas)}</td><td style="text-align:right;padding:4px 8px;color:var(--green);font-size:12px">R$ ${f.valor.toFixed(2)}</td>`
               :`<td style="text-align:right;padding:4px 8px;color:var(--border);font-size:12px">—</td><td style="text-align:right;padding:4px 8px;color:var(--border);font-size:12px">—</td>`;
    }).join('');
    const total=meses.reduce((a,m)=>{const f=_heHistorico[m].funcionarios.find(x=>x.nome===nome);return a+(f?f.valor:0);},0);
    return `<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px 8px;font-size:12px;font-weight:600;white-space:nowrap">${nome}</td>${cols}<td style="text-align:right;padding:4px 8px;color:var(--green);font-weight:700;font-size:12px">R$ ${total.toFixed(2)}</td></tr>`;
  }).join('');
  return `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
    <thead><tr style="border-bottom:2px solid var(--border)">
      <th style="text-align:left;padding:6px 8px;font-size:11px;color:var(--dim)">Funcionário</th>
      <th colspan="2" style="text-align:center;padding:6px 8px;font-size:11px;color:var(--dim)">Dez 2025</th>
      <th colspan="2" style="text-align:center;padding:6px 8px;font-size:11px;color:var(--dim)">Jan 2026</th>
      <th colspan="2" style="text-align:center;padding:6px 8px;font-size:11px;color:var(--dim)">Fev 2026</th>
      <th style="text-align:right;padding:6px 8px;font-size:11px;color:var(--green)">Total 3 meses</th>
    </tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr style="border-top:2px solid var(--border)">
      <td style="padding:6px 8px;font-size:12px;font-weight:700">TOTAL</td>
      ${Object.values(_heHistorico).map(d=>`<td style="text-align:right;padding:6px 8px;color:var(--yellow);font-size:12px;font-weight:700">${fmtHE(d.horas)}</td><td style="text-align:right;padding:6px 8px;color:var(--green);font-size:12px;font-weight:700">R$ ${d.total.toFixed(2)}</td>`).join('')}
      <td style="text-align:right;padding:6px 8px;color:var(--green);font-weight:700;font-size:13px">R$ ${Object.values(_heHistorico).reduce((a,d)=>a+d.total,0).toFixed(2)}</td>
    </tr></tfoot>
  </table></div>`;
}

function editUser(id){
  const u=usuarios.find(u=>u.id===id);if(!u) return;
  _editUserId=id;
  document.getElementById('nu-nome').value=u.nome||'';
  document.getElementById('nu-user').value=u.user||'';
  document.getElementById('nu-pass').value=u.senha||'';
  document.getElementById('nu-perfil').value=u.perfil||'operador';
  document.getElementById('nu-wpp').value=u.wpp||'';
  document.getElementById('nu-he').value=u.heValor||'';
  const btn=document.getElementById('btn-add-user');
  btn.textContent='💾 Salvar Alterações';

function addUser(){
  const nome=document.getElementById('nu-nome')?.value.trim();
  const user=document.getElementById('nu-user')?.value.trim().toLowerCase();
  const pass=document.getElementById('nu-pass')?.value;
  const perfil=document.getElementById('nu-perfil')?.value;
  const wpp=document.getElementById('nu-wpp')?.value.trim()||'';
  const heValor=parseFloat(document.getElementById('nu-he')?.value)||0;
  const btn=document.getElementById('btn-add-user');
  if(!nome||!user||!pass){setFeedback('fb-add-user','✕ Preencha nome, usuário e senha.','err');return;}
  // Modo edição
  if(_editUserId){
    const idx=usuarios.findIndex(u=>u.id===_editUserId);
    if(idx===-1) return;
    const conflito=usuarios.find(u=>u.user===user&&u.id!==_editUserId);
    if(conflito){setFeedback('fb-add-user','✕ Nome de usuário já em uso.','err');return;}
    usuarios[idx]={...usuarios[idx],nome,user,senha:pass,perfil,wpp,heValor};
    fbSaveWithFeedback(()=>saveAll(), btn, 'fb-add-user').then(()=>{
      cancelEditUser();
      renderUsers();
    });
    return;
  }
  // Modo criação
  if(usuarios.find(u=>u.user===user)){setFeedback('fb-add-user','✕ Usuário já existe.','err');return;}
  usuarios.push({id:'u_'+Date.now(),nome,user,senha:pass,perfil,wpp,heValor});
  fbSaveWithFeedback(()=>saveAll(), btn, 'fb-add-user').then(()=>{
    renderUsers();
    document.getElementById('nu-nome').value='';
    document.getElementById('nu-user').value='';
    document.getElementById('nu-pass').value='';
    document.getElementById('nu-wpp').value='';
    document.getElementById('nu-he').value='';
  });
}

function _previewHE(){
  const ini=document.getElementById('mhe-ini')?.value;
  const fim=document.getElementById('mhe-fim')?.value;
  const prev=document.getElementById('mhe-preview');
  if(!prev) return;
  if(ini&&fim){
    const iM=toMin(ini),fM=toMin(fim);
    const h=(fM>iM?fM-iM:fM+1440-iM)/60;
    prev.textContent=`HE calculada: ${fmtHE(h)}`;
  } else {
    prev.textContent=ini||fim?'Preencha os dois campos.':'HE será zerada.';
  }
}
function salvarHEReg(regId){

  let heH=0;
  if(ini&&fim){
    const iM=toMin(ini),fM=toMin(fim);
    heH=(fM>iM?fM-iM:fM+1440-iM)/60;
  }
  r.heIni=ini;

    showToast('HE atualizada com sucesso.');
    verOS(r.osId);
  }).catch(()=>showToast('Erro ao salvar.','err'));
}

function salvarRegistroAdmin(regId){
  const r=registros.find(x=>x.id===regId);
  if(!r) return;
  const os=ordens.find(o=>o.id===r.osId);
  const geradores=(os?.equipamentos||[]).filter(e=>e.tipo==='gerador');

  // Identificação
  r.data=document.getElementById('ead-data')?.value||r.data;
  const nomeOpEdit=document.getElementById('ead-nome-op')?.value;
  if(nomeOpEdit!==undefined){r.operadorNome=nomeOpEdit;r.nomeOperador=nomeOpEdit;}
  const respEdit=document.getElementById('ead-resp')?.value;
  if(respEdit!==undefined) r.respCliente=respEdit;

  // Abastecimento
  r.abastecido=document.getElementById('ead-abast')?.checked||false;
  const litrosVal=parseFloat(document.getElementById('ead-litros')?.value||'0');
  r.litros=isNaN(litrosVal)?0:litrosVal;

  // Atualiza geradores
  if(r.geradoresReg&&geradores.length){
    geradores.forEach((g,gi)=>{
      const gd=r.geradoresReg.find(x=>x.eqId===g.id);
      if(!gd||(gd.standby&&!gd.rodou)) return;
      const part=document.getElementById(`ead-part-${gi}`)?.value;
      const par=document.getElementById(`ead-par-${gi}`)?.value;
      const hi=document.getElementById(`ead-hi-${gi}`)?.value;
      const hf=document.getElementById(`ead-hf-${gi}`)?.value;
      const hcRaw=parseInt(document.getElementById(`ead-hc-${gi}`)?.value||'12');
      const meia=document.getElementById(`ead-meia-${gi}`)?.checked||false;
      if(part!==undefined) gd.part=part;
      if(par!==undefined) gd.par=par;
      if(hi!==undefined) gd.horIni=parseFloat(hi)||gd.horIni;
      if(hf!==undefined) gd.horFim=parseFloat(hf)||gd.horFim;
      gd.hContratadas=isNaN(hcRaw)?12:hcRaw;
      gd.meiadiaria=meia;
      // Recalcula totalHoras e heM
      if(gd.part&&gd.par){
        const pM=toMin(gd.part),sM=toMin(gd.par);
        gd.totalHoras=(sM>pM?sM-pM:sM+1440-pM)/60;
        const limH=meia?6:gd.hContratadas;
        gd.heM=Math.max(0,gd.totalHoras-limH);
      }
    });
    // Atualiza referência legada (primeiro gerador ativo)
    const gRef=r.geradoresReg.find(g=>!g.standby||g.rodou);
    if(gRef){r.partida=gRef.part;r.parada=gRef.par;r.horIni=gRef.horIni;r.horFim=gRef.horFim;r.totalHoras=gRef.totalHoras;}
    r.heMaquina=r.geradoresReg.reduce((a,g)=>a+(g.heM||0),0);
  }

  // Atualiza transporte
  r.placa=document.getElementById('ead-placa')?.value??r.placa;
  r.motorista=document.getElementById('ead-mot')?.value??r.motorista;
  r.itinerarioSaida=document.getElementById('ead-itin-saida')?.value??r.itinerarioSaida;
  r.itinerarioChegada=document.getElementById('ead-itin-cheg')?.value??r.itinerarioChegada;
  r.itinerarioSaidaVolta=document.getElementById('ead-itin-saida-v')?.value??r.itinerarioSaidaVolta;
  r.itinerarioChegadaVolta=document.getElementById('ead-itin-cheg-v')?.value??r.itinerarioChegadaVolta;

  // HE operador principal
  const heIni=document.getElementById('ead-he-ini')?.value||'';
  const heFim=document.getElementById('ead-he-fim')?.value||'';
  r.heIni=heIni; r.heFim=heFim;
  let heHBase=0;
  if(heIni&&heFim){const iM=toMin(heIni),fM=toMin(heFim);heHBase=(fM>iM?fM-iM:fM+1440-iM)/60;}

  // Chegou cedo
  r.chegouCedo=document.getElementById('ead-cedo')?.checked||false;
  const cedoIni=document.getElementById('ead-cedo-ini')?.value||'';
  const cedoFim=document.getElementById('ead-cedo-fim')?.value||'';
  r.cedoIni=cedoIni; r.cedoFim=cedoFim;
  let heCedo=0;
  if(r.chegouCedo&&cedoIni&&cedoFim){const cIM=toMin(cedoIni),cFM=toMin(cedoFim);heCedo=(cFM>cIM?cFM-cIM:cFM+1440-cIM)/60;}
  r.heOperador=heHBase+heCedo;
  delete r.valorHEOperador;

  // Refeições
  r.refeicoes=refStepperVal('ead-ref');
  r.valorRefeicao=r.refeicoes*25;

  // Observações
  r.obs=document.getElementById('ead-obs')?.value??r.obs;

  // Marca correção administrativa
  r.corrigidoPor=sessaoAtual.nome;
  r.corrigidoEm=new Date().toISOString();

  fbSaveRegistros().then(()=>{
    DB.set('sos_registros',registros);
    document.getElementById('modal-reg-edit')?.remove();
    showToast('Registro atualizado com sucesso.');
    verOS(r.osId);
  }).catch(()=>showToast('Erro ao salvar.','err'));
}

// GERAÇÃO DE PDF

function gerarPDFRegistro(){
  if(!lastReg||!opOS) return;
  const regsOS=[lastReg];
  _gerarPDF(opOS, regsOS);
}

function gerarPDFOS(osId){
  const os=ordens.find(o=>o.id===osId);
  if(!os) return;
  const regsOS=registros.filter(r=>r.osId===osId);
  _gerarPDF(os, regsOS);
}

function _gerarPDF(os, regsOS){
  try{
  regsOS=Array.isArray(regsOS)?regsOS:[];
  const totHoras=regsOS.reduce((a,r)=>a+(r.totalHoras||0),0);
  const totHEMaq=regsOS.reduce((a,r)=>a+(r.heMaquina||0),0);
  // Custo total de HE máquina: soma (heMaquina × heValorGerador) por gerador
  const totValHEMaq=(()=>{
    if(!totHEMaq||!os.equipamentos) return 0;
    const geradores=(os.equipamentos||[]).filter(e=>e.tipo==='gerador');
    return geradores.reduce((acc,g)=>acc+(parseFloat(g.heValorGerador)||0)*totHEMaq,0);
  })();
  // Recalcula HE do operador pelo período informado (heIni/heFim) — proporcional ao valor/hora
  let totHEOp=0, totValHE=0;
  regsOS.forEach(r=>{
    let heH=0;
    if(r.heIni&&r.heFim){
      const hIniM=toMin(r.heIni),hFimM=toMin(r.heFim);
      heH=(hFimM>hIniM?hFimM-hIniM:hFimM+1440-hIniM)/60;
    } else {
      heH=r.heOperador||0;
    }
    // valor/hora: usa valorHEOperador gravado proporcional; ou recalcula pelo heValor do operador
    const opUser=usuarios.find(u=>u.id===r.operadorId);
    const heValorH=(opUser&&opUser.heValor>0)?opUser.heValor:config.heValor;
    totHEOp+=heH;
    totValHE+=heH*heValorH;
  });
  const heOpH=fmtHE(totHEOp);
  const dataEmissao=new Date().toLocaleString('pt-BR');

  const registrosHTML=regsOS.map(r=>{

    const _heValPdf=(_opUserPdf&&_opUserPdf.heValor>0)?_opUserPdf.heValor:config.heValor;
    const valHE=heO*_heValPdf;
    return `

  }).join('');
